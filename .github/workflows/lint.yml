# .github/workflows/lint.yml — Verilog lint & symlink integrity check
# Runs on every push and PR. Does NOT require Nix or FPGA tools —
# uses only iverilog for syntax checking.

name: Lint & Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verilog-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Syntax-check Verilog by directory
        run: |
          echo "=== Verilog syntax check (per-directory with shared lib) ==="
          LIB="$PWD/shared/lib"
          ERRORS=0
          CHECKED=0

          # Compile a directory's HDL as a single unit. $2 is the find depth
          # control: empty for recursive, "-maxdepth 1" to stay in $1 only.
          check_dir() {
            local dir="$1"
            local depth_args="$2"
            local srcs syms all_srcs
            srcs=$(find "$dir" $depth_args \( -name "*.v" -o -name "*.sv" \) -not -type l | sort)
            syms=$(find "$dir" $depth_args \( -name "*.v" -o -name "*.sv" \) -type l | sort)
            all_srcs="$srcs $syms"
            [ -z "$(echo $all_srcs | tr -d ' ')" ] && return 0

            if grep -ql 'SB_PLL40\|SB_IO\|SB_GB' $all_srcs 2>/dev/null; then
              echo "SKIP: $dir/ (contains Lattice primitives)"
              return 0
            fi

            CHECKED=$((CHECKED + 1))
            if ! iverilog -g2012 -Wall -t null -y "$LIB" $all_srcs 2>/tmp/iv_err; then
              echo "FAIL: $dir/"
              sed 's/^/  /' /tmp/iv_err | head -20
              ERRORS=$((ERRORS + 1))
            fi
          }

          # Each lab's starter/ or solution/ is one compile unit so that a
          # testbench in solution/tb/ sees its DUT in solution/ref/. Walking
          # those directories non-recursively (as the old logic did) caused
          # the tb to look up the module via -y "$LIB" and either miss it or
          # bind to a stale shared/lib version with a different port list.
          while IFS= read -r dir; do
            check_dir "$dir" ""
          done < <(find labs/ -type d \( -name starter -o -name solution \) | sort)

          # Other HDL-bearing directories (e.g. shared/lib/, the week 15
          # project_templates) compile per-directory as before.
          while IFS= read -r dir; do
            case "$dir" in
              */starter|*/solution|*/starter/*|*/solution/*) continue ;;
            esac
            check_dir "$dir" "-maxdepth 1"
          done < <(find labs/ shared/lib/ -type d | sort)

          echo ""
          echo "Checked $CHECKED directories"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS directory(ies) failed syntax check"
            exit 1
          else
            echo "All directories pass syntax check"
          fi

      - name: Verify symlinks resolve
        run: |
          echo "=== Symlink integrity ==="
          BROKEN=0
          while IFS= read -r link; do
            if [ ! -e "$link" ]; then
              echo "BROKEN: $link -> $(readlink "$link")"
              BROKEN=$((BROKEN + 1))
            fi
          done < <(find . -type l)

          if [ "$BROKEN" -gt 0 ]; then
            echo "::error::$BROKEN broken symlink(s)"
            exit 1
          else
            echo "All symlinks resolve"
          fi

      - name: Check PCF consistency
        run: |
          echo "=== PCF consistency ==="
          CANONICAL="shared/pcf/go_board.pcf"
          ERRORS=0
          while IFS= read -r pcf; do
            [ "$pcf" = "$CANONICAL" ] && continue
            if [ -L "$pcf" ]; then
              TARGET=$(readlink -f "$pcf")
              EXPECTED=$(readlink -f "$CANONICAL")
              if [ "$TARGET" != "$EXPECTED" ]; then
                echo "WRONG TARGET: $pcf -> $(readlink "$pcf")"
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "NOT A SYMLINK: $pcf (should link to shared/pcf/go_board.pcf)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find labs/ -name "go_board.pcf")

          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::$ERRORS PCF file(s) are not symlinks to shared/pcf/go_board.pcf"
          else
            echo "All PCF files are consistent"
          fi
