# .github/workflows/lint.yml — Verilog lint & symlink integrity check
# Runs on every push and PR. Does NOT require Nix or FPGA tools —
# uses only iverilog for syntax checking.

name: Lint & Smoke Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verilog-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Syntax-check Verilog by directory
        run: |
          echo "=== Verilog syntax check (per-directory with shared lib) ==="
          LIB="$PWD/shared/lib"
          ERRORS=0
          CHECKED=0

          # Find every directory that contains at least one .v or .sv file,
          # then compile all HDL in that directory as a unit.
          while IFS= read -r dir; do
            srcs=$(find "$dir" -maxdepth 1 \( -name "*.v" -o -name "*.sv" \) -not -type l | sort)
            # Also include symlinked HDL (e.g. debounce.v → shared/lib/)
            syms=$(find "$dir" -maxdepth 1 \( -name "*.v" -o -name "*.sv" \) -type l | sort)
            all_srcs="$srcs $syms"
            [ -z "$(echo $all_srcs | tr -d ' ')" ] && continue

            CHECKED=$((CHECKED + 1))
            if ! iverilog -g2012 -Wall -t null -y "$LIB" $all_srcs 2>/tmp/iv_err; then
              echo "FAIL: $dir/"
              sed 's/^/  /' /tmp/iv_err | head -20
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find labs/ shared/lib/ -type d | sort)

          echo ""
          echo "Checked $CHECKED directories"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS directory(ies) failed syntax check"
            exit 1
          else
            echo "All directories pass syntax check"
          fi

      - name: Verify symlinks resolve
        run: |
          echo "=== Symlink integrity ==="
          BROKEN=0
          while IFS= read -r link; do
            if [ ! -e "$link" ]; then
              echo "BROKEN: $link -> $(readlink "$link")"
              BROKEN=$((BROKEN + 1))
            fi
          done < <(find . -type l)

          if [ "$BROKEN" -gt 0 ]; then
            echo "::error::$BROKEN broken symlink(s)"
            exit 1
          else
            echo "All symlinks resolve"
          fi

      - name: Check PCF consistency
        run: |
          echo "=== PCF consistency ==="
          CANONICAL="shared/pcf/go_board.pcf"
          ERRORS=0
          while IFS= read -r pcf; do
            [ "$pcf" = "$CANONICAL" ] && continue
            if [ -L "$pcf" ]; then
              TARGET=$(readlink -f "$pcf")
              EXPECTED=$(readlink -f "$CANONICAL")
              if [ "$TARGET" != "$EXPECTED" ]; then
                echo "WRONG TARGET: $pcf -> $(readlink "$pcf")"
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "NOT A SYMLINK: $pcf (should link to shared/pcf/go_board.pcf)"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find labs/ -name "go_board.pcf")

          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::$ERRORS PCF file(s) are not symlinks to shared/pcf/go_board.pcf"
          else
            echo "All PCF files are consistent"
          fi