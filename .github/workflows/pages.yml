# .github/workflows/pages.yml — Deploy course site to GitHub Pages
# Triggers on push to main branch.

name: Deploy Course Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Prepare MkDocs source
        run: python3 scripts/prep_mkdocs.py

      - name: Build site
        run: mkdocs build --site-dir _site

      - name: Copy slides into site
        run: cp -r lectures _site/lectures

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
