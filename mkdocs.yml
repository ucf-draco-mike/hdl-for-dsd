site_name: "HDL for Digital System Design"
site_description: "Accelerated HDL for Digital System Design — UCF ECE"
site_url: "https://ucf-draco-mike.github.io/hdl-for-dsd/"

docs_dir: docs_src
site_dir: _site

# Slide and notebook links point outside docs_src/ — resolved post-build
# when lectures/ and notebooks/ are copied into _site/
validation:
  links:
    absolute_links: relative_to_docs
    not_found: info                 # post-build copies (lectures/, notebooks/) resolve these
    unrecognized_links: info
  nav:
    omitted_files: info             # code.md pages accessible via links, not nav
    not_found: warn

not_in_nav: |
  days/*/code.md

theme:
  name: material
  custom_dir: docs_src/overrides
  palette:
    - scheme: default
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    logo: material/chip
    repo: fontawesome/brands/github

extra_css:
  - overrides/extra.css

markdown_extensions:
  - tables
  - fenced_code
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ucf-draco-mike/hdl-for-dsd

