# .gitlab-ci.yml — Deploy course site to GitLab Pages
# Triggers on push to main branch. Site available at:
#   https://<group>.gitlab.io/<project>/

image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

pages:
  stage: deploy
  script:
    - pip install -r requirements.txt jupytext
    # Generate Jupyter notebooks from lab markdown
    - |
      for readme in labs/week*_day*/README.md; do
        lab_dir=$(dirname "$readme")
        day_dir=$(basename "$lab_dir")
        jupytext --to notebook --output "${lab_dir}/${day_dir}_lab.ipynb" "$readme"
      done
    - python3 scripts/prep_mkdocs.py
    - mkdocs build --site-dir public
    # Copy slides into deployed site so "View Slides" links work
    - cp -r lectures public/lectures
    # Copy lab code zips so download links work
    - cp -r docs_src/downloads public/downloads
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
