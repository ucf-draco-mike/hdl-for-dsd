<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 310" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr"   markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#333"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D32F2F"/></marker>
    <marker id="arr-t" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#F57C00"/></marker>
  </defs>

  <text x="310" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Traffic Light FSM — Moore Machine</text>

  <!-- Reset arrow -->
  <line x1="90" y1="50" x2="90" y2="90" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="90" y="44" text-anchor="middle" font-size="11" fill="#D32F2F" font-weight="700">RESET</text>

  <!-- GREEN state -->
  <circle cx="90" cy="155" r="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3"/>
  <text x="90" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#7B1FA2">S_GREEN</text>
  <text x="90" y="165" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">o_green = 1</text>
  <text x="90" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">5 sec</text>

  <!-- GREEN → YELLOW (timer_done, purple) -->
  <path d="M 148,130 Q 220,80 278,118" fill="none" stroke="#F57C00" stroke-width="2.2" marker-end="url(#arr-t)"/>
  <text x="213" y="88" text-anchor="middle" font-size="10" fill="#F57C00" font-weight="700">timer_done</text>

  <!-- YELLOW state -->
  <circle cx="310" cy="155" r="60" fill="#FFFDE7" stroke="#FBC02D" stroke-width="3"/>
  <text x="310" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#7B1FA2">S_YELLOW</text>
  <text x="310" y="165" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">o_yellow = 1</text>
  <text x="310" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">1 sec</text>

  <!-- YELLOW → RED -->
  <path d="M 368,130 Q 440,80 498,118" fill="none" stroke="#F57C00" stroke-width="2.2" marker-end="url(#arr-t)"/>
  <text x="433" y="88" text-anchor="middle" font-size="10" fill="#F57C00" font-weight="700">timer_done</text>

  <!-- RED state -->
  <circle cx="530" cy="155" r="60" fill="#FFEBEE" stroke="#E53935" stroke-width="3"/>
  <text x="530" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#7B1FA2">S_RED</text>
  <text x="530" y="165" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">o_red = 1</text>
  <text x="530" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">5 sec</text>

  <!-- RED → GREEN (loop back under) -->
  <path d="M 480,195 Q 310,290 140,195" fill="none" stroke="#F57C00" stroke-width="2.2" marker-end="url(#arr-t)"/>
  <text x="310" y="270" text-anchor="middle" font-size="10" fill="#F57C00" font-weight="700">timer_done</text>

  <!-- Self-loops (stay in state) -->
  <path d="M 50,110 Q 20,70 50,100" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 270,110 Q 240,70 270,100" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 490,110 Q 460,70 490,100" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="30" y="75" font-size="8" fill="#999">!done</text>
  <text x="250" y="75" font-size="8" fill="#999">!done</text>
  <text x="470" y="75" font-size="8" fill="#999">!done</text>
</svg>
