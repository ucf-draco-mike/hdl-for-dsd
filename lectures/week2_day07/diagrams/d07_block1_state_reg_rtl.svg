<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar-clk"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1976D2"/></marker>
    <marker id="ar-rst"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D32F2F"/></marker>
    <marker id="ar-state" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7B1FA2"/></marker>
    <marker id="ar-next" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#00838F"/></marker>
  </defs>

  <text x="230" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    Block 1 — State Register (Sequential)
  </text>

  <!-- DFF symbol -->
  <rect x="160" y="90" width="150" height="140" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="235" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">DFF</text>
  <text x="235" y="138" text-anchor="middle" font-size="9" fill="#555">(reg [1:0])</text>
  <text x="235" y="218" text-anchor="middle" font-size="9" fill="#888" font-style="italic">posedge clk</text>

  <!-- D input label -->
  <text x="170" y="148" font-size="11" font-weight="700" fill="#1565C0">D</text>
  <!-- Q output label -->
  <text x="290" y="148" font-size="11" font-weight="700" fill="#1565C0" text-anchor="end">Q</text>

  <!-- Clock triangle -->
  <polygon points="160,178 175,170 175,186" fill="none" stroke="#1565C0" stroke-width="1.6"/>

  <!-- Reset pin -->
  <text x="170" y="208" font-size="9" font-weight="600" fill="#D32F2F">R</text>

  <!-- r_next_state input (amber, into D) -->
  <line x1="40" y1="148" x2="158" y2="148" stroke="#00838F" stroke-width="3" marker-end="url(#ar-next)"/>
  <text x="40" y="138" font-size="11" font-weight="700" fill="#00838F">r_next_state</text>

  <!-- i_clk input (cyan, into clock triangle) -->
  <line x1="40" y1="178" x2="158" y2="178" stroke="#1976D2" stroke-width="3" marker-end="url(#ar-clk)"/>
  <text x="40" y="170" font-size="11" font-weight="700" fill="#1976D2">i_clk</text>

  <!-- i_reset input (rose, into R pin) -->
  <line x1="40" y1="208" x2="158" y2="208" stroke="#D32F2F" stroke-width="3" marker-end="url(#ar-rst)"/>
  <text x="40" y="200" font-size="11" font-weight="700" fill="#D32F2F">i_reset</text>

  <!-- r_state output (deep orange) -->
  <line x1="310" y1="148" x2="420" y2="148" stroke="#7B1FA2" stroke-width="3" marker-end="url(#ar-state)"/>
  <text x="350" y="138" font-size="11" font-weight="700" fill="#7B1FA2">r_state</text>

  <!-- Feedback hint -->
  <path d="M 420,148 L 420,260 L 60,260 L 60,165 L 100,165" fill="none" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.55"/>
  <text x="230" y="276" font-size="9" font-style="italic" fill="#7B1FA2" text-anchor="middle" opacity="0.85">
    feeds back to Block 2 next-state logic
  </text>

  <!-- Caption -->
  <text x="230" y="305" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    Reset value: S_INIT · One flop per state bit · No logic here
  </text>
</svg>
