<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="bg-state" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#EF6C00"/></marker>
    <marker id="bg-g"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#43A047"/></marker>
    <marker id="bg-y"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#FBC02D"/></marker>
    <marker id="bg-r"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#E53935"/></marker>
    <pattern id="warnstripe" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#FFEBEE"/>
      <rect x="4" width="4" height="8" fill="#FFCDD2"/>
    </pattern>
  </defs>

  <text x="280" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">
    ⚠ Buggy Block → Inferred Latches in Silicon
  </text>

  <!-- Outer block: combined comb logic without defaults -->
  <rect x="155" y="55" width="250" height="240" rx="8" fill="url(#warnstripe)" stroke="#C62828" stroke-width="2.5"/>
  <text x="280" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#C62828">always @(*) — combined block</text>
  <text x="280" y="96" text-anchor="middle" font-size="9" fill="#666" font-style="italic">no defaults · no default case</text>

  <!-- Inferred latches as red "L" boxes — one per output that's not assigned in every branch -->
  <g>
    <rect x="190" y="115" width="180" height="44" rx="4" fill="#FFFFFF" stroke="#C62828" stroke-width="2"/>
    <text x="280" y="132" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">⚠ Latch on o_green</text>
    <text x="280" y="148" text-anchor="middle" font-size="9" fill="#666" font-style="italic">value held — unintended memory</text>
  </g>
  <g>
    <rect x="190" y="167" width="180" height="44" rx="4" fill="#FFFFFF" stroke="#C62828" stroke-width="2"/>
    <text x="280" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">⚠ Latch on o_yellow</text>
    <text x="280" y="200" text-anchor="middle" font-size="9" fill="#666" font-style="italic">no assignment in S_YELLOW path</text>
  </g>
  <g>
    <rect x="190" y="219" width="180" height="44" rx="4" fill="#FFFFFF" stroke="#C62828" stroke-width="2"/>
    <text x="280" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">⚠ Latch on r_next_state</text>
    <text x="280" y="252" text-anchor="middle" font-size="9" fill="#666" font-style="italic">no default: case for illegal state</text>
  </g>

  <text x="280" y="280" text-anchor="middle" font-size="9.5" fill="#C62828" font-weight="700">
    Yosys: extra SB_DFFs appear in stat — that's the receipt.
  </text>

  <!-- Inputs (state still drives the box) -->
  <line x1="20" y1="170" x2="153" y2="170" stroke="#EF6C00" stroke-width="3" marker-end="url(#bg-state)"/>
  <text x="20" y="160" font-size="11" font-weight="700" fill="#EF6C00">r_state</text>

  <!-- Outputs — wavy/dashed to imply held value -->
  <line x1="405" y1="137" x2="525" y2="137" stroke="#43A047" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#bg-g)"/>
  <text x="448" y="129" font-size="11" font-weight="700" fill="#43A047">o_green</text>
  <text x="467" y="151" font-size="8" fill="#C62828" font-style="italic">(stuck?)</text>

  <line x1="405" y1="189" x2="525" y2="189" stroke="#FBC02D" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#bg-y)"/>
  <text x="448" y="181" font-size="11" font-weight="700" fill="#B8860B">o_yellow</text>
  <text x="467" y="203" font-size="8" fill="#C62828" font-style="italic">(stuck?)</text>

  <line x1="405" y1="241" x2="525" y2="241" stroke="#E53935" stroke-width="3" stroke-dasharray="4,3" marker-end="url(#bg-r)"/>
  <text x="448" y="233" font-size="11" font-weight="700" fill="#E53935">o_red</text>
  <text x="467" y="255" font-size="8" fill="#C62828" font-style="italic">(stuck?)</text>

  <!-- Footer -->
  <rect x="20" y="305" width="520" height="28" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="280" y="324" text-anchor="middle" font-size="10" fill="#C62828" font-weight="700">
    Fix: split into 3 blocks · default-assign every output · add default: case
  </text>
</svg>
