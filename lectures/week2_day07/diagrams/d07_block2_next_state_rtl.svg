<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar-state2" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7B1FA2"/></marker>
    <marker id="ar-timer"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#F57C00"/></marker>
    <marker id="ar-next2"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#00838F"/></marker>
  </defs>

  <text x="270" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    Block 2 — Next-State Logic (Combinational)
  </text>

  <!-- Comb logic box -->
  <rect x="160" y="60" width="240" height="220" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2.5"/>
  <text x="280" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#7B1FA2">case (r_state)</text>
  <text x="280" y="105" text-anchor="middle" font-size="9" fill="#888" font-style="italic">always @(*)</text>

  <!-- MUX-style internal hint -->
  <g font-size="9.5" font-family="JetBrains Mono, monospace">
    <rect x="180" y="118" width="200" height="22" rx="3" fill="#FFFFFF" stroke="#00838F" stroke-width="1"/>
    <text x="190" y="133" fill="#7B1FA2" font-weight="700">S_GREEN</text>
    <text x="252" y="133" fill="#555">: timer? →</text>
    <text x="338" y="133" fill="#7B1FA2" font-weight="700">S_YELLOW</text>

    <rect x="180" y="145" width="200" height="22" rx="3" fill="#FFFFFF" stroke="#00838F" stroke-width="1"/>
    <text x="190" y="160" fill="#7B1FA2" font-weight="700">S_YELLOW</text>
    <text x="259" y="160" fill="#555">: timer? →</text>
    <text x="345" y="160" fill="#7B1FA2" font-weight="700">S_RED</text>

    <rect x="180" y="172" width="200" height="22" rx="3" fill="#FFFFFF" stroke="#00838F" stroke-width="1"/>
    <text x="190" y="187" fill="#7B1FA2" font-weight="700">S_RED</text>
    <text x="232" y="187" fill="#555">: timer? →</text>
    <text x="318" y="187" fill="#7B1FA2" font-weight="700">S_GREEN</text>

    <rect x="180" y="199" width="200" height="22" rx="3" fill="#FAFAFA" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="190" y="214" fill="#666">default</text>
    <text x="252" y="214" fill="#555">: stay (= r_state)</text>
  </g>

  <text x="280" y="245" text-anchor="middle" font-size="9.5" fill="#C62828" font-style="italic">
    r_next_state = r_state;  // default first → no latch
  </text>
  <text x="280" y="263" text-anchor="middle" font-size="9" fill="#F9A825" font-weight="700">
    COMBINATIONAL
  </text>

  <!-- r_state input (deep orange) -->
  <line x1="20" y1="150" x2="158" y2="150" stroke="#7B1FA2" stroke-width="3" marker-end="url(#ar-state2)"/>
  <text x="20" y="140" font-size="11" font-weight="700" fill="#7B1FA2">r_state</text>
  <text x="20" y="166" font-size="9" fill="#888" font-style="italic">(from Block 1)</text>

  <!-- timer_done input (purple) -->
  <line x1="20" y1="200" x2="158" y2="200" stroke="#F57C00" stroke-width="3" marker-end="url(#ar-timer)"/>
  <text x="20" y="190" font-size="11" font-weight="700" fill="#F57C00">timer_done</text>

  <!-- r_next_state output (amber) -->
  <line x1="400" y1="170" x2="520" y2="170" stroke="#00838F" stroke-width="3" marker-end="url(#ar-next2)"/>
  <text x="430" y="160" font-size="11" font-weight="700" fill="#00838F">r_next_state</text>
  <text x="455" y="186" font-size="9" fill="#888" font-style="italic">→ to Block 1 D-pin</text>

  <!-- Caption -->
  <text x="270" y="305" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    Pure combinational decoder · case on current state, conditioned on inputs
  </text>
  <text x="270" y="322" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    Output is purely a function of inputs — never registered
  </text>
</svg>
