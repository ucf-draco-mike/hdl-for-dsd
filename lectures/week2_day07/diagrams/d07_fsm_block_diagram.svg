<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 410" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#333"/></marker>
    <marker id="arr-clk" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#00B8D4"/></marker>
    <marker id="arr-rst" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#E91E63"/></marker>
    <marker id="arr-state" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#EF6C00"/></marker>
    <marker id="arr-next"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#FFA000"/></marker>
    <marker id="arr-in"    markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7B1FA2"/></marker>
    <marker id="arr-out"   markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#43A047"/></marker>
    <marker id="arr-m"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#9C27B0"/></marker>
  </defs>

  <text x="390" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#333">3-Always-Block FSM Architecture (Moore)</text>

  <!-- OUTER FSM BOX -->
  <rect x="30" y="40" width="720" height="320" rx="12" fill="#FAFAFA" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="62" font-size="11" fill="#888" font-style="italic">FSM Module</text>

  <!-- INPUTS (purple — example: timer_done) -->
  <text x="10" y="160" font-size="12" fill="#7B1FA2" font-weight="600" text-anchor="end" transform="rotate(-90, 10, 160)">Inputs</text>
  <line x1="40" y1="190" x2="115" y2="190" stroke="#7B1FA2" stroke-width="2.5" marker-end="url(#arr-in)"/>
  <text x="78" y="183" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="700">e.g. timer_done</text>

  <!-- BLOCK 2: Next-State Logic -->
  <rect x="120" y="100" width="190" height="140" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="215" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Block 2</text>
  <text x="215" y="148" text-anchor="middle" font-size="11" fill="#555">Next-State Logic</text>
  <text x="215" y="168" text-anchor="middle" font-size="10" fill="#888" font-style="italic">always @(*)</text>
  <text x="215" y="188" text-anchor="middle" font-size="9" fill="#F9A825" font-weight="600">COMBINATIONAL</text>
  <text x="215" y="210" text-anchor="middle" font-size="8" fill="#C62828">default: r_next = r_state</text>

  <!-- Arrow Block2 → Block1 (next_state) -->
  <line x1="310" y1="170" x2="385" y2="170" stroke="#FFA000" stroke-width="2.5" marker-end="url(#arr-next)"/>
  <text x="348" y="160" text-anchor="middle" font-size="10" fill="#FFA000" font-weight="700">r_next_state</text>

  <!-- BLOCK 1: State Register -->
  <rect x="390" y="120" width="140" height="100" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="460" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Block 1</text>
  <text x="460" y="172" text-anchor="middle" font-size="11" fill="#555">State Register</text>
  <text x="460" y="190" text-anchor="middle" font-size="10" fill="#888" font-style="italic">always @(posedge clk)</text>
  <text x="460" y="206" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">SEQUENTIAL</text>

  <!-- Clock input to Block 1 -->
  <line x1="460" y1="280" x2="460" y2="225" stroke="#00B8D4" stroke-width="2.5" marker-end="url(#arr-clk)"/>
  <polygon points="448,220 460,210 472,220" fill="none" stroke="#00B8D4" stroke-width="1.5"/>
  <text x="460" y="298" text-anchor="middle" font-size="11" fill="#00B8D4" font-weight="700">i_clk</text>

  <!-- Reset to Block 1 -->
  <line x1="420" y1="280" x2="420" y2="225" stroke="#E91E63" stroke-width="2" marker-end="url(#arr-rst)"/>
  <text x="420" y="298" text-anchor="middle" font-size="10" fill="#E91E63" font-weight="700">i_reset</text>

  <!-- Feedback: Block1 → Block2 (current state) - rounded corners -->
  <path d="M 460,120 L 460,82 Q 460,75 453,75 L 137,75 Q 130,75 130,82 L 130,95"
        fill="none" stroke="#EF6C00" stroke-width="2.2" marker-end="url(#arr-state)"/>
  <text x="295" y="68" text-anchor="middle" font-size="10" fill="#EF6C00" font-weight="700">r_state (feedback)</text>

  <!-- Arrow Block1 → Block3 (current state) -->
  <line x1="530" y1="170" x2="580" y2="170" stroke="#EF6C00" stroke-width="2.5" marker-end="url(#arr-state)"/>
  <text x="555" y="160" text-anchor="middle" font-size="10" fill="#EF6C00" font-weight="700">r_state</text>

  <!-- BLOCK 3: Output Logic -->
  <rect x="585" y="100" width="150" height="140" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="660" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">Block 3</text>
  <text x="660" y="148" text-anchor="middle" font-size="11" fill="#555">Output Logic</text>
  <text x="660" y="168" text-anchor="middle" font-size="10" fill="#888" font-style="italic">always @(*)</text>
  <text x="660" y="188" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="600">COMBINATIONAL</text>
  <text x="660" y="210" text-anchor="middle" font-size="8" fill="#2E7D32">Moore: f(state) only</text>

  <!-- Output arrow -->
  <line x1="735" y1="170" x2="770" y2="170" stroke="#43A047" stroke-width="3" marker-end="url(#arr-out)"/>
  <text x="768" y="160" font-size="12" fill="#43A047" font-weight="700">Outputs</text>

  <!-- Mealy dashed path: tap from input bus, route cleanly below blocks, enter Block 3 from below -->
  <circle cx="90" cy="190" r="2.5" fill="#9C27B0"/>
  <path d="M 90,190 L 90,320 Q 90,330 100,330 L 650,330 Q 660,330 660,320 L 660,243"
        fill="none" stroke="#9C27B0" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr-m)"/>
  <text x="375" y="324" text-anchor="middle" font-size="9" fill="#9C27B0" font-style="italic">Mealy only — inputs also feed Block 3</text>

  <!-- Legend -->
  <rect x="40" y="370" width="700" height="28" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <g font-size="9" font-family="Inter, sans-serif">
    <line x1="55" y1="384" x2="78" y2="384" stroke="#00B8D4" stroke-width="2.5"/>
    <text x="82" y="388" fill="#00B8D4" font-weight="700">i_clk</text>
    <line x1="120" y1="384" x2="143" y2="384" stroke="#E91E63" stroke-width="2.5"/>
    <text x="147" y="388" fill="#E91E63" font-weight="700">i_reset</text>
    <line x1="195" y1="384" x2="218" y2="384" stroke="#7B1FA2" stroke-width="2.5"/>
    <text x="222" y="388" fill="#7B1FA2" font-weight="700">input (e.g. timer_done)</text>
    <line x1="370" y1="384" x2="393" y2="384" stroke="#EF6C00" stroke-width="2.5"/>
    <text x="397" y="388" fill="#EF6C00" font-weight="700">r_state</text>
    <line x1="455" y1="384" x2="478" y2="384" stroke="#FFA000" stroke-width="2.5"/>
    <text x="482" y="388" fill="#FFA000" font-weight="700">r_next_state</text>
    <line x1="567" y1="384" x2="590" y2="384" stroke="#43A047" stroke-width="2.5"/>
    <text x="594" y="388" fill="#43A047" font-weight="700">outputs</text>
    <line x1="650" y1="384" x2="673" y2="384" stroke="#9C27B0" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="677" y="388" fill="#9C27B0" font-weight="700">Mealy path</text>
  </g>
</svg>
