<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 290" font-family="Inter, sans-serif">
  <defs>
    <marker id="sg-state" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7B1FA2"/></marker>
    <marker id="sg-next"  markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#00838F"/></marker>
    <marker id="sg-clk"   markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#1976D2"/></marker>
    <marker id="sg-rst"   markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#D32F2F"/></marker>
    <marker id="sg-timer" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#F57C00"/></marker>
    <marker id="sg-g"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#2E7D32"/></marker>
    <marker id="sg-y"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#2E7D32"/></marker>
    <marker id="sg-r"     markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#2E7D32"/></marker>
  </defs>

  <text x="260" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">
    Synthesized Gates · 2 SB_DFF + 6 SB_LUT4 = whole traffic-light controller
  </text>

  <!-- LUT next-state cluster -->
  <g>
    <rect x="60" y="55" width="100" height="65" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
    <text x="110" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#7B1FA2">Next-State</text>
    <text x="110" y="93" text-anchor="middle" font-size="9" fill="#888">3 × SB_LUT4</text>
    <text x="110" y="110" text-anchor="middle" font-size="8" font-style="italic" fill="#666">case decode</text>
  </g>

  <!-- 2 DFFs (state register) -->
  <g>
    <rect x="220" y="55" width="80" height="40" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="260" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">SB_DFF</text>
    <text x="260" y="88" text-anchor="middle" font-size="8" fill="#7B1FA2" font-weight="700">r_state[0]</text>
    <polygon points="220,90 230,84 230,96" fill="none" stroke="#1565C0" stroke-width="1.3"/>

    <rect x="220" y="110" width="80" height="40" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <text x="260" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">SB_DFF</text>
    <text x="260" y="143" text-anchor="middle" font-size="8" fill="#7B1FA2" font-weight="700">r_state[1]</text>
    <polygon points="220,145 230,139 230,151" fill="none" stroke="#1565C0" stroke-width="1.3"/>
  </g>

  <!-- Output decoder LUTs -->
  <g>
    <rect x="365" y="55" width="100" height="65" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
    <text x="415" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#E65100">Out Decoder</text>
    <text x="415" y="93" text-anchor="middle" font-size="9" fill="#888">3 × SB_LUT4</text>
    <text x="415" y="110" text-anchor="middle" font-size="8" font-style="italic" fill="#666">one per output</text>
  </g>

  <!-- Inputs -->
  <line x1="10" y1="78" x2="58" y2="78" stroke="#F57C00" stroke-width="2.5" marker-end="url(#sg-timer)"/>
  <text x="10" y="70" font-size="9" font-weight="700" fill="#F57C00">timer_done</text>

  <line x1="170" y1="178" x2="240" y2="178" stroke="#1976D2" stroke-width="2.5" marker-end="url(#sg-clk)"/>
  <text x="195" y="170" text-anchor="middle" font-size="9" font-weight="700" fill="#1976D2">i_clk</text>
  <line x1="240" y1="178" x2="240" y2="152" stroke="#1976D2" stroke-width="2.5"/>
  <line x1="240" y1="178" x2="240" y2="170" stroke="#1976D2" stroke-width="2.5"/>
  <line x1="240" y1="160" x2="265" y2="160" stroke="#1976D2" stroke-width="2.5"/>
  <line x1="240" y1="100" x2="265" y2="100" stroke="#1976D2" stroke-width="2.5"/>

  <line x1="100" y1="178" x2="170" y2="178" stroke="#D32F2F" stroke-width="2"/>
  <text x="100" y="170" text-anchor="middle" font-size="9" font-weight="700" fill="#D32F2F">i_reset</text>

  <!-- Next-state → DFF.D -->
  <line x1="160" y1="80" x2="218" y2="75" stroke="#00838F" stroke-width="2" marker-end="url(#sg-next)"/>
  <line x1="160" y1="100" x2="218" y2="130" stroke="#00838F" stroke-width="2" marker-end="url(#sg-next)"/>
  <text x="185" y="68" font-size="8" fill="#00838F" font-weight="700">D</text>
  <text x="185" y="120" font-size="8" fill="#00838F" font-weight="700">D</text>

  <!-- DFF.Q → Output decoder -->
  <line x1="300" y1="75" x2="363" y2="78" stroke="#7B1FA2" stroke-width="2" marker-end="url(#sg-state)"/>
  <line x1="300" y1="130" x2="363" y2="100" stroke="#7B1FA2" stroke-width="2" marker-end="url(#sg-state)"/>
  <text x="332" y="71" font-size="8" font-weight="700" fill="#7B1FA2">s0</text>
  <text x="332" y="125" font-size="8" font-weight="700" fill="#7B1FA2">s1</text>

  <!-- DFF.Q feedback to Next-State -->
  <path d="M 300,95 L 320,95 L 320,200 L 60,200 L 60,105 L 58,105" fill="none" stroke="#7B1FA2" stroke-width="1.8" marker-end="url(#sg-state)"/>
  <text x="190" y="216" font-size="9" font-style="italic" fill="#7B1FA2" text-anchor="middle">r_state feedback</text>

  <!-- Outputs -->
  <line x1="465" y1="68" x2="510" y2="68" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#sg-g)"/>
  <text x="500" y="60" font-size="10" font-weight="700" fill="#2E7D32" text-anchor="end">o_green</text>

  <line x1="465" y1="88" x2="510" y2="88" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#sg-y)"/>
  <text x="500" y="103" font-size="10" font-weight="700" fill="#2E7D32" text-anchor="end">o_yellow</text>

  <line x1="465" y1="108" x2="510" y2="108" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#sg-r)"/>
  <text x="500" y="123" font-size="10" font-weight="700" fill="#2E7D32" text-anchor="end">o_red</text>

  <!-- Stat receipt -->
  <rect x="20" y="232" width="480" height="46" rx="5" fill="#FFFFFF" stroke="#27AE60" stroke-width="1.5"/>
  <text x="35" y="251" font-size="10" font-weight="700" fill="#27AE60">yosys stat receipt:</text>
  <text x="35" y="269" font-size="10" font-family="JetBrains Mono, monospace" fill="#333">
    SB_DFF: 2 (state)   ·   SB_LUT4: 6 (3 next + 3 output)   ·   total cells: 8
  </text>
</svg>
