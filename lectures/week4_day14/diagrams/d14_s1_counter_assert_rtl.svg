<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluCA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRedCA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aOrgCA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrnCA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aRoseCA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#AD1457"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">counter_with_assertions — immediate assertions tap the live signals</text>

  <rect x="30" y="40" width="700" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="45" y="60" font-size="12" font-weight="700" fill="#37474F">module counter_with_assertions</text>

  <!-- Inputs -->
  <text x="45" y="100" font-size="11" fill="#1976D2" font-weight="700">clk</text>
  <line x1="68" y1="95" x2="220" y2="95" stroke="#1976D2" stroke-width="2"/>
  <line x1="220" y1="95" x2="220" y2="120" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluCA)"/>

  <text x="45" y="135" font-size="11" fill="#D32F2F" font-weight="700">rst</text>
  <line x1="68" y1="130" x2="180" y2="130" stroke="#D32F2F" stroke-width="2" marker-end="url(#aRedCA)"/>

  <text x="45" y="170" font-size="11" fill="#F57C00" font-weight="700">en</text>
  <line x1="68" y1="165" x2="180" y2="165" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrgCA)"/>

  <!-- counter DFF -->
  <rect x="185" y="120" width="160" height="80" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="265" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">count[7:0]</text>
  <text x="265" y="163" text-anchor="middle" font-size="10" fill="#7B1FA2">8-bit D-FF reg</text>
  <text x="265" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">+1 when en</text>

  <!-- count output -->
  <line x1="345" y1="160" x2="500" y2="160" stroke="#2E7D32" stroke-width="2"/>
  <line x1="500" y1="160" x2="690" y2="160" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnCA)"/>
  <text x="697" y="164" font-size="11" fill="#2E7D32" font-weight="700">count</text>

  <!-- Tap to assertion checker -->
  <line x1="500" y1="160" x2="500" y2="220" stroke="#AD1457" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="500" y1="220" x2="430" y2="220" stroke="#AD1457" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#aRoseCA)"/>

  <rect x="245" y="220" width="200" height="50" rx="8" fill="#FCE4EC" stroke="#AD1457" stroke-width="2.5"/>
  <text x="345" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#AD1457">immediate assertions</text>
  <text x="345" y="256" text-anchor="middle" font-size="9" fill="#AD1457">count !== 8'hXX  &amp;  &lt; 8'hFF</text>

  <!-- clk tap into assertion block -->
  <line x1="220" y1="220" x2="245" y2="220" stroke="#1976D2" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="220" y1="95" x2="220" y2="220" stroke="#1976D2" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Errors out -->
  <line x1="445" y1="240" x2="540" y2="240" stroke="#AD1457" stroke-width="2" marker-end="url(#aRoseCA)"/>
  <text x="550" y="244" font-size="10" fill="#AD1457" font-weight="700">$error / $warning</text>
</svg>
