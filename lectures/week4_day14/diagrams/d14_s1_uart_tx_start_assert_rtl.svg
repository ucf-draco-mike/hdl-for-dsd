<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluUA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aMagUA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
    <marker id="aGrnUA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aRoseUA" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#AD1457"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">$rose(o_busy) |=&gt; (!o_tx_line)[*CLKS_PER_BIT] — start-bit length check</text>

  <rect x="30" y="40" width="700" height="220" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- DUT -->
  <rect x="45" y="55" width="240" height="180" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="165" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">uart_tx (DUT)</text>
  <text x="60" y="110" font-size="11" fill="#1976D2" font-weight="700">clk</text>
  <text x="60" y="140" font-size="11" fill="#C2185B" font-weight="700">o_busy</text>
  <text x="60" y="170" font-size="11" fill="#2E7D32" font-weight="700">o_tx_line</text>
  <text x="165" y="215" text-anchor="middle" font-size="9" fill="#888" font-style="italic">CLKS_PER_BIT cycles per bit</text>

  <!-- Taps -->
  <line x1="285" y1="105" x2="370" y2="105" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluUA)"/>
  <line x1="285" y1="135" x2="370" y2="135" stroke="#C2185B" stroke-width="2" marker-end="url(#aMagUA)"/>
  <line x1="285" y1="165" x2="370" y2="165" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnUA)"/>

  <!-- Assertion checker block -->
  <rect x="375" y="65" width="320" height="180" rx="10" fill="#FCE4EC" stroke="#AD1457" stroke-width="2.5"/>
  <text x="535" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#AD1457">a_start_bit (concurrent assertion)</text>

  <text x="390" y="118" font-size="10" fill="#AD1457">trigger:  $rose(</text>
  <text x="467" y="118" font-size="10" fill="#C2185B" font-weight="700">o_busy</text>
  <text x="503" y="118" font-size="10" fill="#AD1457">)</text>

  <text x="390" y="138" font-size="10" fill="#AD1457">expect: next CLKS_PER_BIT cycles,</text>
  <text x="397" y="154" font-size="10" fill="#2E7D32" font-weight="700">o_tx_line</text>
  <text x="453" y="154" font-size="10" fill="#AD1457">stays low</text>

  <text x="390" y="182" font-size="9" fill="#888" font-style="italic">repetition operator [*N]: hold value N consecutive cycles</text>

  <line x1="535" y1="205" x2="715" y2="205" stroke="#AD1457" stroke-width="2" marker-end="url(#aRoseUA)"/>
  <text x="725" y="209" font-size="10" fill="#AD1457" font-weight="700">$error</text>

  <text x="380" y="295" text-anchor="middle" font-size="9" fill="#555" font-style="italic">If start bit is 216 cycles (off-by-one), assertion fires immediately — testbench would have missed it</text>
</svg>
