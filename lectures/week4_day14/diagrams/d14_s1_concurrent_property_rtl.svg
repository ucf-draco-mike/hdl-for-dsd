<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluCp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRedCp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aMagCp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
    <marker id="aRoseCp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#AD1457"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">concurrent property — handshake: valid → ready within 1..10 cycles</text>

  <rect x="30" y="40" width="700" height="260" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="45" y="60" font-size="11" font-weight="700" fill="#37474F">property p_handshake: @(posedge clk) disable iff (rst) valid |-&gt; ##[1:10] ready;</text>

  <!-- DUT box -->
  <rect x="45" y="80" width="260" height="200" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="175" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">DUT (handshake module)</text>

  <text x="60" y="135" font-size="11" fill="#1976D2" font-weight="700">clk</text>
  <text x="60" y="170" font-size="11" fill="#D32F2F" font-weight="700">rst</text>
  <text x="60" y="205" font-size="11" fill="#C2185B" font-weight="700">valid</text>
  <text x="60" y="240" font-size="11" fill="#C2185B" font-weight="700">ready</text>

  <text x="175" y="265" text-anchor="middle" font-size="9" fill="#888" font-style="italic">drives signals each cycle</text>

  <!-- Taps -->
  <line x1="305" y1="130" x2="370" y2="130" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluCp)"/>
  <line x1="305" y1="165" x2="370" y2="165" stroke="#D32F2F" stroke-width="2" marker-end="url(#aRedCp)"/>
  <line x1="305" y1="200" x2="370" y2="200" stroke="#C2185B" stroke-width="2" marker-end="url(#aMagCp)"/>
  <line x1="305" y1="235" x2="370" y2="235" stroke="#C2185B" stroke-width="2" marker-end="url(#aMagCp)"/>

  <!-- Property block -->
  <rect x="375" y="100" width="280" height="180" rx="10" fill="#FCE4EC" stroke="#AD1457" stroke-width="2.5"/>
  <text x="515" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#AD1457">p_handshake (assertion)</text>
  <text x="515" y="142" text-anchor="middle" font-size="10" fill="#AD1457" font-style="italic">monitors every clock</text>

  <text x="385" y="170" font-size="10" fill="#AD1457">on  rose(valid)  ⇒</text>
  <text x="395" y="186" font-size="10" fill="#AD1457">within 1..10 cycles,</text>
  <text x="395" y="202" font-size="10" fill="#AD1457">ready must rise.</text>

  <text x="385" y="230" font-size="9" fill="#888" font-style="italic">disable iff (rst): paused during reset</text>
  <text x="385" y="245" font-size="9" fill="#888" font-style="italic">|-&gt; same cycle, ##N N later</text>

  <!-- Output: a_handshake -->
  <line x1="655" y1="190" x2="715" y2="190" stroke="#AD1457" stroke-width="2" marker-end="url(#aRoseCp)"/>
  <text x="720" y="194" font-size="10" fill="#AD1457" font-weight="700">$error</text>

  <text x="380" y="296" text-anchor="middle" font-size="9" fill="#555" font-style="italic">assertions tap signals non-invasively — DUT unchanged, errors fire at exact cycle</text>
</svg>
