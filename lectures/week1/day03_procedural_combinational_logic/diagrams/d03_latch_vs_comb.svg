<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" font-family="Inter, Arial, sans-serif">
  <rect width="750" height="300" rx="12" fill="#FAFAFA" stroke="#DDD"/>
  <text x="375" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Latch (Unintentional) vs. Combinational (Intended)</text>
  <!-- LEFT: Latch -->
  <g transform="translate(30,50)">
    <rect x="0" y="0" width="320" height="220" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">✗ Incomplete — Latch Inferred</text>
    <text x="20" y="52" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">always @(*) begin</text>
    <text x="20" y="70" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">  if (sel)</text>
    <text x="20" y="88" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">    y = a;</text>
    <text x="20" y="106" font-size="11" font-family="JetBrains Mono, monospace" fill="#888">  // no else!</text>
    <text x="20" y="124" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">end</text>
    <!-- Latch symbol -->
    <rect x="180" y="68" width="110" height="60" rx="4" fill="#FFF" stroke="#C62828" stroke-width="2"/>
    <text x="235" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#C62828">LATCH</text>
    <text x="235" y="114" text-anchor="middle" font-size="10" fill="#C62828">transparent!</text>
    <text x="20" y="155" font-size="10" fill="#C62828">When sel=0, y holds old value</text>
    <text x="20" y="172" font-size="10" fill="#C62828">→ synthesizer infers latch</text>
    <text x="20" y="200" font-size="11" fill="#C62828" font-weight="600">⚠ Yosys warning:</text>
    <text x="20" y="215" font-size="9" fill="#888" font-family="JetBrains Mono, monospace">Warning: Latch inferred for signal `\y'</text>
  </g>
  <!-- RIGHT: Correct -->
  <g transform="translate(400,50)">
    <rect x="0" y="0" width="320" height="220" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">✓ Complete — Pure Combinational</text>
    <text x="20" y="52" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">always @(*) begin</text>
    <text x="20" y="70" font-size="11" font-family="JetBrains Mono, monospace" fill="#2E7D32" font-weight="600">  y = 4'b0000; // default!</text>
    <text x="20" y="88" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">  if (sel)</text>
    <text x="20" y="106" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">    y = a;</text>
    <text x="20" y="124" font-size="11" font-family="JetBrains Mono, monospace" fill="#333">end</text>
    <!-- MUX symbol -->
    <polygon points="200,70 280,90 280,120 200,140" fill="#FFF" stroke="#2E7D32" stroke-width="2"/>
    <text x="240" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">MUX</text>
    <text x="20" y="168" font-size="10" fill="#2E7D32">When sel=0, y = default (0)</text>
    <text x="20" y="185" font-size="10" fill="#2E7D32">→ pure combinational logic</text>
    <text x="20" y="210" font-size="11" fill="#2E7D32" font-weight="600">No warnings, clean synthesis</text>
  </g>
</svg>