<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, Segoe UI, Helvetica Neue, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5F6062"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Source box at top center -->
  <rect x="325" y="16" width="250" height="56" rx="8" fill="#FFF8E1" stroke="#FFC904" stroke-width="3" filter="url(#shadow)"/>
  <text x="450" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#2C2A29">Verilog Source</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#5F6062">module.v</text>

  <!-- Split arrows -->
  <line x1="370" y1="72" x2="200" y2="120" stroke="#5F6062" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="72" x2="700" y2="120" stroke="#5F6062" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══ SYNTHESIS PATH (left) ═══ -->
  <rect x="40" y="105" width="340" height="370" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
  <text x="210" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">⚙️  SYNTHESIS PATH — makes hardware</text>

  <rect x="110" y="148" width="200" height="48" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">Yosys</text>
  <text x="210" y="186" text-anchor="middle" font-size="10" fill="#5F6062">synth_ice40 → netlist</text>

  <line x1="210" y1="196" x2="210" y2="218" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="222" width="200" height="48" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">nextpnr-ice40</text>
  <text x="210" y="260" text-anchor="middle" font-size="10" fill="#5F6062">Place &amp; Route</text>

  <line x1="210" y1="270" x2="210" y2="292" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="296" width="200" height="48" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="318" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">icepack</text>
  <text x="210" y="334" text-anchor="middle" font-size="10" fill="#5F6062">Bitstream generation</text>

  <line x1="210" y1="344" x2="210" y2="366" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="110" y="370" width="200" height="48" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="392" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">iceprog</text>
  <text x="210" y="408" text-anchor="middle" font-size="10" fill="#5F6062">Program via USB</text>

  <line x1="210" y1="418" x2="210" y2="448" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FPGA result -->
  <rect x="130" y="452" width="160" height="44" rx="22" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <text x="210" y="479" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">⬡ Running on FPGA</text>

  <!-- ═══ SIMULATION PATH (right) ═══ -->
  <rect x="520" y="105" width="340" height="260" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2" opacity="0.5"/>
  <text x="690" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">🔍  SIMULATION PATH — tests behavior</text>

  <rect x="590" y="148" width="200" height="48" rx="6" fill="#fff" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">Icarus Verilog</text>
  <text x="690" y="186" text-anchor="middle" font-size="10" fill="#5F6062">iverilog → vvp</text>

  <line x1="690" y1="196" x2="690" y2="218" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="590" y="222" width="200" height="48" rx="6" fill="#fff" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="244" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2A29">GTKWave</text>
  <text x="690" y="260" text-anchor="middle" font-size="10" fill="#5F6062">Waveform viewer</text>

  <line x1="690" y1="270" x2="690" y2="316" stroke="#5F6062" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Waveform result -->
  <rect x="610" y="320" width="160" height="44" rx="22" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" filter="url(#shadow)"/>
  <text x="690" y="347" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">📊 Verified Waveforms</text>

  <!-- Annotation -->
  <text x="690" y="400" text-anchor="middle" font-size="11" fill="#5F6062" font-style="italic">$display, #delay, $dumpvars</text>
  <text x="690" y="416" text-anchor="middle" font-size="11" fill="#5F6062" font-style="italic">work here — NOT in synthesis</text>
</svg>
