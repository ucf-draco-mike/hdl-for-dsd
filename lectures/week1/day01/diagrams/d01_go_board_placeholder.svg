<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Inter, Segoe UI, Helvetica Neue, sans-serif">
  <defs>
    <filter id="bs" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- PCB board -->
  <rect x="80" y="30" width="540" height="420" rx="12" fill="#1B5E20" stroke="#0D3B12" stroke-width="3" filter="url(#bs)"/>

  <!-- Title -->
  <text x="350" y="68" text-anchor="middle" font-size="22" font-weight="700" fill="#FFC904">Nandland Go Board</text>
  <text x="350" y="88" text-anchor="middle" font-size="12" fill="#A5D6A7">Lattice iCE40 HX1K · VQ100</text>

  <!-- FPGA chip (center) -->
  <rect x="260" y="170" width="180" height="120" rx="4" fill="#212121" stroke="#424242" stroke-width="2"/>
  <text x="350" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#B0BEC5">iCE40</text>
  <text x="350" y="240" text-anchor="middle" font-size="12" fill="#78909C">HX1K</text>
  <text x="350" y="260" text-anchor="middle" font-size="10" fill="#546E7A">1,280 LUTs · 16 EBR</text>
  <!-- Pin 1 dot -->
  <circle cx="274" cy="184" r="3" fill="#FFC904"/>

  <!-- 4 LEDs (top right area) -->
  <g transform="translate(480, 120)">
    <text x="35" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#A5D6A7">4 LEDs</text>
    <circle cx="0" cy="10" r="8" fill="#F44336" opacity="0.8"/><text x="0" y="32" text-anchor="middle" font-size="8" fill="#C8E6C9">D1</text>
    <circle cx="24" cy="10" r="8" fill="#4CAF50" opacity="0.8"/><text x="24" y="32" text-anchor="middle" font-size="8" fill="#C8E6C9">D2</text>
    <circle cx="48" cy="10" r="8" fill="#2196F3" opacity="0.8"/><text x="48" y="32" text-anchor="middle" font-size="8" fill="#C8E6C9">D3</text>
    <circle cx="72" cy="10" r="8" fill="#FF9800" opacity="0.8"/><text x="72" y="32" text-anchor="middle" font-size="8" fill="#C8E6C9">D4</text>
  </g>

  <!-- 4 Buttons (top left area) -->
  <g transform="translate(110, 120)">
    <text x="35" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#A5D6A7">4 Buttons</text>
    <rect x="-4" y="0" width="18" height="18" rx="3" fill="#37474F" stroke="#546E7A" stroke-width="1"/><text x="5" y="28" text-anchor="middle" font-size="8" fill="#C8E6C9">S1</text>
    <rect x="20" y="0" width="18" height="18" rx="3" fill="#37474F" stroke="#546E7A" stroke-width="1"/><text x="29" y="28" text-anchor="middle" font-size="8" fill="#C8E6C9">S2</text>
    <rect x="44" y="0" width="18" height="18" rx="3" fill="#37474F" stroke="#546E7A" stroke-width="1"/><text x="53" y="28" text-anchor="middle" font-size="8" fill="#C8E6C9">S3</text>
    <rect x="68" y="0" width="18" height="18" rx="3" fill="#37474F" stroke="#546E7A" stroke-width="1"/><text x="77" y="28" text-anchor="middle" font-size="8" fill="#C8E6C9">S4</text>
  </g>

  <!-- Dual 7-segment displays -->
  <g transform="translate(280, 320)">
    <text x="70" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="#A5D6A7">Dual 7-Segment</text>
    <rect x="10" y="0" width="50" height="68" rx="4" fill="#111" stroke="#333" stroke-width="1.5"/>
    <text x="35" y="46" text-anchor="middle" font-size="32" font-weight="700" fill="#F44336" opacity="0.7">8</text>
    <rect x="80" y="0" width="50" height="68" rx="4" fill="#111" stroke="#333" stroke-width="1.5"/>
    <text x="105" y="46" text-anchor="middle" font-size="32" font-weight="700" fill="#F44336" opacity="0.7">8</text>
  </g>

  <!-- USB connector (bottom) -->
  <rect x="310" y="416" width="80" height="28" rx="4" fill="#546E7A" stroke="#37474F" stroke-width="1.5"/>
  <text x="350" y="435" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">USB</text>
  <text x="350" y="464" text-anchor="middle" font-size="10" fill="#A5D6A7">FTDI: program + UART</text>

  <!-- VGA connector (left side) -->
  <rect x="80" y="230" width="28" height="48" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="94" y="260" text-anchor="middle" font-size="9" font-weight="600" fill="#fff" transform="rotate(-90,94,258)">VGA</text>
  <text x="32" y="258" text-anchor="middle" font-size="10" fill="#A5D6A7" transform="rotate(-90,32,258)">VGA output</text>

  <!-- PHOTO PLACEHOLDER overlay -->
  <rect x="80" y="30" width="540" height="420" rx="12" fill="none" stroke="#FFC904" stroke-width="3" stroke-dasharray="12 6"/>
  <rect x="200" y="395" width="300" height="30" rx="6" fill="#FFC904" opacity="0.9"/>
  <text x="350" y="416" text-anchor="middle" font-size="13" font-weight="700" fill="#000">📷 Replace with actual board photo</text>
</svg>
