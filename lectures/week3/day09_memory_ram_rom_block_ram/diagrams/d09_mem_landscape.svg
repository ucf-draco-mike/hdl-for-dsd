<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="370" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">iCE40 Memory Landscape</text>

  <!-- LUT RAM -->
  <rect x="30" y="50" width="200" height="100" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="130" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">Distributed (LUT) RAM</text>
  <text x="130" y="95" text-anchor="middle" font-size="10" fill="#555">1,280 LUTs available</text>
  <text x="130" y="112" text-anchor="middle" font-size="9" fill="#888">Small tables (&lt;64 bits)</text>
  <text x="130" y="128" text-anchor="middle" font-size="9" fill="#888">Async read → combinational</text>
  <text x="130" y="145" text-anchor="middle" font-size="9" fill="#C62828" font-weight="600">Costs LUTs from logic budget</text>

  <!-- Block RAM -->
  <rect x="270" y="50" width="200" height="100" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="370" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">Block RAM (EBR)</text>
  <text x="370" y="95" text-anchor="middle" font-size="10" fill="#555">16 blocks × 4 Kbit = 64 Kbit</text>
  <text x="370" y="112" text-anchor="middle" font-size="9" fill="#888">Larger memories (256+ entries)</text>
  <text x="370" y="128" text-anchor="middle" font-size="9" fill="#888">Sync read → 1 cycle latency</text>
  <text x="370" y="145" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="600">Dedicated silicon — free LUTs</text>

  <!-- External -->
  <rect x="510" y="50" width="200" height="100" rx="8" fill="#F5F5F5" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="610" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#666">External Memory</text>
  <text x="610" y="95" text-anchor="middle" font-size="10" fill="#888">Flash, EEPROM, SRAM</text>
  <text x="610" y="112" text-anchor="middle" font-size="9" fill="#888">Requires I/O pins + protocol</text>
  <text x="610" y="128" text-anchor="middle" font-size="9" fill="#888">Much larger capacity</text>
  <text x="610" y="145" text-anchor="middle" font-size="9" fill="#999" font-style="italic">Beyond our scope</text>

  <!-- Size arrow at bottom -->
  <line x1="60" y1="190" x2="680" y2="190" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="210" text-anchor="middle" font-size="11" fill="#333" font-weight="600">Increasing capacity →</text>
  <text x="60" y="210" font-size="9" fill="#888">Bits</text>
  <text x="640" y="210" font-size="9" fill="#888">Megabytes</text>

  <!-- Key insight -->
  <rect x="120" y="230" width="500" height="35" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="370" y="250" text-anchor="middle" font-size="10" fill="#333" font-weight="600">The key to EBR inference: synchronous read (register the output).</text>
  <text x="370" y="262" text-anchor="middle" font-size="9" fill="#555">Same Verilog code → different implementation based on read style.</text>
</svg>
