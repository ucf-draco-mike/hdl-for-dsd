<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" font-family="Inter, sans-serif">
  <text x="380" y="18" text-anchor="middle" font-size="14" font-weight="700" fill="#333">UART Frame — 8N1 (Byte 0x48 = &apos;H&apos;)</text>

  <!-- Signal line -->
  <!-- Idle HIGH -->
  <line x1="20" y1="60" x2="70" y2="60" stroke="#1565C0" stroke-width="2.5"/>
  <!-- Start bit: falling edge + LOW -->
  <line x1="70" y1="60" x2="70" y2="120" stroke="#C62828" stroke-width="2.5"/>
  <line x1="70" y1="120" x2="120" y2="120" stroke="#C62828" stroke-width="2.5"/>

  <!-- Data bits: 0x48 = 01001000, LSB first = 0,0,0,1,0,0,1,0 -->
  <!-- D0=0 LOW -->
  <line x1="120" y1="120" x2="170" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- D1=0 LOW -->
  <line x1="170" y1="120" x2="220" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- D2=0 LOW -->
  <line x1="220" y1="120" x2="270" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- D3=1 HIGH -->
  <line x1="270" y1="120" x2="270" y2="60" stroke="#333" stroke-width="2.5"/>
  <line x1="270" y1="60" x2="320" y2="60" stroke="#333" stroke-width="2.5"/>
  <!-- D4=0 LOW -->
  <line x1="320" y1="60" x2="320" y2="120" stroke="#333" stroke-width="2.5"/>
  <line x1="320" y1="120" x2="370" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- D5=0 LOW -->
  <line x1="370" y1="120" x2="420" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- D6=1 HIGH -->
  <line x1="420" y1="120" x2="420" y2="60" stroke="#333" stroke-width="2.5"/>
  <line x1="420" y1="60" x2="470" y2="60" stroke="#333" stroke-width="2.5"/>
  <!-- D7=0 LOW -->
  <line x1="470" y1="60" x2="470" y2="120" stroke="#333" stroke-width="2.5"/>
  <line x1="470" y1="120" x2="520" y2="120" stroke="#333" stroke-width="2.5"/>

  <!-- Stop bit HIGH -->
  <line x1="520" y1="120" x2="520" y2="60" stroke="#2E7D32" stroke-width="2.5"/>
  <line x1="520" y1="60" x2="570" y2="60" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Idle continues -->
  <line x1="570" y1="60" x2="740" y2="60" stroke="#1565C0" stroke-width="2.5"/>

  <!-- Labels -->
  <text x="45" y="52" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">IDLE</text>
  <text x="95" y="140" text-anchor="middle" font-size="9" fill="#C62828" font-weight="600">START</text>
  <text x="95" y="152" text-anchor="middle" font-size="8" fill="#C62828">(0)</text>

  <!-- Data bit labels -->
  <text x="145" y="140" text-anchor="middle" font-size="8" fill="#555">D0</text>
  <text x="145" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="195" y="140" text-anchor="middle" font-size="8" fill="#555">D1</text>
  <text x="195" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="245" y="140" text-anchor="middle" font-size="8" fill="#555">D2</text>
  <text x="245" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="295" y="52" text-anchor="middle" font-size="8" fill="#555">D3</text>
  <text x="295" y="44" text-anchor="middle" font-size="7" fill="#888">1</text>
  <text x="345" y="140" text-anchor="middle" font-size="8" fill="#555">D4</text>
  <text x="345" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="395" y="140" text-anchor="middle" font-size="8" fill="#555">D5</text>
  <text x="395" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="445" y="52" text-anchor="middle" font-size="8" fill="#555">D6</text>
  <text x="445" y="44" text-anchor="middle" font-size="7" fill="#888">1</text>
  <text x="495" y="140" text-anchor="middle" font-size="8" fill="#555">D7</text>
  <text x="495" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>

  <text x="545" y="52" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="600">STOP</text>
  <text x="545" y="44" text-anchor="middle" font-size="7" fill="#2E7D32">(1)</text>
  <text x="660" y="52" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">IDLE</text>

  <!-- Logic level labels -->
  <text x="12" y="63" text-anchor="end" font-size="8" fill="#888">1</text>
  <text x="12" y="123" text-anchor="end" font-size="8" fill="#888">0</text>

  <!-- LSB first annotation -->
  <line x1="125" y1="162" x2="515" y2="162" stroke="#F9A825" stroke-width="1"/>
  <line x1="125" y1="158" x2="125" y2="166" stroke="#F9A825" stroke-width="1"/>
  <line x1="515" y1="158" x2="515" y2="166" stroke="#F9A825" stroke-width="1"/>
  <text x="320" y="175" text-anchor="middle" font-size="9" fill="#F9A825" font-weight="600">LSB first → 0x48 on wire: 0,0,0,1,0,0,1,0</text>
</svg>
