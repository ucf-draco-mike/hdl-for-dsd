<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="Inter, sans-serif">
  <text x="360" y="18" text-anchor="middle" font-size="14" font-weight="700" fill="#333">16× Oversampling — Center-of-Bit Sampling</text>

  <!-- Bit period bracket -->
  <line x1="40" y1="40" x2="680" y2="40" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="40" y1="36" x2="40" y2="44" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="680" y1="36" x2="680" y2="44" stroke="#1565C0" stroke-width="1.5"/>
  <text x="360" y="34" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">1 bit period (217 clocks at 25 MHz / 115200 baud)</text>

  <!-- Data signal (a stable bit) -->
  <line x1="30" y1="80" x2="700" y2="80" stroke="#333" stroke-width="2.5"/>
  <text x="15" y="83" text-anchor="end" font-size="8" fill="#888">RX</text>
  <text x="360" y="72" text-anchor="middle" font-size="9" fill="#888" font-style="italic">stable bit value</text>

  <!-- 16 oversample ticks -->
  <line x1="40" y1="95" x2="680" y2="95" stroke="#DDD" stroke-width="0.5"/>
  <g font-size="7" fill="#999" text-anchor="middle">
    <text x="60" y="112">0</text>   <line x1="60" y1="88" x2="60" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="100" y="112">1</text>  <line x1="100" y1="88" x2="100" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="140" y="112">2</text>  <line x1="140" y1="88" x2="140" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="180" y="112">3</text>  <line x1="180" y1="88" x2="180" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="220" y="112">4</text>  <line x1="220" y1="88" x2="220" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="260" y="112">5</text>  <line x1="260" y1="88" x2="260" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="300" y="112">6</text>  <line x1="300" y1="88" x2="300" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="340" y="112">7</text>  <line x1="340" y1="88" x2="340" y2="105" stroke="#C62828" stroke-width="2"/>
    <text x="380" y="112">8</text>  <line x1="380" y1="88" x2="380" y2="105" stroke="#C62828" stroke-width="2"/>
    <text x="420" y="112">9</text>  <line x1="420" y1="88" x2="420" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="460" y="112">10</text> <line x1="460" y1="88" x2="460" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="500" y="112">11</text> <line x1="500" y1="88" x2="500" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="540" y="112">12</text> <line x1="540" y1="88" x2="540" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="580" y="112">13</text> <line x1="580" y1="88" x2="580" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="620" y="112">14</text> <line x1="620" y1="88" x2="620" y2="100" stroke="#CCC" stroke-width="1"/>
    <text x="660" y="112">15</text> <line x1="660" y1="88" x2="660" y2="100" stroke="#CCC" stroke-width="1"/>
  </g>

  <!-- Center highlight -->
  <rect x="330" y="86" width="60" height="28" rx="4" fill="none" stroke="#C62828" stroke-width="2"/>
  <text x="360" y="130" text-anchor="middle" font-size="9" fill="#C62828" font-weight="700">↑ SAMPLE HERE (center)</text>

  <!-- Annotation -->
  <rect x="120" y="150" width="480" height="36" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="360" y="166" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Oversample tick rate: 25 MHz ÷ (115200 × 16) ≈ 13-14 system clocks per tick</text>
  <text x="360" y="180" text-anchor="middle" font-size="8" fill="#555">Center sampling → maximum tolerance for baud mismatch and noise</text>
</svg>
