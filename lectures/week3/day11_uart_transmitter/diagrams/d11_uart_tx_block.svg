<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <text x="350" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#333">UART TX — FSM + Datapath Architecture</text>

  <!-- Outer module box -->
  <rect x="120" y="35" width="460" height="230" rx="10" fill="#FAFAFA" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="135" y="55" font-size="10" fill="#888" font-style="italic">uart_tx module</text>

  <!-- Input arrows -->
  <line x1="30" y1="100" x2="155" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="30" y="92" font-size="9" fill="#333" font-weight="600">i_data[7:0]</text>
  <line x1="30" y1="140" x2="155" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="30" y="132" font-size="9" fill="#333" font-weight="600">i_valid</text>

  <!-- FSM block -->
  <rect x="160" y="70" width="140" height="100" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="230" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">FSM</text>
  <text x="230" y="115" text-anchor="middle" font-size="9" fill="#555">(control)</text>
  <text x="230" y="135" text-anchor="middle" font-size="8" fill="#888">IDLE → START</text>
  <text x="230" y="147" text-anchor="middle" font-size="8" fill="#888">→ DATA ×8 → STOP</text>

  <!-- o_busy output from FSM -->
  <line x1="160" y1="160" x2="110" y2="160" stroke="#C62828" stroke-width="1.5"/>
  <line x1="110" y1="160" x2="110" y2="220" stroke="#C62828" stroke-width="1.5"/>
  <line x1="110" y1="220" x2="30" y2="220" stroke="#C62828" stroke-width="1.5"/>
  <text x="30" y="212" font-size="9" fill="#C62828" font-weight="600">o_busy</text>

  <!-- Control signals FSM → Datapath -->
  <line x1="300" y1="90" x2="370" y2="90" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="335" y="82" text-anchor="middle" font-size="7" fill="#1565C0">load_en</text>
  <line x1="300" y1="110" x2="370" y2="110" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="335" y="105" text-anchor="middle" font-size="7" fill="#1565C0">shift_en</text>

  <!-- PISO Shift Register -->
  <rect x="375" y="65" width="140" height="60" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="445" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#333">PISO Shift Reg</text>
  <text x="445" y="102" text-anchor="middle" font-size="8" fill="#888">{stop, D[7:0], start}</text>

  <!-- TX output -->
  <line x1="515" y1="95" x2="610" y2="95" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="630" y="98" font-size="11" fill="#2E7D32" font-weight="700">o_tx</text>

  <!-- Baud Counter -->
  <rect x="375" y="150" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="445" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#333">Baud Counter</text>
  <text x="445" y="188" text-anchor="middle" font-size="8" fill="#888">mod-217 (115200 baud)</text>

  <!-- Baud tick feedback to FSM -->
  <line x1="375" y1="178" x2="340" y2="178" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="340" y1="178" x2="340" y2="140" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="340" y1="140" x2="300" y2="140" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="320" y="170" text-anchor="middle" font-size="7" fill="#2E7D32" font-weight="600">baud_tick</text>

  <!-- Clock input -->
  <line x1="350" y1="278" x2="350" y2="260" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="350" y="290" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="600">i_clk (25 MHz)</text>

  <!-- Legend -->
  <rect x="460" y="230" width="110" height="30" rx="4" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <text x="515" y="245" text-anchor="middle" font-size="7" fill="#555">Building blocks:</text>
  <text x="515" y="255" text-anchor="middle" font-size="7" fill="#888">Day 5 + Day 7</text>
</svg>
