<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, sans-serif">
  <text x="360" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Three Generation Strategies</text>
  <text x="360" y="40" text-anchor="middle" font-size="11" fill="#666">today we hand-write directed cases and pure random — constrained-random comes later</text>

  <!-- Directed -->
  <rect x="30" y="65" width="210" height="225" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="135" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">① Directed</text>
  <text x="135" y="108" text-anchor="middle" font-size="9" font-style="italic" fill="#555">hand-picked cases</text>
  <!-- mini scatter -->
  <rect x="50" y="118" width="170" height="80" fill="#fff" stroke="#bbb"/>
  <circle cx="60" cy="190" r="3" fill="#1565C0"/>
  <text x="60" y="210" text-anchor="middle" font-size="8" fill="#1565C0">0+0</text>
  <circle cx="210" cy="125" r="3" fill="#1565C0"/>
  <text x="200" y="118" font-size="8" fill="#1565C0">max</text>
  <circle cx="135" cy="125" r="3" fill="#1565C0"/>
  <text x="135" y="118" text-anchor="middle" font-size="8" fill="#1565C0">overflow</text>
  <circle cx="200" cy="190" r="3" fill="#1565C0"/>
  <text x="200" y="210" text-anchor="middle" font-size="8" fill="#1565C0">carry</text>
  <text x="135" y="232" text-anchor="middle" font-size="10" fill="#333" font-weight="600">~10s of cases</text>
  <text x="135" y="250" text-anchor="middle" font-size="9" fill="#555">corners you know</text>
  <text x="135" y="266" text-anchor="middle" font-size="9" fill="#555">precise · auditable</text>
  <text x="135" y="282" text-anchor="middle" font-size="9" font-style="italic" fill="#888">used today (s2, s3)</text>

  <!-- Random -->
  <rect x="255" y="65" width="210" height="225" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="360" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">② Random</text>
  <text x="360" y="108" text-anchor="middle" font-size="9" font-style="italic" fill="#555">uniform across full range</text>
  <rect x="275" y="118" width="170" height="80" fill="#fff" stroke="#bbb"/>
  <!-- random scatter -->
  <circle cx="290" cy="165" r="2" fill="#2E7D32"/>
  <circle cx="305" cy="140" r="2" fill="#2E7D32"/>
  <circle cx="320" cy="180" r="2" fill="#2E7D32"/>
  <circle cx="335" cy="130" r="2" fill="#2E7D32"/>
  <circle cx="350" cy="160" r="2" fill="#2E7D32"/>
  <circle cx="365" cy="150" r="2" fill="#2E7D32"/>
  <circle cx="380" cy="175" r="2" fill="#2E7D32"/>
  <circle cx="395" cy="145" r="2" fill="#2E7D32"/>
  <circle cx="410" cy="155" r="2" fill="#2E7D32"/>
  <circle cx="425" cy="170" r="2" fill="#2E7D32"/>
  <circle cx="295" cy="135" r="2" fill="#2E7D32"/>
  <circle cx="315" cy="155" r="2" fill="#2E7D32"/>
  <circle cx="340" cy="185" r="2" fill="#2E7D32"/>
  <circle cx="370" cy="190" r="2" fill="#2E7D32"/>
  <circle cx="400" cy="125" r="2" fill="#2E7D32"/>
  <circle cx="430" cy="140" r="2" fill="#2E7D32"/>
  <text x="360" y="232" text-anchor="middle" font-size="10" fill="#333" font-weight="600">~1000s of cases</text>
  <text x="360" y="250" text-anchor="middle" font-size="9" fill="#555">catches unknown unknowns</text>
  <text x="360" y="266" text-anchor="middle" font-size="9" fill="#555">cheap to generate</text>
  <text x="360" y="282" text-anchor="middle" font-size="9" font-style="italic" fill="#888">used today (s4 demo)</text>

  <!-- Constrained-random -->
  <rect x="480" y="65" width="210" height="225" rx="10" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="585" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#F9A825">③ Constrained-Random</text>
  <text x="585" y="108" text-anchor="middle" font-size="9" font-style="italic" fill="#555">random + rules + coverage</text>
  <rect x="500" y="118" width="170" height="80" fill="#fff" stroke="#bbb"/>
  <!-- biased scatter w/ shaded "legal" region -->
  <rect x="510" y="135" width="80" height="50" fill="#FFF3CD" stroke="#F9A825" stroke-dasharray="3,2"/>
  <text x="550" y="156" text-anchor="middle" font-size="7" fill="#B8860B">legal region</text>
  <text x="550" y="170" text-anchor="middle" font-size="7" fill="#B8860B">a&lt;b, a≠0</text>
  <circle cx="520" cy="170" r="2" fill="#F9A825"/>
  <circle cx="540" cy="155" r="2" fill="#F9A825"/>
  <circle cx="560" cy="175" r="2" fill="#F9A825"/>
  <circle cx="575" cy="160" r="2" fill="#F9A825"/>
  <circle cx="585" cy="170" r="2" fill="#F9A825"/>
  <circle cx="530" cy="180" r="2" fill="#F9A825"/>
  <circle cx="550" cy="145" r="2" fill="#F9A825"/>
  <!-- a few stray outside boundary (rare) -->
  <circle cx="620" cy="135" r="2" fill="#F9A825" opacity="0.4"/>
  <circle cx="650" cy="180" r="2" fill="#F9A825" opacity="0.4"/>
  <text x="585" y="232" text-anchor="middle" font-size="10" fill="#333" font-weight="600">~10k–100k+ cases</text>
  <text x="585" y="250" text-anchor="middle" font-size="9" fill="#555">obeys protocol rules</text>
  <text x="585" y="266" text-anchor="middle" font-size="9" fill="#555">+ coverage feedback</text>
  <text x="585" y="282" text-anchor="middle" font-size="9" font-style="italic" fill="#B8860B">future topic (SV / UVM)</text>
</svg>
