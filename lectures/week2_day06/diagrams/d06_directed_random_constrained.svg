<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Inter, sans-serif">
  <text x="380" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Three Generation Strategies</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#555">today we hand-write directed cases <em>and</em> pure random — constrained-random comes later</text>

  <!-- Directed -->
  <rect x="30" y="65" width="230" height="245" rx="10" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>
  <text x="145" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1E88E5">① Directed</text>
  <text x="145" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#555">hand-picked cases</text>
  <!-- mini scatter -->
  <rect x="50" y="120" width="190" height="90" fill="#FAFAFA" stroke="#ccc"/>
  <circle cx="60" cy="200" r="4" fill="#1E88E5"/>
  <text x="65" y="208" font-size="8" fill="#1E88E5" font-weight="700">0+0</text>
  <circle cx="230" cy="128" r="4" fill="#1E88E5"/>
  <text x="200" y="120" font-size="8" fill="#1E88E5" font-weight="700">max</text>
  <circle cx="145" cy="128" r="4" fill="#1E88E5"/>
  <text x="145" y="120" text-anchor="middle" font-size="8" fill="#1E88E5" font-weight="700">overflow</text>
  <circle cx="215" cy="195" r="4" fill="#1E88E5"/>
  <text x="200" y="208" font-size="8" fill="#1E88E5" font-weight="700">carry</text>
  <text x="145" y="240" text-anchor="middle" font-size="11" fill="#333" font-weight="700">~10s of cases</text>
  <text x="145" y="258" text-anchor="middle" font-size="10" fill="#555">corners you know</text>
  <text x="145" y="275" text-anchor="middle" font-size="10" fill="#555">precise · auditable</text>
  <text x="145" y="295" text-anchor="middle" font-size="10" font-style="italic" fill="#1E88E5" font-weight="700">used today (s2, s3)</text>

  <!-- Random -->
  <rect x="275" y="65" width="230" height="245" rx="10" fill="#fff" stroke="#43A047" stroke-width="2.5"/>
  <text x="390" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#43A047">② Pure Random</text>
  <text x="390" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#555">uniform across full range</text>
  <rect x="295" y="120" width="190" height="90" fill="#FAFAFA" stroke="#ccc"/>
  <!-- random scatter -->
  <circle cx="310" cy="165" r="2.5" fill="#43A047"/>
  <circle cx="325" cy="140" r="2.5" fill="#43A047"/>
  <circle cx="340" cy="180" r="2.5" fill="#43A047"/>
  <circle cx="355" cy="130" r="2.5" fill="#43A047"/>
  <circle cx="370" cy="160" r="2.5" fill="#43A047"/>
  <circle cx="385" cy="150" r="2.5" fill="#43A047"/>
  <circle cx="400" cy="175" r="2.5" fill="#43A047"/>
  <circle cx="415" cy="145" r="2.5" fill="#43A047"/>
  <circle cx="430" cy="155" r="2.5" fill="#43A047"/>
  <circle cx="445" cy="170" r="2.5" fill="#43A047"/>
  <circle cx="465" cy="195" r="2.5" fill="#43A047"/>
  <circle cx="315" cy="135" r="2.5" fill="#43A047"/>
  <circle cx="335" cy="155" r="2.5" fill="#43A047"/>
  <circle cx="360" cy="185" r="2.5" fill="#43A047"/>
  <circle cx="390" cy="195" r="2.5" fill="#43A047"/>
  <circle cx="420" cy="125" r="2.5" fill="#43A047"/>
  <circle cx="450" cy="140" r="2.5" fill="#43A047"/>
  <circle cx="468" cy="175" r="2.5" fill="#43A047"/>
  <text x="390" y="240" text-anchor="middle" font-size="11" fill="#333" font-weight="700">~1000s of cases</text>
  <text x="390" y="258" text-anchor="middle" font-size="10" fill="#555">catches unknown unknowns</text>
  <text x="390" y="275" text-anchor="middle" font-size="10" fill="#555">cheap to generate</text>
  <text x="390" y="295" text-anchor="middle" font-size="10" font-style="italic" fill="#43A047" font-weight="700">used today (s4 demo)</text>

  <!-- Constrained-random -->
  <rect x="520" y="65" width="230" height="245" rx="10" fill="#fff" stroke="#FFB300" stroke-width="2.5"/>
  <text x="635" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#FFB300">③ Constrained-Random</text>
  <text x="635" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#555">random + rules + coverage</text>
  <rect x="540" y="120" width="190" height="90" fill="#FAFAFA" stroke="#ccc"/>
  <!-- biased scatter w/ shaded "legal" region -->
  <rect x="555" y="135" width="100" height="65" fill="#FFF8E1" stroke="#FFB300" stroke-dasharray="4,2"/>
  <text x="605" y="156" text-anchor="middle" font-size="8" fill="#B8860B" font-weight="700">legal region</text>
  <text x="605" y="170" text-anchor="middle" font-size="8" fill="#B8860B">a&lt;b, a≠0</text>
  <circle cx="565" cy="180" r="2.5" fill="#FFB300"/>
  <circle cx="580" cy="160" r="2.5" fill="#FFB300"/>
  <circle cx="600" cy="180" r="2.5" fill="#FFB300"/>
  <circle cx="620" cy="165" r="2.5" fill="#FFB300"/>
  <circle cx="635" cy="190" r="2.5" fill="#FFB300"/>
  <circle cx="575" cy="195" r="2.5" fill="#FFB300"/>
  <circle cx="595" cy="148" r="2.5" fill="#FFB300"/>
  <circle cx="645" cy="175" r="2.5" fill="#FFB300"/>
  <!-- a few stray outside boundary (rare) -->
  <circle cx="680" cy="135" r="2.5" fill="#FFB300" opacity="0.35"/>
  <circle cx="710" cy="195" r="2.5" fill="#FFB300" opacity="0.35"/>
  <text x="635" y="240" text-anchor="middle" font-size="11" fill="#333" font-weight="700">~10k–100k+ cases</text>
  <text x="635" y="258" text-anchor="middle" font-size="10" fill="#555">obeys protocol rules</text>
  <text x="635" y="275" text-anchor="middle" font-size="10" fill="#555">+ coverage feedback</text>
  <text x="635" y="295" text-anchor="middle" font-size="10" font-style="italic" fill="#B8860B" font-weight="700">future topic (SV / UVM)</text>
</svg>
