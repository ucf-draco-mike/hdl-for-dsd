<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrK" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#333"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#FF5252"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Before — Copy-Paste Stimulus (one initial block, N×duplicate logic)</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#555" font-style="italic">five lines per test case · 20 cases · 100 lines of nearly-identical code</text>

  <!-- Outer initial block -->
  <rect x="30" y="58" width="700" height="240" rx="12" fill="#FFF5F5" stroke="#FF5252" stroke-width="2" stroke-dasharray="9,4"/>
  <text x="44" y="80" font-size="13" font-weight="700" fill="#FF5252" font-family="JetBrains Mono">initial begin   ← one giant block, copy-paste hazard</text>

  <!-- 3 stamped-out blocks showing duplication -->
  <g>
    <rect x="50" y="100" width="200" height="180" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
    <text x="150" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Case 1: 5 + 3 = 8</text>
    <text x="60" y="143" font-size="9" font-family="JetBrains Mono"><tspan fill="#00ACC1" font-weight="700">a</tspan><tspan fill="#555"> = 4'd5;</tspan></text>
    <text x="60" y="157" font-size="9" font-family="JetBrains Mono"><tspan fill="#FFB300" font-weight="700">b</tspan><tspan fill="#555"> = 4'd3;</tspan></text>
    <text x="60" y="171" font-size="9" font-family="JetBrains Mono" fill="#555">#10;</text>
    <text x="60" y="187" font-size="9" font-family="JetBrains Mono"><tspan fill="#555">if (</tspan><tspan fill="#43A047" font-weight="700">sum</tspan><tspan fill="#555"> !== 8)</tspan></text>
    <text x="60" y="201" font-size="9" font-family="JetBrains Mono"><tspan fill="#FF5252" font-weight="700">  tests_failed</tspan><tspan fill="#555">++;</tspan></text>
    <text x="60" y="215" font-size="9" font-family="JetBrains Mono" fill="#555">else $display("PASS");</text>
    <text x="60" y="229" font-size="9" font-family="JetBrains Mono"><tspan fill="#7E57C2" font-weight="700">tests_run</tspan><tspan fill="#555">++;</tspan></text>
    <text x="150" y="259" text-anchor="middle" font-size="9" fill="#FF5252" font-style="italic">5 lines</text>
  </g>

  <g>
    <rect x="280" y="100" width="200" height="180" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
    <text x="380" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Case 2: 7 + 9 = 16</text>
    <text x="290" y="143" font-size="9" font-family="JetBrains Mono"><tspan fill="#00ACC1" font-weight="700">a</tspan><tspan fill="#555"> = 4'd7;</tspan></text>
    <text x="290" y="157" font-size="9" font-family="JetBrains Mono"><tspan fill="#FFB300" font-weight="700">b</tspan><tspan fill="#555"> = 4'd9;</tspan></text>
    <text x="290" y="171" font-size="9" font-family="JetBrains Mono" fill="#555">#10;</text>
    <text x="290" y="187" font-size="9" font-family="JetBrains Mono"><tspan fill="#555">if (</tspan><tspan fill="#43A047" font-weight="700">sum</tspan><tspan fill="#555"> !== 16)</tspan></text>
    <text x="290" y="201" font-size="9" font-family="JetBrains Mono"><tspan fill="#FF5252" font-weight="700">  tests_failed</tspan><tspan fill="#555">++;</tspan></text>
    <text x="290" y="215" font-size="9" font-family="JetBrains Mono" fill="#555">else $display("PASS");</text>
    <text x="290" y="229" font-size="9" font-family="JetBrains Mono"><tspan fill="#7E57C2" font-weight="700">tests_run</tspan><tspan fill="#555">++;</tspan></text>
    <text x="380" y="259" text-anchor="middle" font-size="9" fill="#FF5252" font-style="italic">5 lines (duplicated)</text>
  </g>

  <g opacity="0.55">
    <rect x="510" y="100" width="200" height="180" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
    <text x="610" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Case 3 … 20</text>
    <text x="520" y="143" font-size="9" font-family="JetBrains Mono"><tspan fill="#00ACC1" font-weight="700">a</tspan><tspan fill="#555"> = …</tspan></text>
    <text x="520" y="157" font-size="9" font-family="JetBrains Mono"><tspan fill="#FFB300" font-weight="700">b</tspan><tspan fill="#555"> = …</tspan></text>
    <text x="520" y="171" font-size="9" font-family="JetBrains Mono" fill="#555">#10;</text>
    <text x="520" y="187" font-size="9" font-family="JetBrains Mono"><tspan fill="#555">if (</tspan><tspan fill="#43A047" font-weight="700">sum</tspan><tspan fill="#555"> !== ?)</tspan></text>
    <text x="520" y="201" font-size="9" font-family="JetBrains Mono"><tspan fill="#FF5252" font-weight="700">  tests_failed</tspan><tspan fill="#555">++;</tspan></text>
    <text x="520" y="215" font-size="9" font-family="JetBrains Mono" fill="#555">else $display("PASS");</text>
    <text x="520" y="229" font-size="9" font-family="JetBrains Mono"><tspan fill="#7E57C2" font-weight="700">tests_run</tspan><tspan fill="#555">++;</tspan></text>
    <text x="610" y="259" text-anchor="middle" font-size="9" fill="#FF5252" font-style="italic">× 18 more copies</text>
  </g>

  <!-- duplication arrows -->
  <line x1="250" y1="190" x2="280" y2="190" stroke="#FF5252" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrR)"/>
  <line x1="480" y1="190" x2="510" y2="190" stroke="#FF5252" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrR)"/>

  <text x="44" y="293" font-size="13" font-weight="700" fill="#FF5252" font-family="JetBrains Mono">end</text>

  <!-- Bottom warning -->
  <rect x="40" y="310" width="680" height="24" rx="4" fill="#FFEBEE" stroke="#FF5252" stroke-width="1.5"/>
  <text x="380" y="327" text-anchor="middle" font-size="11" font-weight="700" fill="#FF5252">Add one new check (e.g. timing assertion) → edit 20 places · drift inevitable</text>
</svg>
