<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrCk" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#E91E63"/>
    </marker>
    <marker id="arrD" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#00ACC1"/>
    </marker>
    <marker id="arrEn" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#AB47BC"/>
    </marker>
    <marker id="arrQ" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#43A047"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#FF6F00"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Exercise DUT — 8-bit enable-flop with reset</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#555" font-style="italic">refactor 3 cases into one task call each: reset_dut() · apply_and_check(en, d, q_expected)</text>

  <!-- Stimulus block -->
  <rect x="30" y="65" width="170" height="220" rx="8" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="115" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Testbench drives</text>

  <!-- driver pads -->
  <text x="42" y="115" font-size="11" font-family="JetBrains Mono"><tspan fill="#FF6F00" font-weight="700">rst</tspan></text>
  <line x1="80" y1="111" x2="225" y2="111" stroke="#FF6F00" stroke-width="2.2" marker-end="url(#arrR)"/>

  <text x="42" y="155" font-size="11" font-family="JetBrains Mono"><tspan fill="#AB47BC" font-weight="700">en</tspan></text>
  <line x1="80" y1="151" x2="225" y2="151" stroke="#AB47BC" stroke-width="2.2" marker-end="url(#arrEn)"/>

  <text x="42" y="195" font-size="11" font-family="JetBrains Mono"><tspan fill="#00ACC1" font-weight="700">d</tspan><tspan fill="#555"> [7:0]</tspan></text>
  <line x1="100" y1="191" x2="225" y2="191" stroke="#00ACC1" stroke-width="2.2" marker-end="url(#arrD)"/>

  <text x="42" y="235" font-size="11" font-family="JetBrains Mono"><tspan fill="#E91E63" font-weight="700">clk</tspan></text>
  <line x1="80" y1="231" x2="225" y2="231" stroke="#E91E63" stroke-width="2.2" marker-end="url(#arrCk)"/>

  <text x="115" y="270" text-anchor="middle" font-size="10" font-style="italic" fill="#888">3 input drivers + clock</text>

  <!-- DUT body (D-FF with enable + reset) -->
  <rect x="230" y="80" width="290" height="180" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2.5"/>
  <text x="375" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#333">DUT — enable-flop [7:0]</text>

  <!-- Mux at front -->
  <polygon points="270,140 270,200 305,210 305,130" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="287" y="175" text-anchor="middle" font-size="10" font-family="JetBrains Mono" fill="#333">MUX</text>
  <text x="262" y="155" text-anchor="end" font-size="9" font-family="JetBrains Mono" fill="#333">1</text>
  <text x="262" y="195" text-anchor="end" font-size="9" font-family="JetBrains Mono" fill="#333">0</text>

  <!-- D input to mux 1 -->
  <line x1="230" y1="155" x2="270" y2="155" stroke="#00ACC1" stroke-width="2"/>
  <!-- en as mux select -->
  <line x1="287" y1="215" x2="287" y2="245" stroke="#AB47BC" stroke-width="2"/>
  <text x="293" y="245" font-size="9" font-weight="700" fill="#AB47BC" font-family="JetBrains Mono">en</text>

  <!-- mux output to D-FF -->
  <line x1="305" y1="170" x2="370" y2="170" stroke="#333" stroke-width="1.5"/>

  <!-- D-FF body -->
  <rect x="370" y="135" width="90" height="70" fill="#fff" stroke="#333" stroke-width="1.8"/>
  <text x="415" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#333">D-FF</text>
  <text x="380" y="155" font-size="9" fill="#888">D</text>
  <text x="380" y="195" font-size="9" fill="#888">CLR</text>
  <text x="450" y="155" text-anchor="end" font-size="9" fill="#888">Q</text>

  <!-- clk input to FF (also to mux via feedback) -->
  <polyline points="370,190 378,195 370,200" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="195" x2="370" y2="195" stroke="#E91E63" stroke-width="2"/>
  <line x1="340" y1="195" x2="340" y2="245" stroke="#E91E63" stroke-width="2"/>
  <line x1="340" y1="245" x2="225" y2="245" stroke="#E91E63" stroke-width="2"/>

  <!-- reset wire to CLR -->
  <line x1="410" y1="135" x2="410" y2="115" stroke="#FF6F00" stroke-width="2"/>
  <line x1="410" y1="115" x2="225" y2="115" stroke="#FF6F00" stroke-width="2"/>

  <!-- feedback from Q back to mux 0 -->
  <line x1="460" y1="170" x2="490" y2="170" stroke="#43A047" stroke-width="2"/>
  <line x1="490" y1="170" x2="490" y2="240" stroke="#43A047" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="490" y1="240" x2="287" y2="240" stroke="#43A047" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="287" y1="240" x2="287" y2="200" stroke="#43A047" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="395" y="237" font-size="9" font-style="italic" fill="#43A047">en=0 → hold</text>

  <!-- Output q -->
  <line x1="490" y1="170" x2="540" y2="170" stroke="#43A047" stroke-width="2.5" marker-end="url(#arrQ)"/>

  <!-- Checker block -->
  <rect x="555" y="120" width="180" height="100" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="645" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#43A047">Self-check</text>
  <text x="645" y="160" text-anchor="middle" font-size="10" font-family="JetBrains Mono">
    <tspan fill="#43A047" font-weight="700">q</tspan> <tspan fill="#555">!== </tspan><tspan fill="#1E88E5" font-weight="700">q_expected</tspan>
  </text>
  <text x="645" y="180" text-anchor="middle" font-size="9" fill="#555">PASS / FAIL</text>
  <text x="645" y="200" text-anchor="middle" font-size="9" font-style="italic" fill="#888">via check_eq()</text>

  <!-- Bottom test plan label -->
  <rect x="30" y="285" width="705" height="25" rx="5" fill="#fff" stroke="#26A69A" stroke-width="1.5"/>
  <text x="383" y="302" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#26A69A" font-weight="700">reset_dut();</tspan>
    <tspan fill="#555">  </tspan>
    <tspan fill="#26A69A" font-weight="700">apply_and_check(</tspan>
    <tspan fill="#AB47BC" font-weight="700">1</tspan>
    <tspan fill="#555">, </tspan>
    <tspan fill="#00ACC1" font-weight="700">8'hAA</tspan>
    <tspan fill="#555">, </tspan>
    <tspan fill="#1E88E5" font-weight="700">8'hAA</tspan>
    <tspan fill="#26A69A" font-weight="700">);</tspan>
    <tspan fill="#555">  ← one line per case</tspan>
  </text>
</svg>
