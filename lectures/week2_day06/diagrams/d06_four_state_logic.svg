<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrCk" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#E91E63"/>
    </marker>
    <marker id="arrD" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#00ACC1"/>
    </marker>
    <marker id="arrQ" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#43A047"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Verilog's Four Logic States</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#555">every wire and reg in simulation holds one of these per bit</text>

  <!-- 0 -->
  <rect x="40" y="60" width="160" height="105" rx="8" fill="#fff" stroke="#43A047" stroke-width="2.5"/>
  <text x="120" y="90" text-anchor="middle" font-size="32" font-weight="700" fill="#43A047" font-family="JetBrains Mono">0</text>
  <text x="120" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Logic LOW</text>
  <text x="120" y="130" text-anchor="middle" font-size="9" fill="#555">driven low</text>
  <text x="120" y="144" text-anchor="middle" font-size="9" fill="#555">synthesizable</text>
  <text x="120" y="158" text-anchor="middle" font-size="9" font-style="italic" fill="#888">"GND, false"</text>

  <!-- 1 -->
  <rect x="210" y="60" width="160" height="105" rx="8" fill="#fff" stroke="#1E88E5" stroke-width="2.5"/>
  <text x="290" y="90" text-anchor="middle" font-size="32" font-weight="700" fill="#1E88E5" font-family="JetBrains Mono">1</text>
  <text x="290" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Logic HIGH</text>
  <text x="290" y="130" text-anchor="middle" font-size="9" fill="#555">driven high</text>
  <text x="290" y="144" text-anchor="middle" font-size="9" fill="#555">synthesizable</text>
  <text x="290" y="158" text-anchor="middle" font-size="9" font-style="italic" fill="#888">"VDD, true"</text>

  <!-- X -->
  <rect x="380" y="60" width="160" height="105" rx="8" fill="#fff" stroke="#FF5252" stroke-width="2.5"/>
  <text x="460" y="90" text-anchor="middle" font-size="32" font-weight="700" fill="#FF5252" font-family="JetBrains Mono">X</text>
  <text x="460" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Unknown</text>
  <text x="460" y="130" text-anchor="middle" font-size="9" fill="#555">uninitialized FF,</text>
  <text x="460" y="144" text-anchor="middle" font-size="9" fill="#555">missing reset,</text>
  <text x="460" y="158" text-anchor="middle" font-size="9" fill="#555">multi-driver conflict</text>

  <!-- Z -->
  <rect x="550" y="60" width="160" height="105" rx="8" fill="#fff" stroke="#FFB300" stroke-width="2.5"/>
  <text x="630" y="90" text-anchor="middle" font-size="32" font-weight="700" fill="#FFB300" font-family="JetBrains Mono">Z</text>
  <text x="630" y="113" text-anchor="middle" font-size="11" font-weight="700" fill="#333">High-Impedance</text>
  <text x="630" y="130" text-anchor="middle" font-size="9" fill="#555">tri-state driver off,</text>
  <text x="630" y="144" text-anchor="middle" font-size="9" fill="#555">undriven wire,</text>
  <text x="630" y="158" text-anchor="middle" font-size="9" fill="#555">floating bus</text>

  <!-- Section: simple RTL -->
  <text x="40" y="200" font-size="12" font-weight="700" fill="#333">Where X comes from — flip-flop with no reset:</text>

  <!-- RTL diagram - simple D-FF -->
  <rect x="40" y="215" width="320" height="160" rx="8" fill="#FAFAFA" stroke="#999" stroke-width="1.2"/>
  <!-- D-FF body -->
  <rect x="140" y="252" width="100" height="80" fill="#fff" stroke="#333" stroke-width="1.8"/>
  <text x="190" y="293" text-anchor="middle" font-size="12" font-weight="700" fill="#333">D-FF</text>
  <!-- D input -->
  <line x1="85" y1="272" x2="140" y2="272" stroke="#00ACC1" stroke-width="2.2" marker-end="url(#arrD)"/>
  <text x="78" y="276" text-anchor="end" font-size="11" fill="#00ACC1" font-weight="700" font-family="JetBrains Mono">d</text>
  <text x="115" y="263" text-anchor="middle" font-size="9" fill="#888">D</text>
  <!-- clock -->
  <line x1="85" y1="312" x2="140" y2="312" stroke="#E91E63" stroke-width="2.2" marker-end="url(#arrCk)"/>
  <text x="78" y="316" text-anchor="end" font-size="11" fill="#E91E63" font-weight="700" font-family="JetBrains Mono">clk</text>
  <polyline points="140,307 148,312 140,317" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Q output -->
  <line x1="240" y1="272" x2="320" y2="272" stroke="#43A047" stroke-width="2.2" marker-end="url(#arrQ)"/>
  <text x="263" y="263" text-anchor="middle" font-size="9" fill="#888">Q</text>
  <text x="328" y="276" font-size="11" fill="#43A047" font-weight="700" font-family="JetBrains Mono">q</text>
  <!-- annotation -->
  <text x="200" y="358" text-anchor="middle" font-size="9" font-style="italic" fill="#FF5252">no reset port → <tspan fill="#43A047" font-weight="700" font-family="JetBrains Mono">q</tspan> powers up as <tspan fill="#FF5252" font-weight="700" font-family="JetBrains Mono">X</tspan> until first <tspan fill="#E91E63" font-weight="700" font-family="JetBrains Mono">clk</tspan> + valid <tspan fill="#00ACC1" font-weight="700" font-family="JetBrains Mono">d</tspan></text>

  <!-- Waveform -->
  <text x="395" y="200" font-size="12" font-weight="700" fill="#333">Waveform — X propagates until a known value lands:</text>

  <g transform="translate(395,225)">
    <!-- clk -->
    <text x="-5" y="14" text-anchor="end" font-size="11" font-weight="700" font-family="JetBrains Mono" fill="#E91E63">clk</text>
    <polyline points="0,20 15,20 15,5 30,5 30,20 45,20 45,5 60,5 60,20 75,20 75,5 90,5 90,20 105,20 105,5 120,5 120,20 135,20 135,5 150,5 150,20 165,20 165,5 180,5 180,20 195,20 195,5 210,5 210,20 225,20 225,5 240,5 240,20 255,20 255,5 270,5 270,20 285,20 285,5 300,5 300,20"
              fill="none" stroke="#E91E63" stroke-width="1.7"/>

    <!-- d input: starts X, becomes 5 -->
    <text x="-5" y="49" text-anchor="end" font-size="11" font-weight="700" font-family="JetBrains Mono" fill="#00ACC1">d</text>
    <rect x="0" y="35" width="120" height="20" fill="#FFEBEE" stroke="#FF5252" stroke-width="1.2"/>
    <text x="60" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#FF5252" font-family="JetBrains Mono">X</text>
    <line x1="120" y1="35" x2="125" y2="55" stroke="#333"/>
    <line x1="120" y1="55" x2="125" y2="35" stroke="#333"/>
    <rect x="125" y="35" width="175" height="20" fill="#E0F7FA" stroke="#00ACC1" stroke-width="1.4"/>
    <text x="212" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#00ACC1" font-family="JetBrains Mono">4'd5</text>

    <!-- q output: X until first clock after valid d -->
    <text x="-5" y="79" text-anchor="end" font-size="11" font-weight="700" font-family="JetBrains Mono" fill="#43A047">q</text>
    <rect x="0" y="65" width="150" height="20" fill="#FFEBEE" stroke="#FF5252" stroke-width="1.2"/>
    <text x="75" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#FF5252" font-family="JetBrains Mono">X</text>
    <line x1="150" y1="65" x2="155" y2="85" stroke="#333"/>
    <line x1="150" y1="85" x2="155" y2="65" stroke="#333"/>
    <rect x="155" y="65" width="145" height="20" fill="#E8F5E9" stroke="#43A047" stroke-width="1.4"/>
    <text x="227" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#43A047" font-family="JetBrains Mono">4'd5</text>

    <!-- time markers -->
    <text x="150" y="105" text-anchor="middle" font-size="9" fill="#666">↑ first edge with valid <tspan fill="#00ACC1" font-weight="700" font-family="JetBrains Mono">d</tspan></text>
  </g>
</svg>
