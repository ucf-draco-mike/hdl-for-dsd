<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="360" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Verilog's Four Logic States</text>
  <text x="360" y="40" text-anchor="middle" font-size="11" fill="#666">every wire and reg in simulation holds one of these per bit</text>

  <!-- 0 -->
  <rect x="40" y="60" width="150" height="105" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="115" y="88" text-anchor="middle" font-size="28" font-weight="700" fill="#2E7D32" font-family="JetBrains Mono">0</text>
  <text x="115" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Logic LOW</text>
  <text x="115" y="130" text-anchor="middle" font-size="9" fill="#555">driven low</text>
  <text x="115" y="146" text-anchor="middle" font-size="9" fill="#555">synthesizable</text>
  <text x="115" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">"GND, false"</text>

  <!-- 1 -->
  <rect x="200" y="60" width="150" height="105" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="275" y="88" text-anchor="middle" font-size="28" font-weight="700" fill="#1565C0" font-family="JetBrains Mono">1</text>
  <text x="275" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Logic HIGH</text>
  <text x="275" y="130" text-anchor="middle" font-size="9" fill="#555">driven high</text>
  <text x="275" y="146" text-anchor="middle" font-size="9" fill="#555">synthesizable</text>
  <text x="275" y="160" text-anchor="middle" font-size="9" font-style="italic" fill="#888">"VDD, true"</text>

  <!-- X -->
  <rect x="360" y="60" width="150" height="105" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="435" y="88" text-anchor="middle" font-size="28" font-weight="700" fill="#C62828" font-family="JetBrains Mono">X</text>
  <text x="435" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Unknown</text>
  <text x="435" y="130" text-anchor="middle" font-size="9" fill="#555">uninitialized FF,</text>
  <text x="435" y="144" text-anchor="middle" font-size="9" fill="#555">missing reset,</text>
  <text x="435" y="158" text-anchor="middle" font-size="9" fill="#555">multi-driver conflict</text>

  <!-- Z -->
  <rect x="520" y="60" width="150" height="105" rx="8" fill="#FFF8E1" stroke="#F9A825" stroke-width="2"/>
  <text x="595" y="88" text-anchor="middle" font-size="28" font-weight="700" fill="#F9A825" font-family="JetBrains Mono">Z</text>
  <text x="595" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#333">High-Impedance</text>
  <text x="595" y="130" text-anchor="middle" font-size="9" fill="#555">tri-state driver off,</text>
  <text x="595" y="144" text-anchor="middle" font-size="9" fill="#555">undriven wire,</text>
  <text x="595" y="158" text-anchor="middle" font-size="9" fill="#555">floating bus</text>

  <!-- Section: simple RTL -->
  <text x="40" y="200" font-size="12" font-weight="700" fill="#333">Where X comes from — flip-flop with no reset:</text>

  <!-- RTL diagram - simple D-FF -->
  <rect x="40" y="215" width="280" height="135" rx="6" fill="#FAFAFA" stroke="#999" stroke-width="1"/>
  <!-- D-FF body -->
  <rect x="120" y="245" width="80" height="70" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#333">D-FF</text>
  <!-- D input -->
  <line x1="70" y1="265" x2="120" y2="265" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="269" text-anchor="end" font-size="10" fill="#333" font-family="JetBrains Mono">d</text>
  <text x="95" y="258" text-anchor="middle" font-size="9" fill="#888">D</text>
  <!-- clock -->
  <line x1="70" y1="300" x2="120" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="304" text-anchor="end" font-size="10" fill="#333" font-family="JetBrains Mono">clk</text>
  <polyline points="120,295 128,300 120,305" fill="none" stroke="#333" stroke-width="1.2"/>
  <!-- Q output -->
  <line x1="200" y1="265" x2="280" y2="265" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="218" y="258" text-anchor="middle" font-size="9" fill="#888">Q</text>
  <text x="285" y="269" font-size="10" fill="#333" font-family="JetBrains Mono">q</text>
  <!-- annotation -->
  <text x="180" y="335" text-anchor="middle" font-size="9" font-style="italic" fill="#C62828">no reset port → Q powers up as X until first clock+valid D</text>

  <!-- Waveform -->
  <text x="360" y="200" font-size="12" font-weight="700" fill="#333">Waveform — X propagates until a known value lands:</text>

  <g transform="translate(360,220)">
    <!-- clk -->
    <text x="-5" y="14" text-anchor="end" font-size="10" font-family="JetBrains Mono" fill="#333">clk</text>
    <polyline points="0,20 15,20 15,5 30,5 30,20 45,20 45,5 60,5 60,20 75,20 75,5 90,5 90,20 105,20 105,5 120,5 120,20 135,20 135,5 150,5 150,20 165,20 165,5 180,5 180,20 195,20 195,5 210,5 210,20 225,20 225,5 240,5 240,20 255,20 255,5 270,5 270,20 285,20 285,5 300,5 300,20"
              fill="none" stroke="#1565C0" stroke-width="1.5"/>

    <!-- d input: starts X, becomes 5 -->
    <text x="-5" y="49" text-anchor="end" font-size="10" font-family="JetBrains Mono" fill="#333">d</text>
    <rect x="0" y="35" width="120" height="20" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
    <text x="60" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828" font-family="JetBrains Mono">X</text>
    <line x1="120" y1="35" x2="125" y2="55" stroke="#333"/>
    <line x1="120" y1="55" x2="125" y2="35" stroke="#333"/>
    <rect x="125" y="35" width="175" height="20" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
    <text x="212" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0" font-family="JetBrains Mono">4'd5</text>

    <!-- q output: X until first clock after valid d -->
    <text x="-5" y="79" text-anchor="end" font-size="10" font-family="JetBrains Mono" fill="#333">q</text>
    <rect x="0" y="65" width="150" height="20" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
    <text x="75" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#C62828" font-family="JetBrains Mono">X</text>
    <line x1="150" y1="65" x2="155" y2="85" stroke="#333"/>
    <line x1="150" y1="65" x2="155" y2="85" stroke="#333"/>
    <line x1="150" y1="85" x2="155" y2="65" stroke="#333"/>
    <rect x="155" y="65" width="145" height="20" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
    <text x="227" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0" font-family="JetBrains Mono">4'd5</text>

    <!-- time markers -->
    <text x="150" y="105" text-anchor="middle" font-size="8" fill="#666">↑ first edge with valid d</text>
  </g>
</svg>
