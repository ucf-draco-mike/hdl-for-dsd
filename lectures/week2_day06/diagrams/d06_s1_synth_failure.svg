<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" font-family="Inter, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#D32F2F"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#222">Testbench → Yosys = ERROR (by design)</text>
  <text x="380" y="40" text-anchor="middle" font-size="11" fill="#555" font-style="italic">three constructs split simulation from synthesis</text>

  <!-- TB file (left) -->
  <rect x="30" y="65" width="230" height="170" rx="10" fill="#fff" stroke="#C2185B" stroke-width="2.2"/>
  <text x="145" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#C2185B" font-family="JetBrains Mono">tb_adder.v</text>

  <rect x="45" y="100" width="200" height="30" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="145" y="120" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#D32F2F" font-weight="700">initial</tspan>
    <tspan fill="#555"> begin … end</tspan>
  </text>

  <rect x="45" y="138" width="200" height="30" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="145" y="158" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#D32F2F" font-weight="700">$display</tspan>
    <tspan fill="#555">("...")</tspan>
  </text>

  <rect x="45" y="176" width="200" height="30" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="145" y="196" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#D32F2F" font-weight="700">#10;</tspan>
    <tspan fill="#555"> (timing control)</tspan>
  </text>

  <text x="145" y="222" text-anchor="middle" font-size="9" fill="#888" font-style="italic">none of these synthesize</text>

  <!-- Yosys block (center) -->
  <rect x="290" y="100" width="160" height="120" rx="10" fill="#FFF8E1" stroke="#F57C00" stroke-width="2.5"/>
  <text x="370" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Yosys</text>
  <text x="370" y="144" text-anchor="middle" font-size="10" fill="#555">synth_ice40</text>
  <text x="370" y="162" text-anchor="middle" font-size="10" fill="#555">-top tb_adder</text>
  <text x="370" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#D32F2F" font-family="JetBrains Mono">ERROR ✕</text>
  <text x="370" y="205" text-anchor="middle" font-size="9" font-style="italic" fill="#888">"not synthesizable"</text>

  <!-- arrow -->
  <line x1="260" y1="160" x2="287" y2="160" stroke="#D32F2F" stroke-width="2.5" marker-end="url(#arrR)"/>

  <!-- DUT file (right) -->
  <rect x="500" y="65" width="230" height="170" rx="10" fill="#fff" stroke="#2E7D32" stroke-width="2.2"/>
  <text x="615" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32" font-family="JetBrains Mono">adder.v (DUT)</text>

  <rect x="515" y="100" width="200" height="30" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="615" y="120" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#2E7D32" font-weight="700">assign</tspan>
    <tspan fill="#555"> o_sum = a + b;</tspan>
  </text>

  <rect x="515" y="138" width="200" height="30" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="615" y="158" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#2E7D32" font-weight="700">always @(posedge </tspan>
    <tspan fill="#1976D2">clk</tspan>
    <tspan fill="#2E7D32">)</tspan>
  </text>

  <rect x="515" y="176" width="200" height="30" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="615" y="196" text-anchor="middle" font-size="11" font-family="JetBrains Mono">
    <tspan fill="#2E7D32" font-weight="700">wire / reg</tspan>
    <tspan fill="#555"> nets</tspan>
  </text>

  <text x="615" y="222" text-anchor="middle" font-size="9" fill="#888" font-style="italic">synthesizable subset</text>

  <!-- arrows between yosys and dut showing alt path -->
  <line x1="450" y1="160" x2="497" y2="160" stroke="#2E7D32" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="470" y="152" text-anchor="middle" font-size="9" fill="#2E7D32" font-style="italic">DUT OK</text>

  <!-- bottom rule -->
  <rect x="40" y="244" width="680" height="14" rx="3" fill="#FFF8E1" stroke="#9A6F00" stroke-width="1"/>
  <text x="380" y="255" text-anchor="middle" font-size="10" font-style="italic" fill="#555">If your <em>DUT</em> errors with these messages → you wrote a sim-only construct in design code (bug)</text>
</svg>
