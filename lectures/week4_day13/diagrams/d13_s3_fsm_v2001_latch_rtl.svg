<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRedM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aOrgM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aPurM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="aTealM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
    <marker id="aWarn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/></marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Verilog-2001 FSM — case missing default ⇒ latent latch on next_state</text>

  <rect x="40" y="40" width="680" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="60" font-size="12" font-weight="700" fill="#37474F">always @(posedge clk or posedge rst) … &nbsp;|&nbsp;  always @(*) case (state) …</text>

  <!-- clk -->
  <text x="55" y="100" font-size="12" fill="#1976D2" font-weight="700">clk</text>
  <line x1="84" y1="95" x2="490" y2="95" stroke="#1976D2" stroke-width="2"/>
  <line x1="490" y1="95" x2="490" y2="125" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluM)"/>

  <!-- rst -->
  <text x="55" y="135" font-size="12" fill="#D32F2F" font-weight="700">rst</text>
  <line x1="80" y1="130" x2="240" y2="130" stroke="#D32F2F" stroke-width="2" marker-end="url(#aRedM)"/>

  <!-- go / done -->
  <text x="55" y="180" font-size="12" fill="#F57C00" font-weight="700">go</text>
  <line x1="75" y1="175" x2="230" y2="175" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrgM)"/>

  <text x="55" y="215" font-size="12" fill="#F57C00" font-weight="700">done</text>
  <line x1="90" y1="210" x2="230" y2="210" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrgM)"/>

  <!-- Next-state logic (combinational with LATCH inside) -->
  <rect x="235" y="155" width="200" height="100" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>
  <text x="335" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">next-state comb</text>
  <text x="335" y="195" text-anchor="middle" font-size="10" fill="#E65100" font-style="italic">⚠ inferred LATCH</text>
  <text x="335" y="213" text-anchor="middle" font-size="9" fill="#555">case has no default;</text>
  <text x="335" y="226" text-anchor="middle" font-size="9" fill="#555">when none of IDLE/BUSY</text>
  <text x="335" y="239" text-anchor="middle" font-size="9" fill="#555">match, next_state holds</text>

  <!-- mux for reset -->
  <polygon points="445,125 480,137 480,170 445,182 445,125" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="463" y="155" text-anchor="middle" font-size="9" font-weight="700" fill="#D32F2F">mux</text>

  <line x1="240" y1="130" x2="445" y2="130" stroke="#D32F2F" stroke-width="0" />
  <line x1="240" y1="130" x2="445" y2="130" stroke="#D32F2F" stroke-width="0"/>

  <!-- comb -> mux -->
  <line x1="435" y1="170" x2="445" y2="170" stroke="#00838F" stroke-width="2" marker-end="url(#aTealM)"/>
  <text x="320" y="148" font-size="9" fill="#00838F" font-style="italic">next_state (intended wire — actually latched)</text>

  <!-- DFF state -->
  <rect x="490" y="125" width="115" height="75" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="547" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">state</text>
  <text x="547" y="165" text-anchor="middle" font-size="10" fill="#7B1FA2">D Flip-Flop</text>
  <text x="547" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">async rst</text>

  <line x1="480" y1="148" x2="490" y2="148" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="605" y1="148" x2="685" y2="148" stroke="#7B1FA2" stroke-width="2" marker-end="url(#aPurM)"/>
  <text x="692" y="152" font-size="11" fill="#7B1FA2" font-weight="700">state</text>

  <!-- feedback for state -->
  <line x1="660" y1="148" x2="660" y2="270" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="660" y1="270" x2="200" y2="270" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="200" y1="270" x2="200" y2="210" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="200" y1="210" x2="235" y2="210" stroke="#7B1FA2" stroke-width="2" marker-end="url(#aPurM)"/>

  <!-- warning arrow -->
  <line x1="335" y1="288" x2="335" y2="262" stroke="#E65100" stroke-width="2" marker-end="url(#aWarn)"/>
  <text x="335" y="305" font-size="10" font-style="italic" fill="#E65100" text-anchor="middle">always @(*) lets latch slip in silently — caught only by lint</text>
</svg>
