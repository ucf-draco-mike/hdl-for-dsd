<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluLp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aPurLp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="aTealLp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
  </defs>

  <text x="300" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Verilog-2001 localparam states (untyped integers)</text>

  <rect x="30" y="40" width="540" height="220" rx="10" fill="#FFF8E1" stroke="#D4A843" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="45" y="60" font-size="11" font-weight="700" fill="#9A6F00">localparam [1:0] S_GREEN=0, S_YELLOW=1, S_RED=2;  reg [1:0] r_state;</text>

  <!-- localparam "lookup" -->
  <rect x="50" y="80" width="170" height="105" rx="6" fill="#FFFDE7" stroke="#9A6F00" stroke-width="1.5"/>
  <text x="135" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#9A6F00">untyped constants</text>
  <text x="60" y="125" font-size="10" fill="#7B1FA2" font-weight="700">S_GREEN</text>  <text x="155" y="125" font-size="10" fill="#555">= 2'd0</text>
  <text x="60" y="145" font-size="10" fill="#7B1FA2" font-weight="700">S_YELLOW</text> <text x="155" y="145" font-size="10" fill="#555">= 2'd1</text>
  <text x="60" y="165" font-size="10" fill="#7B1FA2" font-weight="700">S_RED</text>    <text x="155" y="165" font-size="10" fill="#555">= 2'd2</text>

  <!-- clk -->
  <text x="245" y="105" font-size="11" fill="#1976D2" font-weight="700">clk</text>
  <line x1="270" y1="100" x2="400" y2="100" stroke="#1976D2" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="120" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluLp)"/>

  <!-- r_next -->
  <text x="240" y="155" font-size="11" fill="#00838F" font-weight="700">r_next</text>
  <line x1="280" y1="150" x2="350" y2="150" stroke="#00838F" stroke-width="2" marker-end="url(#aTealLp)"/>

  <!-- DFF state -->
  <rect x="350" y="120" width="120" height="75" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="410" y="144" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">r_state</text>
  <text x="410" y="161" text-anchor="middle" font-size="10" fill="#7B1FA2">[1:0]  D-FF</text>
  <text x="410" y="180" text-anchor="middle" font-size="9" fill="#888" font-style="italic">no type info</text>

  <line x1="470" y1="155" x2="555" y2="155" stroke="#7B1FA2" stroke-width="2" marker-end="url(#aPurLp)"/>
  <text x="540" y="145" font-size="10" fill="#7B1FA2" font-weight="700">r_state</text>

  <!-- GTKWave hint -->
  <rect x="30" y="210" width="540" height="38" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="300" y="225" text-anchor="middle" font-size="10" fill="#C62828" font-weight="700">GTKWave shows 2'd0, 2'd1, 2'd2 — no symbolic names</text>
  <text x="300" y="240" text-anchor="middle" font-size="9" fill="#C62828" font-style="italic">no type-safety: r_state = RX_IDLE (other FSM) compiles silently</text>
</svg>
