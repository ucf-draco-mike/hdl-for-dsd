<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRedF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aTealF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
    <marker id="aPurF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
  </defs>

  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">always_ff @(posedge i_clk) — declared flip-flop, one clock only</text>

  <rect x="40" y="40" width="640" height="170" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="60" font-size="12" font-weight="700" fill="#37474F">always_ff @(posedge i_clk) r_state &lt;= i_reset ? S_INIT : r_next_state;</text>

  <!-- i_clk -->
  <text x="55" y="100" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="95" y1="95" x2="430" y2="95" stroke="#1976D2" stroke-width="2"/>
  <line x1="430" y1="95" x2="430" y2="115" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluF)"/>

  <!-- i_reset -->
  <text x="55" y="135" font-size="12" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="100" y1="130" x2="245" y2="130" stroke="#D32F2F" stroke-width="2" marker-end="url(#aRedF)"/>

  <!-- r_next_state -->
  <text x="55" y="170" font-size="12" fill="#00838F" font-weight="700">r_next_state</text>
  <line x1="145" y1="165" x2="245" y2="165" stroke="#00838F" stroke-width="2" marker-end="url(#aTealF)"/>

  <!-- mux -->
  <polygon points="248,118 285,130 285,165 248,177 248,118" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="266" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#D32F2F">mux</text>

  <!-- DFF -->
  <rect x="380" y="115" width="120" height="80" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="440" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">r_state</text>
  <text x="440" y="155" text-anchor="middle" font-size="10" fill="#7B1FA2">D Flip-Flop</text>
  <text x="440" y="172" text-anchor="middle" font-size="9" fill="#888" font-style="italic">single-clock only</text>
  <text x="440" y="186" text-anchor="middle" font-size="9" fill="#888" font-style="italic">enforced by always_ff</text>

  <line x1="285" y1="148" x2="380" y2="148" stroke="#7B1FA2" stroke-width="2"/>

  <line x1="500" y1="148" x2="640" y2="148" stroke="#7B1FA2" stroke-width="2" marker-end="url(#aPurF)"/>
  <text x="647" y="152" font-size="11" fill="#7B1FA2" font-weight="700">r_state</text>
</svg>
