<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBluU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRedU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aOrgU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrnU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aMagU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
    <marker id="aTealU" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
  </defs>

  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">uart_tx_ctrl — every wire/reg becomes logic</text>

  <!-- Module box -->
  <rect x="40" y="50" width="640" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="70" font-size="12" font-weight="700" fill="#37474F">module uart_tx_ctrl</text>

  <!-- clk -->
  <text x="55" y="103" font-size="11" fill="#1976D2" font-weight="700">clk</text>
  <line x1="80" y1="98" x2="180" y2="98" stroke="#1976D2" stroke-width="2" marker-end="url(#aBluU)"/>

  <!-- rst -->
  <text x="55" y="133" font-size="11" fill="#D32F2F" font-weight="700">rst</text>
  <line x1="80" y1="128" x2="180" y2="128" stroke="#D32F2F" stroke-width="2" marker-end="url(#aRedU)"/>

  <!-- start -->
  <text x="55" y="163" font-size="11" fill="#C2185B" font-weight="700">start</text>
  <line x1="90" y1="158" x2="180" y2="158" stroke="#C2185B" stroke-width="2" marker-end="url(#aMagU)"/>

  <!-- data[7:0] -->
  <text x="55" y="193" font-size="11" fill="#F57C00" font-weight="700">data[7:0]</text>
  <line x1="120" y1="188" x2="180" y2="188" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrgU)"/>

  <!-- Internal block: state, shifter, count, bit_tick -->
  <rect x="185" y="80" width="280" height="200" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="325" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">FSM + datapath (internal regs)</text>

  <text x="200" y="125" font-size="11" fill="#7B1FA2" font-weight="700">state[3:0]</text>
  <text x="295" y="125" font-size="9" fill="#888">— FSM state</text>

  <text x="200" y="148" font-size="11" fill="#FFD54F" font-weight="700" stroke="#9A6F00" stroke-width="0.3">shifter[9:0]</text>
  <text x="295" y="148" font-size="9" fill="#888">— start + 8 data + stop</text>

  <text x="200" y="171" font-size="11" fill="#7B1FA2" font-weight="700">count[7:0]</text>
  <text x="295" y="171" font-size="9" fill="#888">— baud-divider count</text>

  <text x="200" y="194" font-size="11" fill="#00838F" font-weight="700">bit_tick</text>
  <text x="295" y="194" font-size="9" fill="#888">— 1-cycle baud pulse (wire)</text>

  <text x="325" y="225" text-anchor="middle" font-size="9" fill="#7B1FA2" font-style="italic">always @(posedge clk) → always_ff</text>
  <text x="325" y="240" text-anchor="middle" font-size="9" fill="#7B1FA2" font-style="italic">all reg + wire become logic</text>

  <text x="325" y="265" text-anchor="middle" font-size="10" fill="#37474F" font-weight="700">SV: one keyword (logic) for all</text>

  <!-- Outputs -->
  <line x1="465" y1="135" x2="600" y2="135" stroke="#C2185B" stroke-width="2" marker-end="url(#aMagU)"/>
  <text x="606" y="139" font-size="11" fill="#C2185B" font-weight="700">tx_busy</text>

  <line x1="465" y1="175" x2="600" y2="175" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnU)"/>
  <text x="606" y="179" font-size="11" fill="#2E7D32" font-weight="700">tx_line</text>
</svg>
