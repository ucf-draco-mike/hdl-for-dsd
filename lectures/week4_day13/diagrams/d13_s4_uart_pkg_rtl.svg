<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBrnPk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5D4037"/></marker>
    <marker id="aIndPk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#303F9F"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">uart_pkg — one package, every consumer imports the same types &amp; constants</text>

  <!-- Package file -->
  <rect x="40" y="50" width="230" height="220" rx="10" fill="#EFEBE9" stroke="#5D4037" stroke-width="2.5"/>
  <text x="155" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#5D4037">package uart_pkg</text>
  <text x="155" y="86" text-anchor="middle" font-size="9" fill="#888" font-style="italic">file: uart_pkg.sv</text>

  <text x="55" y="115" font-size="10" fill="#5D4037" font-weight="700">parameter int</text>
  <text x="55" y="128" font-size="10" fill="#5D4037">DEFAULT_BAUD = 115200;</text>

  <text x="55" y="158" font-size="10" fill="#303F9F" font-weight="700">typedef enum logic[1:0]</text>
  <text x="55" y="171" font-size="10" fill="#7B1FA2">{ PARITY_NONE,</text>
  <text x="65" y="184" font-size="10" fill="#7B1FA2">PARITY_EVEN, … } parity_t;</text>

  <text x="55" y="214" font-size="10" fill="#5D4037" font-weight="700">typedef struct packed</text>
  <text x="55" y="227" font-size="10" fill="#5D4037">{ start_bit, data[7:0],</text>
  <text x="65" y="240" font-size="10" fill="#5D4037">parity_t parity_mode, …</text>
  <text x="65" y="253" font-size="10" fill="#5D4037">} frame_t;</text>

  <!-- arrows out to consumers -->
  <line x1="275" y1="120" x2="370" y2="100" stroke="#5D4037" stroke-width="2.5" marker-end="url(#aBrnPk)"/>
  <line x1="275" y1="170" x2="370" y2="170" stroke="#5D4037" stroke-width="2.5" marker-end="url(#aBrnPk)"/>
  <line x1="275" y1="220" x2="370" y2="240" stroke="#5D4037" stroke-width="2.5" marker-end="url(#aBrnPk)"/>
  <text x="298" y="155" font-size="9" font-style="italic" fill="#5D4037">import uart_pkg::*;</text>

  <!-- Consumer modules -->
  <rect x="375" y="75" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="475" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">u_tx : uart_tx</text>
  <text x="475" y="113" text-anchor="middle" font-size="9" fill="#888">frame_t frame_in</text>
  <text x="475" y="124" text-anchor="middle" font-size="9" fill="#888">BAUD = DEFAULT_BAUD</text>

  <rect x="375" y="145" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="475" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">u_rx : uart_rx</text>
  <text x="475" y="183" text-anchor="middle" font-size="9" fill="#888">parity_t parity_mode</text>

  <rect x="375" y="215" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="475" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">u_top : capstone</text>
  <text x="475" y="253" text-anchor="middle" font-size="9" fill="#888">frame_t loopback;</text>

  <!-- Annotated benefit box -->
  <rect x="595" y="80" width="150" height="180" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="670" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">single source</text>
  <text x="670" y="118" text-anchor="middle" font-size="9" fill="#2E7D32">of truth</text>
  <text x="605" y="145" font-size="9" fill="#2E7D32">change DEFAULT_BAUD</text>
  <text x="605" y="158" font-size="9" fill="#2E7D32">once → all importers</text>
  <text x="605" y="171" font-size="9" fill="#2E7D32">re-elaborate</text>

  <text x="605" y="200" font-size="9" fill="#2E7D32">add field to frame_t</text>
  <text x="605" y="213" font-size="9" fill="#2E7D32">once → propagates to</text>
  <text x="605" y="226" font-size="9" fill="#2E7D32">TX, RX, top</text>

  <text x="605" y="250" font-size="9" fill="#2E7D32" font-style="italic">no duplicate typedefs</text>
</svg>
