<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="aPurT" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="aGrnT" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
  </defs>

  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">always_comb — combinational state decoder (traffic light)</text>

  <!-- Module-ish container -->
  <rect x="40" y="40" width="640" height="210" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="60" font-size="12" font-weight="700" fill="#37474F">always_comb begin  defaults; case (r_state) … endcase  end</text>

  <!-- r_state input from FSM register -->
  <text x="55" y="100" font-size="12" fill="#7B1FA2" font-weight="700">r_state[1:0]</text>
  <line x1="135" y1="95" x2="220" y2="95" stroke="#7B1FA2" stroke-width="2" marker-end="url(#aPurT)"/>

  <!-- decoder block -->
  <rect x="225" y="75" width="240" height="155" rx="8" fill="#FFF8E1" stroke="#D4A843" stroke-width="2"/>
  <text x="345" y="98" text-anchor="middle" font-size="12" font-weight="700" fill="#9A6F00">3-output decoder</text>
  <text x="345" y="115" text-anchor="middle" font-size="9" fill="#666" font-style="italic">always_comb (auto-sensitivity)</text>

  <text x="245" y="140" font-size="10" fill="#555">defaults: o_green=0;</text>
  <text x="245" y="153" font-size="10" fill="#555">          o_yellow=0;</text>
  <text x="245" y="166" font-size="10" fill="#555">          o_red=0;</text>

  <text x="245" y="186" font-size="10" fill="#555">S_GREEN  → o_green = 1</text>
  <text x="245" y="199" font-size="10" fill="#555">S_YELLOW → o_yellow = 1</text>
  <text x="245" y="212" font-size="10" fill="#555">S_RED    → o_red = 1</text>

  <!-- 3 outputs -->
  <line x1="465" y1="105" x2="600" y2="105" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnT)"/>
  <text x="608" y="109" font-size="11" fill="#2E7D32" font-weight="700">o_green</text>

  <line x1="465" y1="150" x2="600" y2="150" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnT)"/>
  <text x="608" y="154" font-size="11" fill="#2E7D32" font-weight="700">o_yellow</text>

  <line x1="465" y1="195" x2="600" y2="195" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrnT)"/>
  <text x="608" y="199" font-size="11" fill="#2E7D32" font-weight="700">o_red</text>

  <!-- safety annotation -->
  <rect x="40" y="258" width="640" height="18" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="360" y="271" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">always_comb enforces: every output assigned on every path ⇒ no inferred latches</text>
</svg>
