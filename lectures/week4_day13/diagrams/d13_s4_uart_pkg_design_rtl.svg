<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBrnDs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5D4037"/></marker>
    <marker id="aIndDs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#303F9F"/></marker>
    <marker id="aMagDs" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">uart_pkg — distinct TX/RX state types are type-checked across modules</text>

  <!-- Package -->
  <rect x="40" y="50" width="230" height="200" rx="10" fill="#EFEBE9" stroke="#5D4037" stroke-width="2.5"/>
  <text x="155" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#5D4037">package uart_pkg</text>

  <text x="55" y="100" font-size="10" fill="#5D4037" font-weight="700">DEFAULT_CLKS_PER_BIT</text>
  <text x="55" y="112" font-size="9" fill="#888">= 217  // 25 MHz / 115200</text>

  <rect x="48" y="125" width="210" height="50" rx="4" fill="#E8EAF6" stroke="#303F9F" stroke-width="1.5"/>
  <text x="153" y="142" text-anchor="middle" font-size="10" fill="#303F9F" font-weight="700">tx_state_t  (enum)</text>
  <text x="55" y="158" font-size="9" fill="#7B1FA2">TX_IDLE, TX_START,</text>
  <text x="55" y="170" font-size="9" fill="#7B1FA2">TX_DATA, TX_STOP</text>

  <rect x="48" y="185" width="210" height="50" rx="4" fill="#E8EAF6" stroke="#303F9F" stroke-width="1.5"/>
  <text x="153" y="202" text-anchor="middle" font-size="10" fill="#303F9F" font-weight="700">rx_state_t  (enum)</text>
  <text x="55" y="218" font-size="9" fill="#7B1FA2">RX_IDLE, RX_START,</text>
  <text x="55" y="230" font-size="9" fill="#7B1FA2">RX_DATA, RX_STOP</text>

  <!-- import -->
  <line x1="275" y1="150" x2="365" y2="105" stroke="#5D4037" stroke-width="2.5" marker-end="url(#aBrnDs)"/>
  <line x1="275" y1="200" x2="365" y2="200" stroke="#5D4037" stroke-width="2.5" marker-end="url(#aBrnDs)"/>
  <text x="285" y="140" font-size="9" font-style="italic" fill="#5D4037">import</text>

  <!-- uart_tx module -->
  <rect x="370" y="65" width="220" height="80" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="480" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">u_tx : uart_tx</text>
  <text x="380" y="105" font-size="10" fill="#303F9F" font-weight="700">tx_state_t r_state;</text>
  <text x="380" y="125" font-size="9" fill="#888">// r_state = RX_IDLE</text>
  <text x="380" y="138" font-size="9" fill="#C62828" font-weight="700">⇒ compile error (typecheck)</text>

  <!-- uart_rx module -->
  <rect x="370" y="160" width="220" height="80" rx="8" fill="#FFF3E0" stroke="#C2185B" stroke-width="2"/>
  <text x="480" y="180" text-anchor="middle" font-size="11" font-weight="700" fill="#C2185B">u_rx : uart_rx</text>
  <text x="380" y="200" font-size="10" fill="#303F9F" font-weight="700">rx_state_t r_state;</text>
  <text x="380" y="220" font-size="9" fill="#888">rx_result_t r_out;</text>
  <text x="380" y="233" font-size="9" fill="#5D4037">{valid, data, frame_error}</text>

  <!-- benefit box -->
  <rect x="605" y="80" width="140" height="160" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="675" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">type safety</text>
  <text x="615" y="130" font-size="9" fill="#2E7D32">distinct enum types</text>
  <text x="615" y="143" font-size="9" fill="#2E7D32">⇒ accidental cross-</text>
  <text x="615" y="156" font-size="9" fill="#2E7D32">assignment caught</text>
  <text x="615" y="169" font-size="9" fill="#2E7D32">at elaboration</text>

  <text x="615" y="195" font-size="9" fill="#2E7D32">struct rx_result_t</text>
  <text x="615" y="208" font-size="9" fill="#2E7D32">bundles the 3 RX</text>
  <text x="615" y="221" font-size="9" fill="#2E7D32">outputs into 1 port</text>
</svg>
