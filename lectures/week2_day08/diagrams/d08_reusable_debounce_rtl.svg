<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="uBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="uRed"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="uOrg"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="uGrn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
  </defs>

  <text x="380" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#333">debounce — Reusable Module: Datasheet Header + Parameterized Body</text>

  <!-- Datasheet card -->
  <rect x="30" y="40" width="280" height="200" rx="8" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
  <text x="170" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#9A6F00">Module Header (Datasheet)</text>
  <text x="44" y="82" font-size="10" fill="#333">• Purpose: noisy → clean</text>
  <text x="44" y="100" font-size="10" fill="#333">• Parameter:</text>
  <text x="54" y="116" font-size="10" fill="#B8860B" font-weight="700">CLKS_STABLE = 500_000</text>
  <text x="44" y="134" font-size="10" fill="#333">• Ports:</text>
  <text x="54" y="150" font-size="10" fill="#1976D2" font-weight="700">i_clk</text>
  <text x="54" y="166" font-size="10" fill="#D32F2F" font-weight="700">i_reset</text>
  <text x="54" y="182" font-size="10" fill="#F57C00" font-weight="700">i_noisy</text>
  <text x="54" y="198" font-size="10" fill="#2E7D32" font-weight="700">o_clean</text>
  <text x="44" y="220" font-size="9" fill="#555" font-style="italic">• Latency: ≤ CLKS_STABLE cycles</text>

  <!-- Black-box module -->
  <rect x="370" y="60" width="340" height="160" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2"/>
  <text x="540" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#37474F">debounce #(.CLKS_STABLE)</text>
  <text x="540" y="105" text-anchor="middle" font-size="10" fill="#666" font-style="italic">(black-box view — stranger can use without reading inside)</text>

  <!-- input/output pins -->
  <line x1="320" y1="130" x2="370" y2="130" stroke="#1976D2" stroke-width="2" marker-end="url(#uBlue)"/>
  <text x="325" y="125" font-size="11" fill="#1976D2" font-weight="700">i_clk</text>

  <line x1="320" y1="160" x2="370" y2="160" stroke="#D32F2F" stroke-width="2" marker-end="url(#uRed)"/>
  <text x="325" y="155" font-size="11" fill="#D32F2F" font-weight="700">i_reset</text>

  <line x1="320" y1="190" x2="370" y2="190" stroke="#F57C00" stroke-width="2" marker-end="url(#uOrg)"/>
  <text x="325" y="185" font-size="11" fill="#F57C00" font-weight="700">i_noisy</text>

  <line x1="710" y1="160" x2="745" y2="160" stroke="#2E7D32" stroke-width="2" marker-end="url(#uGrn)"/>
  <text x="750" y="164" font-size="11" fill="#2E7D32" font-weight="700">o_clean</text>

  <!-- inner labels (functional decomposition) -->
  <rect x="395" y="125" width="120" height="40" rx="5" fill="#FFF" stroke="#9A6F00" stroke-width="1.5"/>
  <text x="455" y="148" text-anchor="middle" font-size="10" fill="#9A6F00" font-weight="700">==? comparator</text>

  <rect x="545" y="125" width="140" height="40" rx="5" fill="#FFF" stroke="#9A6F00" stroke-width="1.5"/>
  <text x="615" y="148" text-anchor="middle" font-size="10" fill="#9A6F00" font-weight="700">$clog2-sized counter</text>

  <rect x="475" y="180" width="130" height="32" rx="5" fill="#FFF" stroke="#9A6F00" stroke-width="1.5"/>
  <text x="540" y="200" text-anchor="middle" font-size="10" fill="#9A6F00" font-weight="700">r_clean register</text>

  <!-- internal flow -->
  <line x1="515" y1="145" x2="545" y2="145" stroke="#333" stroke-width="1.2"/>
  <line x1="540" y1="165" x2="540" y2="180" stroke="#333" stroke-width="1.2"/>
  <line x1="605" y1="196" x2="710" y2="196" stroke="#333" stroke-width="1.2"/>
  <line x1="710" y1="196" x2="710" y2="160" stroke="#333" stroke-width="1.2"/>

  <text x="380" y="260" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Header tells the story · code answers "how" · reuser never has to open the body</text>
</svg>
