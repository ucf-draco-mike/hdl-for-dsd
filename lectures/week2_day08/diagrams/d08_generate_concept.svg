<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="Inter, sans-serif">
  <defs>
    <marker id="cArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#37474F"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">generate for — Hardware Replication at Elaboration Time</text>
  <text x="380" y="38" text-anchor="middle" font-size="10" fill="#777" font-style="italic">One block of source → N parallel physical instances</text>

  <!-- Source code box -->
  <rect x="24" y="58" width="240" height="170" rx="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="144" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#7B1FA2">Verilog Source</text>
  <text x="38" y="106" font-size="10" fill="#B8860B" font-family="JetBrains Mono, monospace" font-weight="700">generate</text>
  <text x="38" y="124" font-size="10" fill="#333" font-family="JetBrains Mono, monospace">  for (g=0; g&lt;</text>
  <text x="172" y="124" font-size="10" fill="#B8860B" font-family="JetBrains Mono, monospace" font-weight="700">N</text>
  <text x="184" y="124" font-size="10" fill="#333" font-family="JetBrains Mono, monospace">; g++)</text>
  <text x="38" y="142" font-size="10" fill="#333" font-family="JetBrains Mono, monospace">    </text>
  <text x="60" y="142" font-size="10" fill="#9A6F00" font-family="JetBrains Mono, monospace" font-weight="700">debounce</text>
  <text x="124" y="142" font-size="10" fill="#333" font-family="JetBrains Mono, monospace"> db(...);</text>
  <text x="38" y="160" font-size="10" fill="#B8860B" font-family="JetBrains Mono, monospace" font-weight="700">endgenerate</text>
  <text x="144" y="194" text-anchor="middle" font-size="9" fill="#7B1FA2" font-style="italic">Written once</text>
  <text x="144" y="208" text-anchor="middle" font-size="9" fill="#7B1FA2" font-style="italic">in your .v file</text>

  <!-- elaboration arrow -->
  <line x1="270" y1="148" x2="335" y2="148" stroke="#37474F" stroke-width="2.5" marker-end="url(#cArr)"/>
  <text x="302" y="138" text-anchor="middle" font-size="10" fill="#37474F" font-weight="700">Elaboration</text>
  <text x="302" y="168" text-anchor="middle" font-size="9" fill="#888" font-style="italic">(compile time)</text>

  <!-- Physical hardware box -->
  <rect x="345" y="58" width="395" height="180" rx="10" fill="#FAFAFA" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="540" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">Physical Hardware Built — N=4 independent copies</text>

  <!-- 4 colored debouncer instances -->
  <g>
    <rect x="358" y="92" width="84" height="62" rx="6" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
    <text x="400" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#F57C00">debounce</text>
    <text x="400" y="132" text-anchor="middle" font-size="9" fill="#9A6F00">[0]</text>
    <text x="400" y="148" text-anchor="middle" font-size="8" fill="#F57C00">SW1</text>

    <rect x="450" y="92" width="84" height="62" rx="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
    <text x="492" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#C2185B">debounce</text>
    <text x="492" y="132" text-anchor="middle" font-size="9" fill="#7B1145">[1]</text>
    <text x="492" y="148" text-anchor="middle" font-size="8" fill="#C2185B">SW2</text>

    <rect x="542" y="92" width="84" height="62" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
    <text x="584" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#7B1FA2">debounce</text>
    <text x="584" y="132" text-anchor="middle" font-size="9" fill="#4A148C">[2]</text>
    <text x="584" y="148" text-anchor="middle" font-size="8" fill="#7B1FA2">SW3</text>

    <rect x="634" y="92" width="84" height="62" rx="6" fill="#E0F2F1" stroke="#00838F" stroke-width="2"/>
    <text x="676" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#00838F">debounce</text>
    <text x="676" y="132" text-anchor="middle" font-size="9" fill="#00595C">[3]</text>
    <text x="676" y="148" text-anchor="middle" font-size="8" fill="#00838F">SW4</text>
  </g>

  <!-- Warning -->
  <rect x="358" y="170" width="370" height="58" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="543" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#C62828">NOT a runtime loop!</text>
  <text x="543" y="206" text-anchor="middle" font-size="9" fill="#555">Each instance is independent physical hardware.</text>
  <text x="543" y="220" text-anchor="middle" font-size="9" fill="#555">4 copies × all FFs and logic = 4× the resources.</text>
</svg>
