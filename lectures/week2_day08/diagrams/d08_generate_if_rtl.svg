<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="Inter, sans-serif">
  <defs>
    <marker id="gBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="gOrg"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="gGrn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
  </defs>

  <text x="410" y="20" text-anchor="middle" font-size="15" font-weight="700" fill="#333">generate if — Conditional Hardware Selected at Compile Time</text>
  <text x="410" y="38" text-anchor="middle" font-size="10" fill="#777" font-style="italic">USE_SYNCHRONIZER picks the branch · the unused branch produces zero silicon</text>

  <!-- ============= LEFT: USE_SYNCHRONIZER = 1 ============= -->
  <rect x="20" y="56" width="390" height="280" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="215" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">USE_SYNCHRONIZER = 1   →   g_sync branch built</text>

  <!-- two FFs -->
  <rect x="120" y="140" width="90" height="100" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="165" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0">r_meta</text>
  <text x="165" y="180" text-anchor="middle" font-size="9" fill="#333">FF</text>
  <text x="135" y="158" font-size="8" fill="#1565C0" font-weight="700">D</text>
  <text x="195" y="180" font-size="8" fill="#1565C0" font-weight="700">Q</text>
  <text x="145" y="235" font-size="8" fill="#1565C0" font-weight="700">CLK</text>
  <polygon points="138,240 150,240 144,232" fill="none" stroke="#1565C0" stroke-width="1.4"/>

  <rect x="240" y="140" width="90" height="100" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="285" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0">r_stable</text>
  <text x="285" y="180" text-anchor="middle" font-size="9" fill="#333">FF</text>
  <text x="255" y="158" font-size="8" fill="#1565C0" font-weight="700">D</text>
  <text x="315" y="180" font-size="8" fill="#1565C0" font-weight="700">Q</text>
  <text x="265" y="235" font-size="8" fill="#1565C0" font-weight="700">CLK</text>
  <polygon points="258,240 270,240 264,232" fill="none" stroke="#1565C0" stroke-width="1.4"/>

  <!-- i_in -->
  <text x="36" y="178" font-size="11" fill="#F57C00" font-weight="700">i_in</text>
  <line x1="58" y1="175" x2="120" y2="175" stroke="#F57C00" stroke-width="2" marker-end="url(#gOrg)"/>

  <!-- r_meta → r_stable D -->
  <line x1="210" y1="175" x2="240" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#gGrn)"/>

  <!-- r_stable Q → o_out -->
  <line x1="330" y1="175" x2="385" y2="175" stroke="#2E7D32" stroke-width="2" marker-end="url(#gGrn)"/>
  <text x="350" y="170" font-size="11" fill="#2E7D32" font-weight="700">o_out</text>

  <!-- clock bus -->
  <text x="36" y="288" font-size="11" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="68" y1="285" x2="350" y2="285" stroke="#1976D2" stroke-width="1.6"/>
  <line x1="144" y1="285" x2="144" y2="240" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#gBlue)"/>
  <line x1="264" y1="285" x2="264" y2="240" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#gBlue)"/>

  <text x="215" y="320" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">2 flip-flops elaborated · external-domain inputs safe</text>

  <!-- ============= RIGHT: USE_SYNCHRONIZER = 0 ============= -->
  <rect x="430" y="56" width="370" height="280" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="615" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#C62828">USE_SYNCHRONIZER = 0   →   g_nosync branch built</text>

  <!-- direct wire -->
  <text x="446" y="178" font-size="11" fill="#F57C00" font-weight="700">i_in</text>
  <line x1="470" y1="175" x2="770" y2="175" stroke="#F57C00" stroke-width="2.4" marker-end="url(#gOrg)"/>
  <text x="775" y="172" font-size="11" fill="#2E7D32" font-weight="700">o_out</text>

  <!-- ghost FFs -->
  <rect x="540" y="200" width="90" height="60" rx="6" fill="none" stroke="#BBB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="585" y="225" text-anchor="middle" font-size="10" fill="#BBB" font-style="italic">no FF</text>
  <text x="585" y="244" text-anchor="middle" font-size="9" fill="#BBB">(zero silicon)</text>

  <rect x="650" y="200" width="90" height="60" rx="6" fill="none" stroke="#BBB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="695" y="225" text-anchor="middle" font-size="10" fill="#BBB" font-style="italic">no FF</text>
  <text x="695" y="244" text-anchor="middle" font-size="9" fill="#BBB">(zero silicon)</text>

  <text x="615" y="295" text-anchor="middle" font-size="10" fill="#C62828" font-style="italic">Pass-through · 0 flip-flops · for already-sync internal signals</text>
  <text x="615" y="315" text-anchor="middle" font-size="10" fill="#C62828">assign o_out = i_in;</text>
</svg>
