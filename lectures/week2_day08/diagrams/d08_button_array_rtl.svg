<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Inter, sans-serif">
  <defs>
    <marker id="bBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="bRed"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="bOrg"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="bGrn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="bGld"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#B8860B"/></marker>
  </defs>

  <text x="410" y="20" text-anchor="middle" font-size="15" font-weight="700" fill="#333">button_array — generate for Unrolls N Debouncer Instances</text>
  <text x="410" y="38" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Shown with N=4. Source file size is constant; silicon scales with the parameter.</text>

  <!-- Outer module box -->
  <rect x="30" y="52" width="760" height="280" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="42" y="72" font-size="11" font-weight="700" fill="#37474F">module button_array</text>

  <!-- parameter pill -->
  <rect x="540" y="56" width="240" height="36" rx="6" fill="#FFF8E1" stroke="#B8860B" stroke-width="1.8"/>
  <text x="660" y="78" text-anchor="middle" font-size="11" fill="#B8860B" font-weight="700">parameter N = 4</text>

  <!-- Generate-scope dashed box -->
  <rect x="180" y="100" width="540" height="220" rx="8" fill="none" stroke="#B8860B" stroke-width="1.6" stroke-dasharray="5,4"/>
  <text x="450" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#B8860B" font-style="italic">generate for (gi=0; gi&lt;N; gi=gi+1) begin : g_btn</text>

  <!-- Four debounce instances -->
  <g>
    <!-- inst 0 -->
    <rect x="200" y="138" width="120" height="64" rx="6" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
    <text x="260" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#9A6F00">debounce</text>
    <text x="260" y="174" text-anchor="middle" font-size="9" fill="#9A6F00">g_btn[0].u_deb</text>
    <text x="260" y="190" text-anchor="middle" font-size="9" fill="#666">gi=0</text>

    <!-- inst 1 -->
    <rect x="335" y="138" width="120" height="64" rx="6" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
    <text x="395" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#9A6F00">debounce</text>
    <text x="395" y="174" text-anchor="middle" font-size="9" fill="#9A6F00">g_btn[1].u_deb</text>
    <text x="395" y="190" text-anchor="middle" font-size="9" fill="#666">gi=1</text>

    <!-- inst 2 -->
    <rect x="470" y="138" width="120" height="64" rx="6" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
    <text x="530" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#9A6F00">debounce</text>
    <text x="530" y="174" text-anchor="middle" font-size="9" fill="#9A6F00">g_btn[2].u_deb</text>
    <text x="530" y="190" text-anchor="middle" font-size="9" fill="#666">gi=2</text>

    <!-- inst 3 -->
    <rect x="605" y="138" width="120" height="64" rx="6" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
    <text x="665" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#9A6F00">debounce</text>
    <text x="665" y="174" text-anchor="middle" font-size="9" fill="#9A6F00">g_btn[3].u_deb</text>
    <text x="665" y="190" text-anchor="middle" font-size="9" fill="#666">gi=3</text>
  </g>

  <!-- i_buttons bus distributed -->
  <text x="42" y="244" font-size="12" fill="#F57C00" font-weight="700">i_buttons</text>
  <text x="42" y="258" font-size="9" fill="#F57C00" font-style="italic">[N-1:0]</text>
  <line x1="90" y1="240" x2="160" y2="240" stroke="#F57C00" stroke-width="2"/>
  <line x1="160" y1="240" x2="160" y2="220" stroke="#F57C00" stroke-width="2"/>
  <line x1="160" y1="220" x2="260" y2="220" stroke="#F57C00" stroke-width="2"/>
  <line x1="260" y1="220" x2="260" y2="202" stroke="#F57C00" stroke-width="2" marker-end="url(#bOrg)"/>
  <circle cx="160" cy="220" r="3" fill="#F57C00"/>
  <line x1="160" y1="220" x2="395" y2="220" stroke="#F57C00" stroke-width="2"/>
  <line x1="395" y1="220" x2="395" y2="202" stroke="#F57C00" stroke-width="2" marker-end="url(#bOrg)"/>
  <line x1="395" y1="220" x2="530" y2="220" stroke="#F57C00" stroke-width="2"/>
  <line x1="530" y1="220" x2="530" y2="202" stroke="#F57C00" stroke-width="2" marker-end="url(#bOrg)"/>
  <line x1="530" y1="220" x2="665" y2="220" stroke="#F57C00" stroke-width="2"/>
  <line x1="665" y1="220" x2="665" y2="202" stroke="#F57C00" stroke-width="2" marker-end="url(#bOrg)"/>
  <text x="240" y="216" font-size="8" fill="#F57C00" font-style="italic">[0]</text>
  <text x="375" y="216" font-size="8" fill="#F57C00" font-style="italic">[1]</text>
  <text x="510" y="216" font-size="8" fill="#F57C00" font-style="italic">[2]</text>
  <text x="645" y="216" font-size="8" fill="#F57C00" font-style="italic">[3]</text>

  <!-- o_clean bus collected -->
  <line x1="260" y1="138" x2="260" y2="120" stroke="#2E7D32" stroke-width="2" marker-end="url(#bGrn)"/>
  <line x1="395" y1="138" x2="395" y2="120" stroke="#2E7D32" stroke-width="2" marker-end="url(#bGrn)"/>
  <line x1="530" y1="138" x2="530" y2="120" stroke="#2E7D32" stroke-width="2" marker-end="url(#bGrn)"/>
  <line x1="665" y1="138" x2="665" y2="120" stroke="#2E7D32" stroke-width="2" marker-end="url(#bGrn)"/>
  <text x="265" y="115" font-size="8" fill="#2E7D32" font-style="italic">[0]</text>
  <text x="400" y="115" font-size="8" fill="#2E7D32" font-style="italic">[1]</text>
  <text x="535" y="115" font-size="8" fill="#2E7D32" font-style="italic">[2]</text>
  <text x="670" y="115" font-size="8" fill="#2E7D32" font-style="italic">[3]</text>

  <!-- top o_clean wire (assemble) -->
  <line x1="260" y1="105" x2="665" y2="105" stroke="#2E7D32" stroke-width="2"/>
  <line x1="665" y1="105" x2="765" y2="105" stroke="#2E7D32" stroke-width="2" marker-end="url(#bGrn)"/>
  <text x="770" y="100" font-size="12" fill="#2E7D32" font-weight="700">o_clean</text>
  <text x="770" y="114" font-size="9" fill="#2E7D32" font-style="italic">[N-1:0]</text>

  <!-- clk/reset shared bus -->
  <text x="42" y="288" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="78" y1="285" x2="725" y2="285" stroke="#1976D2" stroke-width="1.8"/>
  <line x1="260" y1="285" x2="260" y2="202" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3"/>
  <line x1="395" y1="285" x2="395" y2="202" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3"/>
  <line x1="530" y1="285" x2="530" y2="202" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3"/>
  <line x1="665" y1="285" x2="665" y2="202" stroke="#1976D2" stroke-width="1.4" stroke-dasharray="3,3"/>

  <text x="42" y="312" font-size="12" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="88" y1="309" x2="725" y2="309" stroke="#D32F2F" stroke-width="1.8"/>

  <text x="410" y="358" text-anchor="middle" font-size="11" fill="#B8860B" font-weight="700" font-style="italic">N=4 shown · change N=8 → eight boxes · the source file does not grow</text>
</svg>
