<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="dBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="dRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="dOrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="dGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="dPur" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="dGld" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#B8860B"/></marker>
    <marker id="dBlk" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>

  <text x="390" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Parameterized Debounce — localparam + $clog2 Auto-Size the Counter</text>
  <text x="390" y="38" text-anchor="middle" font-size="10" fill="#777" font-style="italic">User exposes CLKS_STABLE · derived COUNT_WIDTH is internal-only</text>

  <!-- Outer module -->
  <rect x="30" y="50" width="730" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="42" y="70" font-size="11" font-weight="700" fill="#37474F">module debounce</text>

  <!-- Parameter & localparam pills -->
  <rect x="430" y="58" width="320" height="50" rx="6" fill="#FFF8E1" stroke="#B8860B" stroke-width="1.8"/>
  <text x="442" y="74" font-size="10" fill="#B8860B" font-weight="700">parameter CLKS_STABLE = 500_000   (user knob)</text>
  <text x="442" y="92" font-size="10" fill="#B8860B" font-weight="700">localparam COUNT_WIDTH = $clog2(CLKS_STABLE)</text>
  <text x="442" y="106" font-size="9" fill="#7B7400" font-style="italic">→ derived; caller cannot override</text>

  <!-- Compare-to-input synchronizer/equality block: i_noisy vs r_clean -->
  <rect x="200" y="138" width="120" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="260" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">==?</text>
  <text x="260" y="178" text-anchor="middle" font-size="9" fill="#333">noisy vs clean</text>

  <!-- Counter register r_count (auto-sized by COUNT_WIDTH) -->
  <rect x="370" y="120" width="170" height="120" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="455" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Stability Counter</text>
  <text x="455" y="162" text-anchor="middle" font-size="10" fill="#7B1FA2" font-weight="700">r_count</text>
  <text x="455" y="178" text-anchor="middle" font-size="10" fill="#B8860B">[COUNT_WIDTH-1:0]</text>

  <!-- pins -->
  <text x="375" y="135" font-size="9" fill="#1565C0" font-weight="700">D</text>
  <text x="395" y="234" font-size="9" fill="#1565C0" font-weight="700">CLK</text>
  <text x="445" y="234" font-size="9" fill="#1565C0" font-weight="700">R</text>
  <text x="528" y="167" font-size="9" fill="#1565C0" font-weight="700">Q</text>
  <polygon points="390,240 402,240 396,232" fill="none" stroke="#1565C0" stroke-width="1.5"/>

  <!-- == output drives counter reset/increment -->
  <line x1="320" y1="168" x2="370" y2="168" stroke="#333" stroke-width="1.5" marker-end="url(#dBlk)"/>
  <text x="340" y="160" font-size="9" fill="#666" font-style="italic">match?</text>

  <!-- Threshold comparator: r_count == CLKS_STABLE-1 -->
  <rect x="588" y="120" width="158" height="56" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="667" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">Threshold</text>
  <text x="667" y="156" text-anchor="middle" font-size="10" fill="#333">r_count == CLKS_STABLE-1</text>
  <text x="667" y="170" text-anchor="middle" font-size="9" fill="#888" font-style="italic">accept the new value</text>

  <!-- Register Q → threshold comparator -->
  <line x1="540" y1="167" x2="588" y2="148" stroke="#7B1FA2" stroke-width="2" marker-end="url(#dPur)"/>

  <!-- Clean register r_clean -->
  <rect x="588" y="200" width="120" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="648" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">r_clean</text>
  <text x="648" y="238" text-anchor="middle" font-size="9" fill="#333">latches new value</text>

  <!-- threshold → r_clean enable -->
  <line x1="667" y1="176" x2="667" y2="200" stroke="#E65100" stroke-width="1.5" marker-end="url(#dGld)"/>

  <!-- r_clean → o_clean -->
  <line x1="708" y1="225" x2="750" y2="225" stroke="#2E7D32" stroke-width="2" marker-end="url(#dGrn)"/>
  <text x="754" y="229" font-size="12" fill="#2E7D32" font-weight="700">o_clean</text>

  <!-- inputs -->
  <text x="42" y="170" font-size="12" fill="#F57C00" font-weight="700">i_noisy</text>
  <line x1="83" y1="167" x2="200" y2="167" stroke="#F57C00" stroke-width="2" marker-end="url(#dOrg)"/>

  <!-- r_clean feedback into ==? compare -->
  <line x1="708" y1="240" x2="730" y2="240" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="730" y1="240" x2="730" y2="295" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="730" y1="295" x2="260" y2="295" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="260" y1="295" x2="260" y2="200" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#dGrn)"/>
  <text x="495" y="310" text-anchor="middle" font-size="9" fill="#2E7D32" font-style="italic">feedback: r_clean drives the equality check</text>

  <text x="42" y="218" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="76" y1="215" x2="396" y2="215" stroke="#1976D2" stroke-width="1.8"/>
  <line x1="396" y1="215" x2="396" y2="240" stroke="#1976D2" stroke-width="1.8" marker-end="url(#dBlue)"/>

  <text x="42" y="252" font-size="12" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="88" y1="249" x2="446" y2="249" stroke="#D32F2F" stroke-width="1.8"/>
  <line x1="446" y1="249" x2="446" y2="240" stroke="#D32F2F" stroke-width="1.8" marker-end="url(#dRed)"/>
</svg>
