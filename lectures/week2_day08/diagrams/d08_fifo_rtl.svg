<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="Inter, sans-serif">
  <defs>
    <marker id="fBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="fRed"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="fPnk"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
    <marker id="fBrn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="fInd"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="fCyn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="fGld"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#B8860B"/></marker>
    <marker id="fGrn"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="fPur"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/></marker>
    <marker id="fBlk"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>

  <text x="420" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Parameterized FIFO — Memory + Two Pointers + Occupancy Counter</text>
  <text x="420" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Every dimension scales from DEPTH and WIDTH; pointer/count widths come from $clog2</text>

  <!-- Outer module box -->
  <rect x="20" y="54" width="800" height="320" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="32" y="74" font-size="11" font-weight="700" fill="#37474F">module fifo</text>

  <!-- Parameter pill -->
  <rect x="540" y="60" width="270" height="58" rx="6" fill="#FFF8E1" stroke="#B8860B" stroke-width="1.8"/>
  <text x="552" y="76" font-size="10" fill="#B8860B" font-weight="700">parameter DEPTH = 16     (entries)</text>
  <text x="552" y="92" font-size="10" fill="#B8860B" font-weight="700">parameter WIDTH = 8      (bits)</text>
  <text x="552" y="108" font-size="9" fill="#7B7400" font-style="italic">localparam ADDR_W=$clog2(DEPTH), COUNT_W=$clog2(DEPTH+1)</text>

  <!-- Memory array -->
  <rect x="300" y="130" width="240" height="160" rx="6" fill="#FFF8E1" stroke="#9A6F00" stroke-width="2"/>
  <text x="420" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#9A6F00">memory[0..DEPTH-1]</text>
  <text x="420" y="168" text-anchor="middle" font-size="10" fill="#333">DEPTH rows × WIDTH bits</text>

  <!-- visual cells -->
  <rect x="316" y="182" width="208" height="20" fill="#FFF" stroke="#9A6F00"/>
  <rect x="316" y="204" width="208" height="20" fill="#FAFAFA" stroke="#9A6F00"/>
  <rect x="316" y="226" width="208" height="20" fill="#FFF" stroke="#9A6F00"/>
  <rect x="316" y="248" width="208" height="20" fill="#FAFAFA" stroke="#9A6F00"/>
  <text x="420" y="196" text-anchor="middle" font-size="9" fill="#333">[0]   data...</text>
  <text x="420" y="218" text-anchor="middle" font-size="9" fill="#333">[1]   data...</text>
  <text x="420" y="240" text-anchor="middle" font-size="9" fill="#888">⋮</text>
  <text x="420" y="262" text-anchor="middle" font-size="9" fill="#333">[DEPTH-1]</text>

  <!-- Write pointer -->
  <rect x="80" y="138" width="140" height="60" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="150" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">r_wptr</text>
  <text x="150" y="174" text-anchor="middle" font-size="9" fill="#333">[ADDR_W-1:0]</text>
  <text x="150" y="190" text-anchor="middle" font-size="9" fill="#888" font-style="italic">where to write next</text>

  <!-- Read pointer -->
  <rect x="80" y="220" width="140" height="60" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="150" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">r_rptr</text>
  <text x="150" y="256" text-anchor="middle" font-size="9" fill="#333">[ADDR_W-1:0]</text>
  <text x="150" y="272" text-anchor="middle" font-size="9" fill="#888" font-style="italic">where to read next</text>

  <!-- pointer -> memory addr arrows -->
  <line x1="220" y1="168" x2="300" y2="180" stroke="#7B1FA2" stroke-width="1.6" marker-end="url(#fPur)"/>
  <text x="245" y="160" font-size="9" fill="#7B1FA2" font-style="italic">wr addr</text>

  <line x1="220" y1="240" x2="300" y2="240" stroke="#7B1FA2" stroke-width="1.6" marker-end="url(#fPur)"/>
  <text x="245" y="232" font-size="9" fill="#7B1FA2" font-style="italic">rd addr</text>

  <!-- Occupancy counter -->
  <rect x="80" y="298" width="200" height="56" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="180" y="318" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">r_count</text>
  <text x="180" y="334" text-anchor="middle" font-size="9" fill="#333">[COUNT_W-1:0]   range 0..DEPTH</text>
  <text x="180" y="346" text-anchor="middle" font-size="9" fill="#888" font-style="italic">drives o_full / o_empty</text>

  <!-- count → full/empty logic -->
  <line x1="280" y1="326" x2="320" y2="326" stroke="#7B1FA2" stroke-width="1.6" marker-end="url(#fPur)"/>

  <!-- Empty/Full comparators -->
  <rect x="320" y="308" width="170" height="48" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="405" y="326" text-anchor="middle" font-size="10" font-weight="700" fill="#E65100">count==0 / count==DEPTH</text>
  <text x="405" y="342" text-anchor="middle" font-size="9" fill="#333">o_empty / o_full logic</text>

  <line x1="490" y1="326" x2="540" y2="326" stroke="#C2185B" stroke-width="1.8" marker-end="url(#fPnk)"/>

  <!-- ports on left -->
  <text x="32" y="148" font-size="11" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="58" y1="145" x2="80" y2="145" stroke="#1976D2" stroke-width="1.6" marker-end="url(#fBlue)"/>

  <text x="32" y="168" font-size="11" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="72" y1="166" x2="80" y2="166" stroke="#D32F2F" stroke-width="1.6" marker-end="url(#fRed)"/>

  <text x="32" y="188" font-size="11" fill="#C2185B" font-weight="700">i_wr</text>
  <line x1="58" y1="185" x2="80" y2="185" stroke="#C2185B" stroke-width="1.6" marker-end="url(#fPnk)"/>

  <text x="32" y="248" font-size="11" fill="#C2185B" font-weight="700">i_rd</text>
  <line x1="58" y1="246" x2="80" y2="246" stroke="#C2185B" stroke-width="1.6" marker-end="url(#fPnk)"/>

  <!-- i_wdata -->
  <text x="32" y="358" font-size="11" fill="#F57C00" font-weight="700">i_wdata</text>
  <line x1="74" y1="356" x2="316" y2="356" stroke="#F57C00" stroke-width="1.8"/>
  <line x1="316" y1="356" x2="316" y2="290" stroke="#F57C00" stroke-width="1.8" marker-end="url(#fInd)"/>
  <text x="160" y="350" font-size="9" fill="#F57C00" font-style="italic">[WIDTH-1:0]</text>

  <!-- ports on right -->
  <line x1="540" y1="200" x2="640" y2="200" stroke="#2E7D32" stroke-width="2" marker-end="url(#fCyn)"/>
  <text x="648" y="204" font-size="11" fill="#2E7D32" font-weight="700">o_rdata</text>
  <text x="648" y="218" font-size="9" fill="#2E7D32" font-style="italic">[WIDTH-1:0]</text>

  <text x="548" y="312" font-size="11" fill="#C2185B" font-weight="700">o_empty</text>
  <text x="548" y="346" font-size="11" fill="#C2185B" font-weight="700">o_full</text>
  <line x1="490" y1="316" x2="540" y2="316" stroke="#C2185B" stroke-width="1.6"/>
  <line x1="490" y1="346" x2="540" y2="346" stroke="#C2185B" stroke-width="1.6"/>

  <!-- caption -->
  <text x="420" y="398" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Hard-coded version: DEPTH=16, WIDTH=8 ⇒ ADDR_W=4, COUNT_W=5. Parameterized version: replace every magic number with the parameter.</text>
</svg>
