<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBlue3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aRed3"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/></marker>
    <marker id="aPur3"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aGld3"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#B8860B"/></marker>
    <marker id="aBlk3"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#333"/></marker>
  </defs>

  <text x="390" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#333">Parameterized Counter — One Source, Many Widths</text>
  <text x="390" y="38" text-anchor="middle" font-size="10" fill="#777" font-style="italic">WIDTH selects the register/adder/comparator size at compile time</text>

  <!-- Outer parameterized module box -->
  <rect x="30" y="50" width="730" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="42" y="70" font-size="11" font-weight="700" fill="#37474F">module counter</text>

  <!-- Parameter callouts -->
  <rect x="540" y="58" width="210" height="42" rx="6" fill="#FFF8E1" stroke="#B8860B" stroke-width="1.8"/>
  <text x="645" y="74" text-anchor="middle" font-size="10" fill="#B8860B" font-weight="700">parameter WIDTH = 8</text>
  <text x="645" y="92" text-anchor="middle" font-size="10" fill="#B8860B" font-weight="700">parameter MAX_VAL = 2**WIDTH-1</text>

  <!-- +1 adder -->
  <rect x="160" y="138" width="70" height="42" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="195" y="164" text-anchor="middle" font-size="14" font-weight="700" fill="#2E7D32">+1</text>

  <!-- MUX (selects between +1 and 0 on wrap) -->
  <polygon points="260,128 308,148 308,192 260,212" fill="#FFF9C4" stroke="#D4A843" stroke-width="2"/>
  <text x="284" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MUX</text>
  <text x="265" y="146" font-size="9" fill="#555" font-weight="700">1</text>
  <text x="265" y="200" font-size="9" fill="#555" font-weight="700">0</text>

  <!-- '0' constant routed into MUX input '1' on the long (left) side -->
  <text x="180" y="100" font-size="11" fill="#555" font-weight="700">'0'</text>
  <line x1="200" y1="96" x2="245" y2="96" stroke="#333" stroke-width="1.5"/>
  <line x1="245" y1="96" x2="245" y2="146" stroke="#333" stroke-width="1.5"/>
  <line x1="245" y1="146" x2="260" y2="146" stroke="#333" stroke-width="1.5" marker-end="url(#aBlk3)"/>

  <!-- adder output routed into MUX input '0' on the long (left) side -->
  <line x1="230" y1="170" x2="250" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="250" y1="170" x2="250" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="250" y1="200" x2="260" y2="200" stroke="#333" stroke-width="1.5" marker-end="url(#aBlk3)"/>

  <!-- Register -->
  <rect x="360" y="120" width="170" height="120" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="445" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#1565C0">Register</text>
  <text x="445" y="162" text-anchor="middle" font-size="10" fill="#333">[WIDTH-1:0]</text>
  <text x="445" y="178" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">o_count</text>

  <!-- D / CLK / R pin labels -->
  <text x="365" y="135" font-size="9" fill="#1565C0" font-weight="700">D</text>
  <text x="395" y="234" font-size="9" fill="#1565C0" font-weight="700">CLK</text>
  <text x="437" y="234" font-size="9" fill="#1565C0" font-weight="700">R</text>
  <text x="518" y="166" font-size="9" fill="#1565C0" font-weight="700">Q</text>
  <polygon points="390,240 402,240 396,232" fill="none" stroke="#1565C0" stroke-width="1.5"/>

  <!-- MUX -> Register D -->
  <line x1="308" y1="170" x2="340" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="170" x2="340" y2="138" stroke="#333" stroke-width="1.5"/>
  <line x1="340" y1="138" x2="360" y2="138" stroke="#333" stroke-width="1.5" marker-end="url(#aBlk3)"/>

  <!-- Register Q tap -->
  <line x1="530" y1="162" x2="570" y2="162" stroke="#2E7D32" stroke-width="2"/>
  <circle cx="570" cy="162" r="3.2" fill="#2E7D32"/>

  <!-- Q → comparator -->
  <line x1="570" y1="162" x2="590" y2="122" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#aPur3)"/>

  <!-- Comparator: count == MAX_VAL -->
  <rect x="588" y="95" width="160" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="668" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">Comparator</text>
  <text x="668" y="132" text-anchor="middle" font-size="10" fill="#333">o_count == MAX_VAL</text>

  <!-- Comparator output → MUX select -->
  <line x1="588" y1="120" x2="284" y2="120" stroke="#E65100" stroke-width="1.6"/>
  <line x1="284" y1="120" x2="284" y2="128" stroke="#E65100" stroke-width="1.6" marker-end="url(#aGld3)"/>
  <text x="430" y="115" font-size="9" fill="#E65100" font-style="italic">sel = (count == MAX_VAL)</text>

  <!-- Q → o_count output -->
  <line x1="570" y1="162" x2="570" y2="260" stroke="#2E7D32" stroke-width="2"/>
  <line x1="570" y1="260" x2="710" y2="260" stroke="#2E7D32" stroke-width="2"/>
  <line x1="710" y1="260" x2="710" y2="200" stroke="#2E7D32" stroke-width="2"/>
  <line x1="710" y1="200" x2="745" y2="200" stroke="#2E7D32" stroke-width="2" marker-end="url(#aPur3)"/>
  <text x="690" y="195" font-size="12" fill="#2E7D32" font-weight="700">o_count</text>
  <text x="690" y="210" font-size="9" fill="#2E7D32" font-style="italic">[WIDTH-1:0]</text>

  <!-- Feedback Q → +1 adder (dashed under) -->
  <line x1="570" y1="260" x2="195" y2="260" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="195" y1="260" x2="195" y2="180" stroke="#2E7D32" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#aPur3)"/>
  <text x="350" y="275" font-size="9" fill="#2E7D32" font-style="italic">feedback: count → count+1</text>

  <!-- Clock and reset inputs (left) -->
  <text x="42" y="218" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="78" y1="215" x2="396" y2="215" stroke="#1976D2" stroke-width="1.8"/>
  <line x1="396" y1="215" x2="396" y2="240" stroke="#1976D2" stroke-width="1.8" marker-end="url(#aBlue3)"/>

  <text x="42" y="248" font-size="12" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="88" y1="245" x2="438" y2="245" stroke="#D32F2F" stroke-width="1.8"/>
  <line x1="438" y1="245" x2="438" y2="240" stroke="#D32F2F" stroke-width="1.8" marker-end="url(#aRed3)"/>

  <!-- Width annotation -->
  <text x="395" y="318" text-anchor="middle" font-size="10" fill="#B8860B" font-weight="700" font-style="italic">WIDTH = 8 → 8-bit register · WIDTH = 12 → 12-bit register · everything scales</text>
</svg>
