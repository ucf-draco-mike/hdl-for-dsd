<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBlu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aOrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aAmb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9A6F00"/></marker>
    <marker id="aTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
    <marker id="aMag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">ram_1p — Single-Port Synchronous RAM (read-before-write, infers EBR)</text>

  <!-- Module box -->
  <rect x="40" y="50" width="700" height="240" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="70" font-size="12" font-weight="700" fill="#37474F">module ram_1p #(.ADDR_W, .DATA_W)</text>

  <!-- Memory array -->
  <rect x="250" y="105" width="220" height="130" rx="8" fill="#FFF3E0" stroke="#9A6F00" stroke-width="2"/>
  <text x="360" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#9A6F00">mem[0 : 2^ADDR_W−1]</text>
  <text x="360" y="145" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DATA_W bits wide</text>
  <text x="360" y="170" text-anchor="middle" font-size="11" fill="#7B1FA2" font-weight="700">if (i_we) mem[i_addr] ← i_din</text>
  <text x="360" y="190" text-anchor="middle" font-size="11" fill="#7B1FA2" font-weight="700">o_dout ← mem[i_addr]</text>
  <text x="360" y="215" text-anchor="middle" font-size="10" fill="#888" font-style="italic">→ SB_RAM40_4KNR (EBR)</text>

  <!-- Output register -->
  <rect x="525" y="135" width="90" height="60" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="570" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">o_dout reg</text>
  <text x="570" y="172" text-anchor="middle" font-size="9" fill="#888">posedge clk</text>
  <text x="570" y="186" text-anchor="middle" font-size="9" fill="#888">DATA_W FFs</text>

  <!-- i_clk -->
  <text x="50" y="100" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="82" y1="95" x2="700" y2="95" stroke="#1976D2" stroke-width="2"/>
  <line x1="360" y1="95" x2="360" y2="105" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>
  <line x1="570" y1="95" x2="570" y2="135" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>

  <!-- i_we -->
  <text x="50" y="138" font-size="12" fill="#C2185B" font-weight="700">i_we</text>
  <line x1="84" y1="133" x2="250" y2="133" stroke="#C2185B" stroke-width="2" marker-end="url(#aMag)"/>

  <!-- i_addr -->
  <text x="50" y="170" font-size="12" fill="#F57C00" font-weight="700">i_addr</text>
  <text x="50" y="182" font-size="10" fill="#F57C00">[ADDR_W−1:0]</text>
  <line x1="142" y1="165" x2="250" y2="165" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>

  <!-- i_din -->
  <text x="50" y="208" font-size="12" fill="#F57C00" font-weight="700">i_din</text>
  <text x="50" y="220" font-size="10" fill="#F57C00">[DATA_W−1:0]</text>
  <line x1="142" y1="203" x2="250" y2="203" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>

  <!-- mem → output reg -->
  <line x1="470" y1="165" x2="525" y2="165" stroke="#9A6F00" stroke-width="2" marker-end="url(#aAmb)"/>

  <!-- output -->
  <line x1="615" y1="165" x2="685" y2="165" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrn)"/>
  <text x="690" y="169" font-size="12" fill="#2E7D32" font-weight="700">o_dout</text>
  <text x="690" y="181" font-size="10" fill="#2E7D32">[DATA_W−1:0]</text>

  <!-- Note -->
  <rect x="100" y="252" width="580" height="28" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="390" y="270" text-anchor="middle" font-size="10" fill="#333" font-weight="600">Single address bus: read on every cycle, write when i_we=1 · 1-cycle read latency</text>
</svg>
