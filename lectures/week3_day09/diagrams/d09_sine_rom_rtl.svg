<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBlu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aOrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aAmb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9A6F00"/></marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">sine_rom — 1024 × 10-bit Lookup (3 EBRs, 0 multipliers)</text>

  <!-- Module box -->
  <rect x="50" y="45" width="660" height="190" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="65" y="65" font-size="12" font-weight="700" fill="#37474F">module sine_rom</text>

  <!-- mem -->
  <rect x="220" y="85" width="240" height="120" rx="8" fill="#FFF3E0" stroke="#9A6F00" stroke-width="2"/>
  <text x="340" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#9A6F00">mem[0:1023]</text>
  <text x="340" y="128" text-anchor="middle" font-size="10" fill="#666" font-style="italic">$readmemh("sine_1024x10.hex")</text>
  <text x="340" y="148" text-anchor="middle" font-size="10" fill="#555">10-bit samples × 1024 phases</text>
  <text x="340" y="168" text-anchor="middle" font-size="10" fill="#888" font-style="italic">10240 bits → 3 EBRs</text>
  <text x="340" y="188" text-anchor="middle" font-size="9" fill="#888">~0.8% of HX1K</text>

  <!-- Output reg -->
  <rect x="510" y="105" width="100" height="65" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="560" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">o_sample</text>
  <text x="560" y="145" text-anchor="middle" font-size="10" fill="#7B1FA2">10-bit reg</text>
  <text x="560" y="160" text-anchor="middle" font-size="9" fill="#888">posedge clk</text>

  <!-- i_clk -->
  <text x="60" y="100" font-size="12" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="92" y1="95" x2="670" y2="95" stroke="#1976D2" stroke-width="2"/>
  <line x1="340" y1="95" x2="340" y2="85" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>
  <line x1="560" y1="95" x2="560" y2="105" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>

  <!-- i_phase -->
  <text x="60" y="142" font-size="12" fill="#F57C00" font-weight="700">i_phase[9:0]</text>
  <line x1="155" y1="137" x2="220" y2="137" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>

  <!-- mem → reg -->
  <line x1="460" y1="137" x2="510" y2="137" stroke="#9A6F00" stroke-width="2" marker-end="url(#aAmb)"/>

  <!-- output -->
  <line x1="610" y1="137" x2="680" y2="137" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrn)"/>
  <text x="688" y="141" font-size="12" fill="#2E7D32" font-weight="700">o_sample[9:0]</text>

  <!-- Note -->
  <text x="380" y="252" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Memory replaces CORDIC: ~400 LUTs + 100 cycles of compute → 3 EBRs + 1 cycle of lookup</text>
</svg>
