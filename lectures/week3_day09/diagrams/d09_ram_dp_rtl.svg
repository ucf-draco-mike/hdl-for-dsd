<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="Inter, sans-serif">
  <defs>
    <marker id="aBlu" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/></marker>
    <marker id="aOrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aAmb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9A6F00"/></marker>
    <marker id="aMag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/></marker>
    <marker id="aTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#00838F"/></marker>
  </defs>

  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#333">ram_dp — Dual-Port RAM (Independent Read &amp; Write Addresses)</text>

  <!-- Module box -->
  <rect x="40" y="50" width="700" height="230" rx="10" fill="#FAFAFA" stroke="#37474F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="55" y="70" font-size="12" font-weight="700" fill="#37474F">module ram_dp</text>

  <!-- Memory array -->
  <rect x="270" y="100" width="200" height="140" rx="8" fill="#FFF3E0" stroke="#9A6F00" stroke-width="2"/>
  <text x="370" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#9A6F00">mem[ ]</text>
  <text x="370" y="150" text-anchor="middle" font-size="10" fill="#7B1FA2">write port (we, waddr, din)</text>
  <text x="370" y="172" text-anchor="middle" font-size="10" fill="#00838F">read port (raddr)</text>
  <text x="370" y="200" text-anchor="middle" font-size="10" fill="#888" font-style="italic">single clock, two address buses</text>
  <text x="370" y="218" text-anchor="middle" font-size="9" fill="#888">→ EBR dual-port mode</text>

  <!-- output reg -->
  <rect x="525" y="135" width="100" height="55" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="575" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">dout reg</text>
  <text x="575" y="176" text-anchor="middle" font-size="9" fill="#888">posedge clk</text>

  <!-- clk -->
  <text x="50" y="92" font-size="12" fill="#1976D2" font-weight="700">clk</text>
  <line x1="78" y1="87" x2="700" y2="87" stroke="#1976D2" stroke-width="2"/>
  <line x1="370" y1="87" x2="370" y2="100" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>
  <line x1="575" y1="87" x2="575" y2="135" stroke="#1976D2" stroke-width="2" marker-end="url(#aBlu)"/>

  <!-- write side -->
  <text x="50" y="125" font-size="11" fill="#C2185B" font-weight="700">we</text>
  <line x1="75" y1="120" x2="270" y2="120" stroke="#C2185B" stroke-width="2" marker-end="url(#aMag)"/>
  <text x="50" y="150" font-size="11" fill="#F57C00" font-weight="700">waddr</text>
  <line x1="92" y1="145" x2="270" y2="145" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>
  <text x="50" y="175" font-size="11" fill="#F57C00" font-weight="700">din</text>
  <line x1="78" y1="170" x2="270" y2="170" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>

  <!-- read side -->
  <text x="50" y="220" font-size="11" fill="#00838F" font-weight="700">raddr</text>
  <line x1="92" y1="215" x2="270" y2="215" stroke="#00838F" stroke-width="2" marker-end="url(#aTeal)"/>

  <!-- mem → reg → out -->
  <line x1="470" y1="162" x2="525" y2="162" stroke="#9A6F00" stroke-width="2" marker-end="url(#aAmb)"/>
  <line x1="625" y1="162" x2="700" y2="162" stroke="#2E7D32" stroke-width="2" marker-end="url(#aGrn)"/>
  <text x="710" y="166" font-size="11" fill="#2E7D32" font-weight="700">dout</text>

  <text x="370" y="262" text-anchor="middle" font-size="10" fill="#555" font-style="italic">FIFO primitive: write at tail (waddr), read at head (raddr)</text>
</svg>
