<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 270" font-family="Inter, sans-serif">
  <defs>
    <marker id="aOrg" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#F57C00"/></marker>
    <marker id="aGrn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/></marker>
    <marker id="aAmb" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#9A6F00"/></marker>
  </defs>

  <text x="370" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#C62828">rom_bad — Combinational Read ❌ Will NOT Infer Block RAM</text>

  <!-- Module box -->
  <rect x="50" y="50" width="640" height="170" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="65" y="70" font-size="12" font-weight="700" fill="#C62828">module rom_bad — 1024-entry, no clock</text>

  <!-- mem -->
  <rect x="230" y="90" width="200" height="110" rx="8" fill="#FFF3E0" stroke="#9A6F00" stroke-width="2"/>
  <text x="330" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#9A6F00">mem[0:1023]</text>
  <text x="330" y="132" text-anchor="middle" font-size="10" fill="#666" font-style="italic">$readmemh("rom.hex")</text>
  <text x="330" y="155" text-anchor="middle" font-size="10" fill="#C62828">assign data = mem[addr]</text>
  <text x="330" y="172" text-anchor="middle" font-size="9" fill="#C62828" font-weight="700">→ scattered LUTs/distributed RAM</text>
  <text x="330" y="188" text-anchor="middle" font-size="9" fill="#888" font-style="italic">no clocked output reg</text>

  <!-- addr -->
  <text x="60" y="148" font-size="12" fill="#F57C00" font-weight="700">addr[9:0]</text>
  <line x1="135" y1="143" x2="230" y2="143" stroke="#F57C00" stroke-width="2" marker-end="url(#aOrg)"/>

  <!-- data out (combinational, no reg) -->
  <line x1="430" y1="143" x2="630" y2="143" stroke="#9A6F00" stroke-width="2" marker-end="url(#aGrn)" stroke-dasharray="6,3"/>
  <text x="640" y="147" font-size="12" fill="#2E7D32" font-weight="700">data[7:0]</text>
  <text x="530" y="135" text-anchor="middle" font-size="9" fill="#C62828" font-style="italic">combinational path (no register)</text>

  <!-- Fix arrow at bottom -->
  <rect x="80" y="234" width="580" height="28" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="370" y="252" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="700">FIX: always @(posedge clk) data ≤ mem[addr];  with data as reg ⇒ infers EBR</text>
</svg>
