<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="400" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">PISO Shift Register — RTL Block Diagram</text>
  <text x="400" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Each bit: MUX selects load value (i_load) vs neighbor's Q (shift). LSB → serial out.</text>

  <!-- Parallel in inputs at top -->
  <text x="400" y="62" text-anchor="middle" font-size="11" fill="#333" font-weight="600">i_parallel_in [N-1:0]</text>
  <line x1="135" y1="72" x2="135" y2="105" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="72" x2="245" y2="105" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="355" y1="72" x2="355" y2="105" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="555" y1="72" x2="555" y2="105" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Mux + FF for bit 0 -->
  <polygon points="115,105 155,115 155,140 115,150" fill="#FFF9C4" stroke="#D4A843" stroke-width="1.8"/>
  <text x="135" y="130" text-anchor="middle" font-size="9" font-weight="700">M</text>
  <rect x="105" y="170" width="60" height="45" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.8"/>
  <text x="135" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">FF[0]</text>
  <text x="113" y="205" font-size="8" fill="#555">D</text>
  <text x="155" y="205" font-size="8" fill="#555">Q</text>
  <line x1="135" y1="150" x2="135" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Mux + FF for bit 1 -->
  <polygon points="225,105 265,115 265,140 225,150" fill="#FFF9C4" stroke="#D4A843" stroke-width="1.8"/>
  <text x="245" y="130" text-anchor="middle" font-size="9" font-weight="700">M</text>
  <rect x="215" y="170" width="60" height="45" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.8"/>
  <text x="245" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">FF[1]</text>
  <text x="223" y="205" font-size="8" fill="#555">D</text>
  <text x="265" y="205" font-size="8" fill="#555">Q</text>
  <line x1="245" y1="150" x2="245" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- shift wire from FF[1].Q to FF[0] mux input (shift right) -->
  <line x1="275" y1="192" x2="290" y2="192" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="290" y1="192" x2="290" y2="125" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="290" y1="125" x2="155" y2="125" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="195" y="120" font-size="8" fill="#27AE60" font-style="italic">shift</text>

  <!-- Mux + FF for bit 2 -->
  <polygon points="335,105 375,115 375,140 335,150" fill="#FFF9C4" stroke="#D4A843" stroke-width="1.8"/>
  <text x="355" y="130" text-anchor="middle" font-size="9" font-weight="700">M</text>
  <rect x="325" y="170" width="60" height="45" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.8"/>
  <text x="355" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">FF[2]</text>
  <line x1="355" y1="150" x2="355" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="385" y1="192" x2="400" y2="192" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="400" y1="192" x2="400" y2="125" stroke="#27AE60" stroke-width="1.5"/>
  <line x1="400" y1="125" x2="265" y2="125" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="450" y="195" font-size="14" font-weight="700" fill="#888">···</text>

  <!-- Last FF -->
  <polygon points="535,105 575,115 575,140 535,150" fill="#FFF9C4" stroke="#D4A843" stroke-width="1.8"/>
  <text x="555" y="130" text-anchor="middle" font-size="9" font-weight="700">M</text>
  <rect x="525" y="170" width="60" height="45" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.8"/>
  <text x="555" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">FF[N-1]</text>
  <line x1="555" y1="150" x2="555" y2="170" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Fill bit '0' to last mux -->
  <text x="610" y="118" font-size="11" fill="#555" font-weight="600">'0'</text>
  <line x1="600" y1="125" x2="575" y2="125" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LSB out -->
  <line x1="165" y1="192" x2="200" y2="192" stroke="#C62828" stroke-width="2"/>
  <line x1="200" y1="192" x2="200" y2="265" stroke="#C62828" stroke-width="2"/>
  <line x1="200" y1="265" x2="650" y2="265" stroke="#C62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="670" y="268" font-size="11" font-weight="700" fill="#C62828">o_serial_out</text>
  <text x="350" y="280" font-size="9" fill="#777" font-style="italic">LSB-first transmission (UART convention)</text>

  <!-- Load control -->
  <text x="35" y="123" text-anchor="end" font-size="11" fill="#333" font-weight="600">i_load</text>
  <line x1="40" y1="120" x2="90" y2="120" stroke="#666" stroke-width="1.2"/>
  <line x1="90" y1="120" x2="90" y2="125" stroke="#666" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="80" y="155" font-size="8" fill="#666" font-style="italic">(sel to all muxes)</text>

  <!-- Clock -->
  <text x="35" y="248" text-anchor="end" font-size="11" fill="#333" font-weight="600">i_clk</text>
  <line x1="40" y1="245" x2="585" y2="245" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="135" y1="245" x2="135" y2="215" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="245" y1="245" x2="245" y2="215" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="355" y1="245" x2="355" y2="215" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="555" y1="245" x2="555" y2="215" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
