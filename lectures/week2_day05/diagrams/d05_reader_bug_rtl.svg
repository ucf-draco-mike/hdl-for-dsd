<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1E88E5"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E53935"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E24AA"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43A047"/>
    </marker>
  </defs>

  <text x="410" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">"Spot the Bug" Reader — RTL Block Diagram</text>
  <text x="410" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Two unsynchronized async inputs hit the flop directly — both will go metastable</text>

  <!-- async_ready (red, dashed = async) → CE pin -->
  <text x="60" y="100" text-anchor="end" font-size="11" fill="#E53935" font-weight="700">async_ready</text>
  <text x="60" y="114" text-anchor="end" font-size="9" fill="#E53935" font-style="italic">(async)</text>
  <line x1="65" y1="97" x2="280" y2="97" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="280" y1="97" x2="280" y2="170" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="280" y1="170" x2="295" y2="170" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>

  <!-- async_data (purple — primary data input but unsynchronized too) → D pin -->
  <text x="60" y="220" text-anchor="end" font-size="11" fill="#8E24AA" font-weight="700">async_data</text>
  <text x="60" y="234" text-anchor="end" font-size="9" fill="#8E24AA" font-style="italic">(async)</text>
  <line x1="65" y1="217" x2="280" y2="217" stroke="#8E24AA" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="280" y1="217" x2="280" y2="200" stroke="#8E24AA" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="280" y1="200" x2="295" y2="200" stroke="#8E24AA" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>

  <!-- Bug callouts -->
  <g transform="translate(140,55)">
    <rect x="0" y="0" width="125" height="32" rx="4" fill="#FFEBEE" stroke="#E53935" stroke-width="1.5"/>
    <text x="62" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#E53935">⚠ BUG #1</text>
    <text x="62" y="26" text-anchor="middle" font-size="8" fill="#E53935">async signal → CE pin</text>
  </g>

  <g transform="translate(140,250)">
    <rect x="0" y="0" width="125" height="32" rx="4" fill="#F3E5F5" stroke="#8E24AA" stroke-width="1.5"/>
    <text x="62" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#8E24AA">⚠ BUG #2</text>
    <text x="62" y="26" text-anchor="middle" font-size="8" fill="#8E24AA">async signal → D pin</text>
  </g>

  <!-- Flop -->
  <rect x="295" y="150" width="170" height="100" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
  <text x="380" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#FB8C00">captured</text>
  <text x="380" y="192" text-anchor="middle" font-size="10" fill="#333">FF (no sync upstream)</text>
  <text x="380" y="226" text-anchor="middle" font-size="9" fill="#E53935" font-style="italic">may go metastable</text>
  <text x="380" y="240" text-anchor="middle" font-size="9" fill="#E53935" font-style="italic">on every async edge</text>

  <text x="301" y="200" font-size="9" fill="#FB8C00" font-weight="700">D</text>
  <text x="301" y="170" font-size="9" fill="#FB8C00" font-weight="700">CE</text>
  <text x="335" y="244" font-size="9" fill="#FB8C00" font-weight="700">CLK</text>
  <text x="450" y="200" font-size="9" fill="#FB8C00" font-weight="700">Q</text>
  <polygon points="330,250 342,250 336,242" fill="none" stroke="#FB8C00" stroke-width="1.5"/>

  <!-- Output -->
  <line x1="465" y1="200" x2="600" y2="200" stroke="#43A047" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="610" y="204" font-size="11" font-weight="700" fill="#43A047">captured</text>

  <!-- Clock -->
  <text x="60" y="285" text-anchor="end" font-size="11" fill="#1E88E5" font-weight="700">clk</text>
  <line x1="65" y1="282" x2="336" y2="282" stroke="#1E88E5" stroke-width="1.5"/>
  <line x1="336" y1="282" x2="336" y2="250" stroke="#1E88E5" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- Fix annotation -->
  <g transform="translate(495,55)">
    <rect x="0" y="0" width="290" height="65" rx="6" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="145" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#43A047">✓ FIX</text>
    <text x="145" y="31" text-anchor="middle" font-size="9" fill="#333">Insert a 2-FF synchronizer on</text>
    <text x="145" y="44" text-anchor="middle" font-size="9" fill="#333">each async input BEFORE this flop.</text>
    <text x="145" y="58" text-anchor="middle" font-size="8" font-style="italic" fill="#666">2 flops per async signal — 4 flops total.</text>
  </g>
</svg>
