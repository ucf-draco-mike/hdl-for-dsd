<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1976D2"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D32F2F"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7B1FA2"/>
    </marker>
    <marker id="arrMag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C2185B"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Modulo-N Counter — RTL Block Diagram</text>
  <text x="440" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Adder + Register + Comparator: wraps at N-1, asserts o_wrap pulse</text>

  <!-- '0' constant -->
  <text x="155" y="105" font-size="11" fill="#555" font-weight="700">'0'</text>
  <line x1="172" y1="100" x2="220" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- +1 adder block (green) -->
  <rect x="110" y="148" width="60" height="34" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="140" y="171" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">+ 1</text>
  <line x1="170" y1="165" x2="220" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2:1 MUX (purple) -->
  <polygon points="220,85 268,108 268,152 220,175" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="244" y="134" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">MUX</text>
  <text x="226" y="108" font-size="9" fill="#555" font-weight="700">1</text>
  <text x="226" y="162" font-size="9" fill="#555" font-weight="700">0</text>

  <!-- MUX output → Register D -->
  <line x1="268" y1="130" x2="330" y2="130" stroke="#333" stroke-width="1.5"/>
  <line x1="330" y1="130" x2="330" y2="220" stroke="#333" stroke-width="1.5"/>
  <line x1="330" y1="220" x2="380" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="124" font-size="9" fill="#666" font-style="italic">next</text>

  <!-- Register (orange) -->
  <rect x="380" y="200" width="150" height="110" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="455" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#F57C00">Register</text>
  <text x="455" y="248" text-anchor="middle" font-size="10" fill="#333">[$clog2(N)-1:0]</text>
  <text x="455" y="264" text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="700">o_count</text>

  <text x="386" y="217" font-size="9" fill="#F57C00" font-weight="700">D</text>
  <text x="386" y="287" font-size="9" fill="#F57C00" font-weight="700">CE</text>
  <text x="411" y="304" font-size="9" fill="#F57C00" font-weight="700">CLK</text>
  <text x="448" y="304" font-size="9" fill="#F57C00" font-weight="700">R</text>
  <text x="517" y="252" font-size="9" fill="#F57C00" font-weight="700">Q</text>

  <!-- Clock triangle -->
  <polygon points="406,310 418,310 412,302" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Comparator (magenta) -->
  <rect x="600" y="195" width="140" height="60" rx="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="670" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#C2185B">Comparator</text>
  <text x="670" y="237" text-anchor="middle" font-size="11" fill="#2E7D32">o_count == N-1</text>

  <!-- Register Q → tap → o_count out + comparator input -->
  <line x1="530" y1="248" x2="575" y2="248" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="575" cy="248" r="3.2" fill="#7B1FA2"/>
  <!-- to comparator -->
  <line x1="575" y1="248" x2="600" y2="225" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <!-- to o_count output -->
  <line x1="575" y1="248" x2="575" y2="350" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="575" y1="350" x2="770" y2="350" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="770" y1="350" x2="770" y2="290" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="770" y1="290" x2="785" y2="290" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="790" y="293" font-size="11" fill="#2E7D32" font-weight="700">o_count</text>

  <!-- Feedback Q → +1 adder -->
  <line x1="575" y1="350" x2="140" y2="350" stroke="#7B1FA2" stroke-width="1.3" stroke-dasharray="3,3"/>
  <line x1="140" y1="350" x2="140" y2="182" stroke="#7B1FA2" stroke-width="1.3" stroke-dasharray="3,3" marker-end="url(#arrOrange)"/>
  <text x="320" y="365" font-size="9" fill="#F57C00" font-style="italic">feedback (Q → D+1)</text>

  <!-- comparator out tap point -->
  <line x1="670" y1="195" x2="670" y2="135" stroke="#C2185B" stroke-width="1.8"/>
  <circle cx="670" cy="135" r="3.2" fill="#C2185B"/>
  <text x="678" y="170" font-size="9" fill="#C2185B" font-style="italic">wrap detect</text>

  <!-- AND gate body -->
  <path d="M 702 120 L 720 120 A 18 18 0 0 1 720 156 L 702 156 Z" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="713" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#333">&amp;</text>

  <!-- comparator → AND top input -->
  <line x1="670" y1="135" x2="690" y2="135" stroke="#C2185B" stroke-width="1.5"/>
  <line x1="690" y1="135" x2="690" y2="128" stroke="#C2185B" stroke-width="1.5"/>
  <line x1="690" y1="128" x2="702" y2="128" stroke="#C2185B" stroke-width="1.5"/>

  <!-- enable → AND bottom input -->
  <line x1="695" y1="148" x2="702" y2="148" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- AND output → o_wrap (green pulse) -->
  <line x1="738" y1="138" x2="780" y2="138" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arrGreen)"/>
  <text x="785" y="141" font-size="11" fill="#2E7D32" font-weight="700">o_wrap</text>
  <text x="745" y="120" font-size="9" fill="#777" font-style="italic">1-cycle pulse</text>

  <!-- branch left from comparator-tap back to MUX select (wrap → pick '0') -->
  <line x1="670" y1="135" x2="670" y2="65" stroke="#C2185B" stroke-width="1.5"/>
  <line x1="670" y1="65" x2="244" y2="65" stroke="#C2185B" stroke-width="1.5"/>
  <line x1="244" y1="65" x2="244" y2="85" stroke="#C2185B" stroke-width="1.5" marker-end="url(#arrMag)"/>
  <text x="380" y="60" font-size="9" fill="#666" font-style="italic">sel = (o_count == N-1)</text>

  <!-- i_enable (purple) -->
  <text x="55" y="282" text-anchor="end" font-size="11" fill="#F57C00" font-weight="700">i_enable</text>
  <line x1="60" y1="279" x2="380" y2="279" stroke="#7B1FA2" stroke-width="1.6" marker-end="url(#arrPurple)"/>
  <circle cx="300" cy="279" r="3" fill="#7B1FA2"/>
  <line x1="300" y1="279" x2="300" y2="90" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="300" y1="90" x2="695" y2="90" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="695" y1="90" x2="695" y2="148" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- i_clk (blue) -->
  <text x="55" y="333" text-anchor="end" font-size="11" fill="#1976D2" font-weight="700">i_clk</text>
  <line x1="60" y1="330" x2="412" y2="330" stroke="#1976D2" stroke-width="1.5"/>
  <line x1="412" y1="330" x2="412" y2="310" stroke="#1976D2" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- i_reset (red) -->
  <text x="55" y="372" text-anchor="end" font-size="11" fill="#D32F2F" font-weight="700">i_reset</text>
  <line x1="60" y1="369" x2="455" y2="369" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="455" y1="369" x2="455" y2="310" stroke="#D32F2F" stroke-width="1.5" marker-end="url(#arrRed)"/>
</svg>
