<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">Modulo-N Counter — RTL Block Diagram</text>
  <text x="380" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Adder + Register + Comparator: wraps at N-1, asserts o_wrap pulse</text>

  <!-- Inputs -->
  <text x="55" y="118" text-anchor="end" font-size="11" fill="#333" font-weight="600">i_enable</text>
  <line x1="60" y1="115" x2="170" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="55" y="190" text-anchor="end" font-size="11" fill="#333" font-weight="600">i_clk</text>
  <line x1="60" y1="187" x2="330" y2="187" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="330" y1="187" x2="330" y2="240" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="55" y="262" text-anchor="end" font-size="11" fill="#333" font-weight="600">i_reset</text>
  <line x1="60" y1="259" x2="290" y2="259" stroke="#C62828" stroke-width="1.5"/>
  <line x1="290" y1="259" x2="290" y2="260" stroke="#C62828" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- MUX (selects between +1 and 0) -->
  <polygon points="170,90 230,105 230,140 170,155" fill="#FFF9C4" stroke="#D4A843" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#333">MUX</text>
  <text x="178" y="105" font-size="9" fill="#555">0</text>
  <text x="178" y="148" font-size="9" fill="#555">1</text>

  <!-- +1 box feeding mux input 1 -->
  <rect x="80" y="135" width="60" height="32" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="110" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#2E7D32">+ 1</text>
  <line x1="140" y1="151" x2="170" y2="148" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 0 constant feeding mux input 0 -->
  <text x="100" y="105" font-size="11" fill="#555" font-weight="600">'0'</text>
  <line x1="115" y1="100" x2="170" y2="100" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Comparator (== N-1) -->
  <rect x="430" y="80" width="120" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="490" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">Comparator</text>
  <text x="490" y="118" text-anchor="middle" font-size="11" fill="#333">o_count == N-1</text>

  <!-- Comparator output drives mux select via AND with enable -->
  <line x1="490" y1="130" x2="490" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="490" y1="160" x2="270" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="270" y1="160" x2="270" y2="125" stroke="#333" stroke-width="1.5"/>
  <line x1="270" y1="125" x2="225" y2="123" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="155" font-size="9" fill="#666" font-style="italic">wrap detect</text>

  <!-- Mux output -> Register D -->
  <line x1="230" y1="123" x2="340" y2="220" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Register -->
  <rect x="340" y="210" width="120" height="70" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#1565C0">Register</text>
  <text x="400" y="252" text-anchor="middle" font-size="10" fill="#333">[$clog2(N)-1:0]</text>
  <text x="400" y="268" text-anchor="middle" font-size="10" fill="#333">o_count</text>

  <!-- Register output to bus -->
  <line x1="460" y1="245" x2="590" y2="245" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="610" y="248" font-size="11" fill="#333" font-weight="600">o_count</text>

  <!-- Feedback to +1 adder -->
  <line x1="510" y1="245" x2="510" y2="320" stroke="#666" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="510" y1="320" x2="110" y2="320" stroke="#666" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="110" y1="320" x2="110" y2="167" stroke="#666" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="310" y="335" font-size="9" fill="#666" font-style="italic">feedback (Q → D+1)</text>

  <!-- Also feed comparator -->
  <line x1="490" y1="245" x2="490" y2="130" stroke="#666" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- o_wrap output (AND of comparator + enable) -->
  <line x1="550" y1="105" x2="620" y2="105" stroke="#E65100" stroke-width="2" marker-end="url(#arr)"/>
  <text x="640" y="108" font-size="11" fill="#E65100" font-weight="700">o_wrap</text>
  <text x="600" y="92" font-size="9" fill="#777" font-style="italic">1-cycle pulse</text>
</svg>
