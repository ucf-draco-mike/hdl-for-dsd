<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="Inter, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1E88E5"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E53935"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8E24AA"/>
    </marker>
    <marker id="arrIndigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3949AB"/>
    </marker>
    <marker id="arrTeal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00897B"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FB8C00"/>
    </marker>
    <marker id="arrMag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D81B60"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#43A047"/>
    </marker>
  </defs>

  <text x="440" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">PWM Period Register — RTL Block Diagram</text>
  <text x="440" y="40" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Three blocks: CSR registers (period &amp; duty), wrapping period counter, duty comparator</text>

  <!-- ==== Block 1: CSR Registers ==== -->
  <text x="160" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#555">① CSR Registers</text>

  <!-- i_wdata bus (teal) -->
  <text x="40" y="120" text-anchor="end" font-size="11" fill="#00897B" font-weight="700">i_wdata</text>
  <line x1="45" y1="117" x2="90" y2="117" stroke="#00897B" stroke-width="1.6"/>
  <circle cx="90" cy="117" r="3" fill="#00897B"/>
  <!-- branches to period and duty registers -->
  <line x1="90" y1="117" x2="90" y2="100" stroke="#00897B" stroke-width="1.6"/>
  <line x1="90" y1="100" x2="115" y2="100" stroke="#00897B" stroke-width="1.6" marker-end="url(#arrTeal)"/>
  <line x1="90" y1="117" x2="90" y2="175" stroke="#00897B" stroke-width="1.6"/>
  <line x1="90" y1="175" x2="115" y2="175" stroke="#00897B" stroke-width="1.6" marker-end="url(#arrTeal)"/>

  <!-- period reg -->
  <rect x="115" y="80" width="130" height="50" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
  <text x="180" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FB8C00">period</text>
  <text x="180" y="118" text-anchor="middle" font-size="9" fill="#333">[W-1:0] register</text>

  <!-- duty reg -->
  <rect x="115" y="155" width="130" height="50" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
  <text x="180" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#FB8C00">duty</text>
  <text x="180" y="193" text-anchor="middle" font-size="9" fill="#333">[W-1:0] register</text>

  <!-- i_we_period write enable (purple) -->
  <text x="40" y="70" text-anchor="end" font-size="11" fill="#8E24AA" font-weight="700">i_we_period</text>
  <line x1="45" y1="67" x2="180" y2="67" stroke="#8E24AA" stroke-width="1.6"/>
  <line x1="180" y1="67" x2="180" y2="80" stroke="#8E24AA" stroke-width="1.6" marker-end="url(#arrPurple)"/>
  <text x="200" y="76" font-size="8" fill="#8E24AA" font-style="italic">WE</text>

  <!-- i_we_duty write enable (indigo) -->
  <text x="40" y="225" text-anchor="end" font-size="11" fill="#3949AB" font-weight="700">i_we_duty</text>
  <line x1="45" y1="222" x2="180" y2="222" stroke="#3949AB" stroke-width="1.6"/>
  <line x1="180" y1="222" x2="180" y2="205" stroke="#3949AB" stroke-width="1.6" marker-end="url(#arrIndigo)"/>
  <text x="200" y="220" font-size="8" fill="#3949AB" font-style="italic">WE</text>

  <!-- period out → counter compare input (magenta path label) -->
  <line x1="245" y1="105" x2="280" y2="105" stroke="#FB8C00" stroke-width="1.8"/>
  <line x1="280" y1="105" x2="280" y2="245" stroke="#FB8C00" stroke-width="1.8"/>
  <line x1="280" y1="245" x2="335" y2="245" stroke="#FB8C00" stroke-width="1.8" marker-end="url(#arrOrange)"/>
  <text x="288" y="240" font-size="8" fill="#FB8C00" font-style="italic">period</text>

  <!-- duty out → duty compare -->
  <line x1="245" y1="180" x2="540" y2="180" stroke="#FB8C00" stroke-width="1.8"/>
  <line x1="540" y1="180" x2="540" y2="310" stroke="#FB8C00" stroke-width="1.8" marker-end="url(#arrOrange)"/>
  <text x="380" y="175" font-size="8" fill="#FB8C00" font-style="italic">duty</text>

  <!-- ==== Block 2: Period Counter ==== -->
  <text x="430" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#555">② Period Counter (wraps on count == period)</text>

  <!-- Counter compare (count == period) magenta -->
  <rect x="335" y="225" width="120" height="44" rx="6" fill="#FCE4EC" stroke="#D81B60" stroke-width="1.8"/>
  <text x="395" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#D81B60">==</text>
  <text x="395" y="260" text-anchor="middle" font-size="9" fill="#333">count == period</text>

  <!-- 0 / +1 MUX -->
  <polygon points="475,210 520,228 520,290 475,308" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
  <text x="497" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#8E24AA">MUX</text>
  <text x="481" y="232" font-size="8" fill="#555" font-weight="700">1</text>
  <text x="481" y="296" font-size="8" fill="#555" font-weight="700">0</text>
  <text x="453" y="225" font-size="8" fill="#555">'0'</text>

  <!-- compare → MUX sel -->
  <line x1="455" y1="247" x2="475" y2="247" stroke="#D81B60" stroke-width="1.6" marker-end="url(#arrMag)"/>
  <text x="455" y="220" font-size="8" fill="#D81B60" font-style="italic">sel</text>

  <!-- 0 input to MUX top -->
  <line x1="460" y1="232" x2="475" y2="232" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- +1 adder feeding MUX bottom -->
  <rect x="430" y="320" width="55" height="32" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1.8"/>
  <text x="457" y="341" text-anchor="middle" font-size="11" font-weight="700" fill="#43A047">+ 1</text>
  <line x1="485" y1="336" x2="500" y2="336" stroke="#43A047" stroke-width="1.5"/>
  <line x1="500" y1="336" x2="500" y2="298" stroke="#43A047" stroke-width="1.5"/>
  <line x1="500" y1="298" x2="490" y2="298" stroke="#43A047" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- MUX out → count register -->
  <line x1="520" y1="259" x2="560" y2="259" stroke="#333" stroke-width="1.5"/>
  <line x1="560" y1="259" x2="560" y2="390" stroke="#333" stroke-width="1.5"/>
  <line x1="560" y1="390" x2="585" y2="390" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- count register -->
  <rect x="585" y="370" width="125" height="50" rx="6" fill="#FFF3E0" stroke="#FB8C00" stroke-width="2"/>
  <text x="647" y="390" text-anchor="middle" font-size="11" font-weight="700" fill="#FB8C00">count</text>
  <text x="647" y="408" text-anchor="middle" font-size="9" fill="#333">[W-1:0] register</text>
  <text x="591" y="383" font-size="9" fill="#FB8C00" font-weight="700">D</text>
  <text x="700" y="395" font-size="9" fill="#FB8C00" font-weight="700">Q</text>

  <!-- count Q → feedback tap -->
  <line x1="710" y1="395" x2="750" y2="395" stroke="#FB8C00" stroke-width="1.8"/>
  <circle cx="750" cy="395" r="3" fill="#FB8C00"/>
  <!-- back to compare (count == period) -->
  <line x1="750" y1="395" x2="750" y2="435" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="750" y1="435" x2="320" y2="435" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="320" y1="435" x2="320" y2="270" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="320" y1="270" x2="335" y2="270" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrOrange)"/>
  <!-- back to +1 input -->
  <line x1="430" y1="336" x2="395" y2="336" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="395" y1="336" x2="395" y2="450" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="395" y1="450" x2="752" y2="450" stroke="#FB8C00" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="580" y="447" font-size="8" fill="#FB8C00" font-style="italic">feedback (count Q)</text>

  <!-- count Q → duty compare ('count') -->
  <line x1="750" y1="395" x2="775" y2="395" stroke="#FB8C00" stroke-width="1.8"/>
  <line x1="775" y1="395" x2="775" y2="330" stroke="#FB8C00" stroke-width="1.8"/>
  <line x1="775" y1="330" x2="615" y2="330" stroke="#FB8C00" stroke-width="1.8" marker-end="url(#arrOrange)"/>

  <!-- ==== Block 3: Duty Compare → o_pwm ==== -->
  <text x="700" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="#555">③ Duty Compare</text>

  <rect x="555" y="310" width="120" height="44" rx="6" fill="#FCE4EC" stroke="#D81B60" stroke-width="1.8"/>
  <text x="615" y="329" text-anchor="middle" font-size="10" font-weight="700" fill="#D81B60">&lt;</text>
  <text x="615" y="345" text-anchor="middle" font-size="9" fill="#333">count &lt; duty</text>

  <!-- duty compare → o_pwm output (green) -->
  <line x1="675" y1="332" x2="780" y2="332" stroke="#43A047" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="790" y="336" font-size="11" font-weight="700" fill="#43A047">o_pwm</text>

  <!-- clk -->
  <text x="40" y="392" text-anchor="end" font-size="11" fill="#1E88E5" font-weight="700">i_clk</text>
  <line x1="45" y1="389" x2="180" y2="389" stroke="#1E88E5" stroke-width="1.6"/>
  <!-- to period reg (vertical) -->
  <line x1="180" y1="389" x2="180" y2="130" stroke="#1E88E5" stroke-width="1.4"/>
  <line x1="180" y1="130" x2="200" y2="130" stroke="#1E88E5" stroke-width="1.4" marker-end="url(#arrBlue)"/>
  <line x1="180" y1="205" x2="200" y2="205" stroke="#1E88E5" stroke-width="1.4" marker-end="url(#arrBlue)"/>
  <!-- to count reg -->
  <line x1="180" y1="389" x2="620" y2="389" stroke="#1E88E5" stroke-width="1.4"/>
  <line x1="620" y1="389" x2="620" y2="420" stroke="#1E88E5" stroke-width="1.4" marker-end="url(#arrBlue)"/>

  <!-- ==== Legend ==== -->
  <g transform="translate(35,275)">
    <rect x="0" y="0" width="220" height="80" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.8"/>
    <text x="10" y="14" font-size="9" font-weight="700" fill="#555">SIGNAL COLORS</text>
    <circle cx="14" cy="28" r="4" fill="#1E88E5"/><text x="24" y="31" font-size="8" fill="#333">i_clk</text>
    <circle cx="14" cy="42" r="4" fill="#8E24AA"/><text x="24" y="45" font-size="8" fill="#333">i_we_period</text>
    <circle cx="14" cy="56" r="4" fill="#3949AB"/><text x="24" y="59" font-size="8" fill="#333">i_we_duty</text>
    <circle cx="14" cy="70" r="4" fill="#00897B"/><text x="24" y="73" font-size="8" fill="#333">i_wdata</text>
    <circle cx="120" cy="28" r="4" fill="#FB8C00"/><text x="130" y="31" font-size="8" fill="#333">state (regs)</text>
    <circle cx="120" cy="42" r="4" fill="#D81B60"/><text x="130" y="45" font-size="8" fill="#333">compare</text>
    <circle cx="120" cy="56" r="4" fill="#43A047"/><text x="130" y="59" font-size="8" fill="#333">o_pwm / +1</text>
  </g>
</svg>
