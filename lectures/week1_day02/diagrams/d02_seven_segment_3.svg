<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230" font-family="Inter, Arial, sans-serif">
  <rect width="240" height="230" rx="10" fill="#FAFAFA" stroke="#DDD"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Digit "3"</text>
  <text x="120" y="38" text-anchor="middle" font-size="10" fill="#666">ON: a, b, c, d, g &mdash; OFF: e, f</text>
  <g transform="translate(70,55) scale(1.1)">
    <!-- Display panel background -->
    <rect x="7" y="1" width="86" height="142" rx="6" fill="#1A1A1A"/>
    <!-- a (top) ON -->
    <rect x="22" y="5" width="56" height="10" rx="3" fill="#FF6600"/>
    <text x="50" y="3" text-anchor="middle" font-size="10" fill="#FF6600" font-weight="600">a</text>
    <!-- b (top-right) ON -->
    <rect x="80" y="18" width="10" height="56" rx="3" fill="#FF6600"/>
    <text x="98" y="48" font-size="10" fill="#FF6600" font-weight="600">b</text>
    <!-- c (bot-right) ON -->
    <rect x="80" y="80" width="10" height="56" rx="3" fill="#FF6600"/>
    <text x="98" y="110" font-size="10" fill="#FF6600" font-weight="600">c</text>
    <!-- d (bottom) ON -->
    <rect x="22" y="130" width="56" height="10" rx="3" fill="#FF6600"/>
    <text x="50" y="148" text-anchor="middle" font-size="10" fill="#FF6600" font-weight="600">d</text>
    <!-- e (bot-left) OFF — greyed -->
    <rect x="10" y="80" width="10" height="56" rx="3" fill="#555555" stroke="#777" stroke-width="0.5"/>
    <text x="5" y="110" text-anchor="end" font-size="10" fill="#888" font-weight="600">e</text>
    <!-- f (top-left) OFF — greyed -->
    <rect x="10" y="18" width="10" height="56" rx="3" fill="#555555" stroke="#777" stroke-width="0.5"/>
    <text x="5" y="48" text-anchor="end" font-size="10" fill="#888" font-weight="600">f</text>
    <!-- g (middle) ON -->
    <rect x="22" y="68" width="56" height="10" rx="3" fill="#FF6600"/>
    <text x="50" y="65" text-anchor="middle" font-size="10" fill="#FF6600" font-weight="600">g</text>
  </g>
  <text x="120" y="227" text-anchor="middle" font-size="10" fill="#333" font-family="JetBrains Mono, monospace">7'b0000110</text>
</svg>
