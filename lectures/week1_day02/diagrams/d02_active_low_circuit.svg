<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="Inter, Arial, sans-serif">
  <rect width="420" height="280" rx="12" fill="#FAFAFA" stroke="#DDD"/>
  <text x="210" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#C62828">Active-Low (Common-Anode)</text>
  <text x="210" y="44" text-anchor="middle" font-size="11" fill="#666">VCC pushes current → down through LED → FPGA pin sinks it</text>

  <!-- VCC symbol at top -->
  <text x="120" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#333">VCC</text>
  <line x1="104" y1="84" x2="136" y2="84" stroke="#333" stroke-width="2.5"/>
  <line x1="120" y1="84" x2="120" y2="120" stroke="#333" stroke-width="2"/>

  <!-- "Common anode" callout near VCC -->
  <text x="146" y="80" font-size="9" fill="#888" font-style="italic">common</text>
  <text x="146" y="92" font-size="9" fill="#888" font-style="italic">anode</text>

  <!-- LED (triangle + bar): anode on top, cathode on bottom; current → down -->
  <polygon points="104,120 136,120 120,144" fill="#C62828" stroke="#333" stroke-width="1.5"/>
  <line x1="104" y1="144" x2="136" y2="144" stroke="#333" stroke-width="2.5"/>
  <text x="158" y="135" font-size="10" fill="#666">LED</text>
  <!-- emission arrows -->
  <line x1="92" y1="124" x2="80" y2="116" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="80,116 84,121 86,116" fill="#C62828"/>
  <line x1="92" y1="136" x2="80" y2="128" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="80,128 84,133 86,128" fill="#C62828"/>

  <!-- Wire from LED cathode down to resistor -->
  <line x1="120" y1="144" x2="120" y2="170" stroke="#333" stroke-width="2"/>

  <!-- Resistor (zigzag) vertical -->
  <polyline points="120,170 110,178 130,186 110,194 130,202 120,210"
            fill="none" stroke="#333" stroke-width="2"/>
  <text x="140" y="194" font-size="10" fill="#666">R</text>

  <!-- Wire from resistor to FPGA pin -->
  <line x1="120" y1="210" x2="120" y2="232" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="232" x2="220" y2="232" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="232" x2="220" y2="216" stroke="#333" stroke-width="2"/>

  <!-- FPGA pin block -->
  <rect x="220" y="168" width="92" height="48" rx="6" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="266" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#333">FPGA pin</text>
  <text x="266" y="206" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#C62828">drive = 0</text>

  <!-- ON indicator -->
  <text x="320" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#C62828">0 = ON</text>
</svg>
