<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" font-family="Inter, Arial, sans-serif">
  <rect width="420" height="280" rx="12" fill="#FAFAFA" stroke="#DDD"/>
  <text x="210" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#2E7D32">Active-High (Common-Cathode)</text>
  <text x="210" y="44" text-anchor="middle" font-size="11" fill="#666">FPGA pin sources current → up through LED → to GND</text>

  <!-- FPGA pin block on the left -->
  <rect x="20" y="120" width="92" height="48" rx="6" fill="#FFF" stroke="#333" stroke-width="1.5"/>
  <text x="66" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#333">FPGA pin</text>
  <text x="66" y="158" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#2E7D32">drive = 1</text>

  <!-- Wire from pin to resistor -->
  <line x1="112" y1="144" x2="160" y2="144" stroke="#333" stroke-width="2"/>

  <!-- Resistor (zigzag) -->
  <polyline points="160,144 168,134 176,154 184,134 192,154 200,144"
            fill="none" stroke="#333" stroke-width="2"/>
  <text x="180" y="125" text-anchor="middle" font-size="10" fill="#666">R</text>

  <!-- Wire from resistor to LED anode -->
  <line x1="200" y1="144" x2="248" y2="144" stroke="#333" stroke-width="2"/>

  <!-- LED (triangle + bar), anode on left, cathode on right; current → right -->
  <polygon points="248,128 248,160 272,144" fill="#C62828" stroke="#333" stroke-width="1.5"/>
  <line x1="272" y1="128" x2="272" y2="160" stroke="#333" stroke-width="2.5"/>
  <text x="260" y="180" text-anchor="middle" font-size="10" fill="#666">LED</text>
  <!-- emission arrows -->
  <line x1="258" y1="120" x2="266" y2="108" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="266,108 261,109 264,113" fill="#C62828"/>
  <line x1="266" y1="120" x2="274" y2="108" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="274,108 269,109 272,113" fill="#C62828"/>

  <!-- Wire down to GND -->
  <line x1="272" y1="144" x2="320" y2="144" stroke="#333" stroke-width="2"/>
  <line x1="320" y1="144" x2="320" y2="220" stroke="#333" stroke-width="2"/>

  <!-- GND symbol -->
  <line x1="304" y1="220" x2="336" y2="220" stroke="#333" stroke-width="2.5"/>
  <line x1="310" y1="228" x2="330" y2="228" stroke="#333" stroke-width="2"/>
  <line x1="316" y1="236" x2="324" y2="236" stroke="#333" stroke-width="2"/>
  <text x="320" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#333">GND</text>

  <!-- "Common cathode" callout near GND -->
  <text x="345" y="200" font-size="9" fill="#888" font-style="italic">common</text>
  <text x="345" y="212" font-size="9" fill="#888" font-style="italic">cathode</text>

  <!-- ON indicator -->
  <text x="210" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D32">1 = ON</text>
</svg>
