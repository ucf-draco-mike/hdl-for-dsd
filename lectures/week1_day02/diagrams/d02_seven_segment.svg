<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" font-family="Inter, Arial, sans-serif">
  <rect width="500" height="380" rx="12" fill="#FAFAFA" stroke="#DDD"/>
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#333">7-Segment Display (Active Low)</text>
  <!-- Segment outlines forming a digit "8" -->
  <g transform="translate(120,45) scale(1.5)">
    <!-- a (top) -->    <rect x="22" y="5" width="56" height="10" rx="3" fill="#C62828" stroke="#333" stroke-width="0.5"/>
    <text x="50" y="3" text-anchor="middle" font-size="10" fill="#C62828" font-weight="600">a</text>
    <!-- b (top-right) --> <rect x="80" y="18" width="10" height="56" rx="3" fill="#1565C0" stroke="#333" stroke-width="0.5"/>
    <text x="98" y="48" font-size="10" fill="#1565C0" font-weight="600">b</text>
    <!-- c (bot-right) --> <rect x="80" y="80" width="10" height="56" rx="3" fill="#2E7D32" stroke="#333" stroke-width="0.5"/>
    <text x="98" y="110" font-size="10" fill="#2E7D32" font-weight="600">c</text>
    <!-- d (bottom) -->    <rect x="22" y="130" width="56" height="10" rx="3" fill="#F57F17" stroke="#333" stroke-width="0.5"/>
    <text x="50" y="155" text-anchor="middle" font-size="10" fill="#F57F17" font-weight="600">d</text>
    <!-- e (bot-left) -->  <rect x="10" y="80" width="10" height="56" rx="3" fill="#6A1B9A" stroke="#333" stroke-width="0.5"/>
    <text x="3" y="110" font-size="10" fill="#6A1B9A" font-weight="600">e</text>
    <!-- f (top-left) -->  <rect x="10" y="18" width="10" height="56" rx="3" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="3" y="48" font-size="10" fill="#00695C" font-weight="600">f</text>
    <!-- g (middle) -->    <rect x="22" y="68" width="56" height="10" rx="3" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="50" y="65" text-anchor="middle" font-size="10" fill="#E65100" font-weight="600">g</text>
  </g>
  <!-- Mapping table -->
  <g transform="translate(290,55)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#333">Segment Encoding</text>
    <text x="0" y="22" font-size="11" fill="#666" font-family="JetBrains Mono, monospace">o_seg = {a,b,c,d,e,f,g}</text>
    <text x="0" y="48" font-size="11" fill="#333" font-family="JetBrains Mono, monospace">"0" = 7'b000_0001</text>
    <text x="0" y="66" font-size="11" fill="#333" font-family="JetBrains Mono, monospace">"1" = 7'b100_1111</text>
    <text x="0" y="84" font-size="11" fill="#333" font-family="JetBrains Mono, monospace">"8" = 7'b000_0000</text>
    <text x="0" y="102" font-size="11" fill="#333" font-family="JetBrains Mono, monospace">"F" = 7'b011_1000</text>
    <text x="0" y="130" font-size="11" fill="#C62828" font-weight="600">0 = ON, 1 = OFF</text>
    <text x="0" y="148" font-size="10" fill="#888">(active low on Go Board)</text>
  </g>
  <!-- Go Board pin callouts -->
  <g transform="translate(30,320)">
    <text x="0" y="0" font-size="11" fill="#333" font-weight="600">Go Board Pins:</text>
    <text x="110" y="0" font-size="10" fill="#666" font-family="JetBrains Mono, monospace">Seg1: pins 3,4,93,91,90,1,2  |  Seg2: pins 100,99,97,95,94,8,6</text>
  </g>
  <g transform="translate(30,345)">
    <text x="0" y="0" font-size="11" fill="#333" font-weight="600">Port convention:</text>
    <text x="110" y="0" font-size="10" fill="#666" font-family="JetBrains Mono, monospace">output wire [6:0] o_seg  // bit 6=a, bit 5=b, ... bit 0=g</text>
  </g>
</svg>