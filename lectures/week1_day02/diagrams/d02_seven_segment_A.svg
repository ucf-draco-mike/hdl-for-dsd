<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 230" font-family="Inter, Arial, sans-serif">
  <rect width="240" height="230" rx="10" fill="#FAFAFA" stroke="#DDD"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#333">Digit "A"</text>
  <text x="120" y="38" text-anchor="middle" font-size="10" fill="#666">ON: a, b, c, e, f, g &mdash; OFF: d</text>
  <!-- Display, scaled to fit -->
  <g transform="translate(70,55) scale(1.3)">
    <!-- a (top) ON -->
    <rect x="22" y="5" width="56" height="10" rx="3" fill="#C62828" stroke="#333" stroke-width="0.5"/>
    <text x="50" y="3" text-anchor="middle" font-size="10" fill="#C62828" font-weight="600">a</text>
    <!-- b (top-right) ON -->
    <rect x="80" y="18" width="10" height="56" rx="3" fill="#1565C0" stroke="#333" stroke-width="0.5"/>
    <text x="98" y="48" font-size="10" fill="#1565C0" font-weight="600">b</text>
    <!-- c (bot-right) ON -->
    <rect x="80" y="80" width="10" height="56" rx="3" fill="#2E7D32" stroke="#333" stroke-width="0.5"/>
    <text x="98" y="110" font-size="10" fill="#2E7D32" font-weight="600">c</text>
    <!-- d (bottom) OFF -->
    <rect x="22" y="130" width="56" height="10" rx="3" fill="#E5E5E5" stroke="#BBB" stroke-width="0.5"/>
    <text x="50" y="155" text-anchor="middle" font-size="10" fill="#BBB" font-weight="600">d</text>
    <!-- e (bot-left) ON -->
    <rect x="10" y="80" width="10" height="56" rx="3" fill="#6A1B9A" stroke="#333" stroke-width="0.5"/>
    <text x="3" y="110" font-size="10" fill="#6A1B9A" font-weight="600">e</text>
    <!-- f (top-left) ON -->
    <rect x="10" y="18" width="10" height="56" rx="3" fill="#00695C" stroke="#333" stroke-width="0.5"/>
    <text x="3" y="48" font-size="10" fill="#00695C" font-weight="600">f</text>
    <!-- g (middle) ON -->
    <rect x="22" y="68" width="56" height="10" rx="3" fill="#E65100" stroke="#333" stroke-width="0.5"/>
    <text x="50" y="65" text-anchor="middle" font-size="10" fill="#E65100" font-weight="600">g</text>
  </g>
  <text x="120" y="220" text-anchor="middle" font-size="10" fill="#333" font-family="JetBrains Mono, monospace">7'b0001000</text>
</svg>
