<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" font-family="Inter, sans-serif">
  <text x="380" y="18" text-anchor="middle" font-size="14" font-weight="700" fill="#333">UART Frame — 8N1 (Byte 0x48 = 'H')</text>

  <!-- Signal line -->
  <!-- Idle HIGH (blue) -->
  <line x1="20" y1="60" x2="70" y2="60" stroke="#1976D2" stroke-width="3"/>
  <!-- Start bit: falling edge + LOW (red - matches start palette) -->
  <line x1="70" y1="60" x2="70" y2="120" stroke="#D32F2F" stroke-width="3"/>
  <line x1="70" y1="120" x2="120" y2="120" stroke="#D32F2F" stroke-width="3"/>

  <!-- Data bits: 0x48 = 01001000, LSB first = 0,0,0,1,0,0,1,0 (orange = data) -->
  <line x1="120" y1="120" x2="170" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="170" y1="120" x2="220" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="220" y1="120" x2="270" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="270" y1="120" x2="270" y2="60" stroke="#F57C00" stroke-width="3"/>
  <line x1="270" y1="60" x2="320" y2="60" stroke="#F57C00" stroke-width="3"/>
  <line x1="320" y1="60" x2="320" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="320" y1="120" x2="370" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="370" y1="120" x2="420" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="420" y1="120" x2="420" y2="60" stroke="#F57C00" stroke-width="3"/>
  <line x1="420" y1="60" x2="470" y2="60" stroke="#F57C00" stroke-width="3"/>
  <line x1="470" y1="60" x2="470" y2="120" stroke="#F57C00" stroke-width="3"/>
  <line x1="470" y1="120" x2="520" y2="120" stroke="#F57C00" stroke-width="3"/>

  <!-- Stop bit HIGH (green - matches stop palette) -->
  <line x1="520" y1="120" x2="520" y2="60" stroke="#2E7D32" stroke-width="3"/>
  <line x1="520" y1="60" x2="570" y2="60" stroke="#2E7D32" stroke-width="3"/>
  <!-- Idle continues (blue) -->
  <line x1="570" y1="60" x2="740" y2="60" stroke="#1976D2" stroke-width="3"/>

  <!-- Labels -->
  <text x="45" y="52" text-anchor="middle" font-size="9" fill="#1976D2" font-weight="700">IDLE</text>
  <text x="95" y="140" text-anchor="middle" font-size="9" fill="#D32F2F" font-weight="700">START</text>
  <text x="95" y="152" text-anchor="middle" font-size="8" fill="#D32F2F">(0)</text>

  <!-- Data bit labels -->
  <text x="145" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D0</text>
  <text x="145" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="195" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D1</text>
  <text x="195" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="245" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D2</text>
  <text x="245" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="295" y="52" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D3</text>
  <text x="295" y="44" text-anchor="middle" font-size="7" fill="#888">1</text>
  <text x="345" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D4</text>
  <text x="345" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="395" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D5</text>
  <text x="395" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>
  <text x="445" y="52" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D6</text>
  <text x="445" y="44" text-anchor="middle" font-size="7" fill="#888">1</text>
  <text x="495" y="140" text-anchor="middle" font-size="8" fill="#F57C00" font-weight="700">D7</text>
  <text x="495" y="150" text-anchor="middle" font-size="7" fill="#888">0</text>

  <text x="545" y="52" text-anchor="middle" font-size="9" fill="#2E7D32" font-weight="700">STOP</text>
  <text x="545" y="44" text-anchor="middle" font-size="7" fill="#2E7D32">(1)</text>
  <text x="660" y="52" text-anchor="middle" font-size="9" fill="#1976D2" font-weight="700">IDLE</text>

  <!-- Logic level labels -->
  <text x="12" y="63" text-anchor="end" font-size="8" fill="#888">1</text>
  <text x="12" y="123" text-anchor="end" font-size="8" fill="#888">0</text>

  <!-- LSB first annotation -->
  <line x1="125" y1="162" x2="515" y2="162" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="125" y1="158" x2="125" y2="166" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="515" y1="158" x2="515" y2="166" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="320" y="178" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="700">LSB first → 0x48 on wire: 0,0,0,1,0,0,1,0</text>

  <!-- Color legend at bottom -->
  <text x="380" y="195" text-anchor="middle" font-size="8" fill="#666" font-style="italic">idle=blue · start=red · data=orange · stop=green (matches signal palette throughout slides)</text>
</svg>
