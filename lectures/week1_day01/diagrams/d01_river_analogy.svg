<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, Segoe UI, Helvetica Neue, sans-serif">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5F6062"/>
    </marker>
  </defs>

  <!-- ═══ LEFT: Software = Recipe ═══ -->
  <rect x="20" y="10" width="390" height="380" rx="12" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="215" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#7B1FA2">Software = Recipe</text>
  <text x="215" y="62" text-anchor="middle" font-size="12" fill="#5F6062">Sequential. Ordered. One thing at a time.</text>

  <!-- Step boxes connected by arrows -->
  <rect x="120" y="82" width="190" height="42" rx="6" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="215" y="100" text-anchor="middle" font-size="13" fill="#2C2A29">① <tspan font-family="JetBrains Mono, monospace" font-size="12">a = b + c;</tspan></text>
  <text x="215" y="116" text-anchor="middle" font-size="10" fill="#9C27B0">compute, then store</text>

  <line x1="215" y1="124" x2="215" y2="142" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="137" font-size="10" fill="#888" font-style="italic">wait…</text>

  <rect x="120" y="146" width="190" height="42" rx="6" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="215" y="164" text-anchor="middle" font-size="13" fill="#2C2A29">② <tspan font-family="JetBrains Mono, monospace" font-size="12">d = a * 2;</tspan></text>
  <text x="215" y="180" text-anchor="middle" font-size="10" fill="#9C27B0">uses result of ①</text>

  <line x1="215" y1="188" x2="215" y2="206" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="201" font-size="10" fill="#888" font-style="italic">wait…</text>

  <rect x="120" y="210" width="190" height="42" rx="6" fill="#fff" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="215" y="228" text-anchor="middle" font-size="13" fill="#2C2A29">③ <tspan font-family="JetBrains Mono, monospace" font-size="12">print(d);</tspan></text>
  <text x="215" y="244" text-anchor="middle" font-size="10" fill="#9C27B0">uses result of ②</text>

  <!-- CPU icon -->
  <rect x="155" y="280" width="120" height="36" rx="4" fill="#E1BEE7" stroke="#9C27B0" stroke-width="1"/>
  <text x="215" y="303" text-anchor="middle" font-size="12" font-weight="600" fill="#7B1FA2">1 CPU, 1 ALU</text>
  <text x="215" y="330" text-anchor="middle" font-size="11" fill="#5F6062">Time-shares resources</text>
  <text x="215" y="346" text-anchor="middle" font-size="11" fill="#5F6062">Order matters!</text>

  <!-- ═══ RIGHT: Hardware = River ═══ -->
  <rect x="490" y="10" width="390" height="380" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="685" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#1565C0">Hardware = River System</text>
  <text x="685" y="62" text-anchor="middle" font-size="12" fill="#5F6062">Concurrent. Everything flows at once.</text>

  <!-- River source -->
  <ellipse cx="685" cy="90" rx="40" ry="16" fill="url(#water)" stroke="#1565C0" stroke-width="1.5"/>
  <text x="685" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">Source</text>

  <!-- Branching paths (rivers) -->
  <path d="M 685 106 C 685 130, 590 130, 590 155" fill="none" stroke="#42A5F5" stroke-width="4" opacity="0.6"/>
  <path d="M 685 106 C 685 130, 780 130, 780 155" fill="none" stroke="#42A5F5" stroke-width="4" opacity="0.6"/>

  <!-- Left branch: adder -->
  <rect x="540" y="155" width="100" height="44" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
  <text x="590" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2A29">Adder</text>
  <text x="590" y="191" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1565C0">a = b + c</text>

  <!-- Right branch: multiplier -->
  <rect x="730" y="155" width="100" height="44" rx="6" fill="#fff" stroke="#1565C0" stroke-width="1.5"/>
  <text x="780" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2A29">Shifter</text>
  <text x="780" y="191" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1565C0">d = a * 2</text>

  <!-- Connection: adder feeds shifter via wire -->
  <path d="M 640 177 L 730 177" fill="none" stroke="#FFC904" stroke-width="2.5" stroke-dasharray="4 3"/>
  <text x="685" y="170" text-anchor="middle" font-size="9" fill="#C9A000" font-weight="600">wire</text>

  <!-- Continuing flow -->
  <path d="M 590 199 C 590 230, 685 240, 685 260" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.5"/>
  <path d="M 780 199 C 780 230, 685 240, 685 260" fill="none" stroke="#42A5F5" stroke-width="3" opacity="0.5"/>

  <!-- Result confluence -->
  <ellipse cx="685" cy="275" rx="50" ry="16" fill="url(#water)" stroke="#1565C0" stroke-width="1.5"/>
  <text x="685" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">Outputs</text>

  <!-- Labels -->
  <text x="685" y="315" text-anchor="middle" font-size="12" fill="#2C2A29" font-weight="600">Both exist simultaneously</text>
  <text x="685" y="334" text-anchor="middle" font-size="11" fill="#5F6062">Order of assign statements</text>
  <text x="685" y="350" text-anchor="middle" font-size="11" fill="#5F6062" font-weight="700">does not matter</text>

  <!-- VS divider -->
  <text x="450" y="205" text-anchor="middle" font-size="24" font-weight="700" fill="#FFC904">vs.</text>
</svg>
