<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, Segoe UI, Helvetica Neue, sans-serif">
  <defs>
    <filter id="fa-sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="fa-arw" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#5F6062"/>
    </marker>
  </defs>

  <!-- =================== LEFT PANEL: FPGA FABRIC =================== -->
  <text x="225" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#2C2A29">FPGA Fabric</text>
  <text x="225" y="46" text-anchor="middle" font-size="10" fill="#5F6062" font-style="italic">grid of programmable tiles + routing + I/O</text>

  <!-- Chip outline -->
  <rect x="40" y="60" width="370" height="370" rx="10" fill="#FAFAFA" stroke="#2C2A29" stroke-width="2.5" filter="url(#fa-sh)"/>

  <!-- I/O blocks: top row -->
  <g fill="#FFE082" stroke="#C9A000" stroke-width="1">
    <rect x="60"  y="72" width="32" height="20" rx="2"/>
    <rect x="100" y="72" width="32" height="20" rx="2"/>
    <rect x="140" y="72" width="32" height="20" rx="2"/>
