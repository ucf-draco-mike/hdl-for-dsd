    <rect x="100" y="398" width="32" height="20" rx="2"/>
    <rect x="140" y="398" width="32" height="20" rx="2"/>
    <rect x="180" y="398" width="32" height="20" rx="2"/>
    <rect x="220" y="398" width="32" height="20" rx="2"/>
    <rect x="260" y="398" width="32" height="20" rx="2"/>
    <rect x="300" y="398" width="32" height="20" rx="2"/>
    <rect x="340" y="398" width="32" height="20" rx="2"/>
  </g>
  <!-- I/O blocks: left col -->
  <g fill="#FFE082" stroke="#C9A000" stroke-width="1">
    <rect x="48" y="110" width="20" height="28" rx="2"/>
    <rect x="48" y="148" width="20" height="28" rx="2"/>
    <rect x="48" y="186" width="20" height="28" rx="2"/>
    <rect x="48" y="224" width="20" height="28" rx="2"/>
    <rect x="48" y="262" width="20" height="28" rx="2"/>
    <rect x="48" y="300" width="20" height="28" rx="2"/>
    <rect x="48" y="338" width="20" height="28" rx="2"/>
    <rect x="48" y="376" width="20" height="28" rx="2"/>
