    <line x1="80"  y1="135" x2="370" y2="135"/>
    <line x1="80"  y1="170" x2="370" y2="170"/>
    <line x1="80"  y1="205" x2="370" y2="205"/>
    <line x1="80"  y1="240" x2="370" y2="240"/>
    <line x1="80"  y1="275" x2="370" y2="275"/>
    <line x1="80"  y1="310" x2="370" y2="310"/>
    <line x1="80"  y1="345" x2="370" y2="345"/>
    <line x1="80"  y1="380" x2="370" y2="380"/>
    <line x1="80"  y1="100" x2="80"  y2="395"/>
    <line x1="115" y1="100" x2="115" y2="395"/>
    <line x1="150" y1="100" x2="150" y2="395"/>
    <line x1="185" y1="100" x2="185" y2="395"/>
    <line x1="220" y1="100" x2="220" y2="395"/>
    <line x1="255" y1="100" x2="255" y2="395"/>
