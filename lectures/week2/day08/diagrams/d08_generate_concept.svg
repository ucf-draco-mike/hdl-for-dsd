<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" font-family="Inter, sans-serif">
  <text x="350" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#333">generate for — Hardware Replication at Elaboration Time</text>

  <!-- Source code box -->
  <rect x="20" y="42" width="210" height="160" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2"/>
  <text x="125" y="64" text-anchor="middle" font-size="11" font-weight="600" fill="#9C27B0">Verilog Source</text>
  <text x="36" y="88" font-size="9" fill="#333" font-family="JetBrains Mono, monospace">generate</text>
  <text x="36" y="104" font-size="9" fill="#333" font-family="JetBrains Mono, monospace">  for (g=0; g&lt;4; g++)</text>
  <text x="36" y="120" font-size="9" fill="#333" font-family="JetBrains Mono, monospace">    debounce db(...);</text>
  <text x="36" y="136" font-size="9" fill="#333" font-family="JetBrains Mono, monospace">endgenerate</text>
  <text x="125" y="170" text-anchor="middle" font-size="8" fill="#9C27B0" font-style="italic">Written once</text>
  <text x="125" y="184" text-anchor="middle" font-size="8" fill="#9C27B0" font-style="italic">in your .v file</text>

  <!-- Arrow: elaboration -->
  <line x1="240" y1="122" x2="295" y2="122" stroke="#333" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="267" y="112" text-anchor="middle" font-size="9" fill="#333" font-weight="600">Elaboration</text>
  <text x="267" y="144" text-anchor="middle" font-size="8" fill="#888">(compile time)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <!-- Generated hardware boxes -->
  <rect x="305" y="42" width="370" height="170" rx="8" fill="#FAFAFA" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="490" y="60" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="600">Physical Hardware Created (4 independent copies)</text>

  <rect x="320" y="72" width="78" height="56" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="359" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#333">debounce</text>
  <text x="359" y="108" text-anchor="middle" font-size="8" fill="#888">[0]</text>
  <text x="359" y="120" text-anchor="middle" font-size="7" fill="#2E7D32">SW1</text>

  <rect x="408" y="72" width="78" height="56" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="447" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#333">debounce</text>
  <text x="447" y="108" text-anchor="middle" font-size="8" fill="#888">[1]</text>
  <text x="447" y="120" text-anchor="middle" font-size="7" fill="#2E7D32">SW2</text>

  <rect x="496" y="72" width="78" height="56" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="535" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#333">debounce</text>
  <text x="535" y="108" text-anchor="middle" font-size="8" fill="#888">[2]</text>
  <text x="535" y="120" text-anchor="middle" font-size="7" fill="#2E7D32">SW3</text>

  <rect x="584" y="72" width="78" height="56" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="623" y="94" text-anchor="middle" font-size="9" font-weight="600" fill="#333">debounce</text>
  <text x="623" y="108" text-anchor="middle" font-size="8" fill="#888">[3]</text>
  <text x="623" y="120" text-anchor="middle" font-size="7" fill="#2E7D32">SW4</text>

  <!-- Warning box -->
  <rect x="330" y="142" width="330" height="50" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="495" y="162" text-anchor="middle" font-size="9" fill="#C62828" font-weight="600">NOT a runtime loop!</text>
  <text x="495" y="178" text-anchor="middle" font-size="8" fill="#555">Each instance is independent physical hardware.</text>
  <text x="495" y="190" text-anchor="middle" font-size="8" fill="#555">4 copies × all FFs and logic = 4× the resources.</text>
</svg>
